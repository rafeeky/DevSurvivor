<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DEV SURVIVOR — Agent Viewer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #080810;
      --bg-card:   #0e0e1a;
      --bg-card-2: #131320;
      --border:    #1e1e30;
      --bdr-lgt:   #2a2a42;
      --txt-pri:   #e2e8f0;
      --txt-sec:   #7888a0;
      --txt-mute:  #6b7a94;
      --done:      #22c55e; --done-bg: #031a0a; --done-bdr: #134d28;
      --run:       #f59e0b; --run-bg:  #180e00; --run-bdr:  #784000;
      --idle:      #475569; --idle-bg: #0c111d; --idle-bdr: #1e293b;
      --gold:      #f59e0b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--txt-pri);
      font-family: 'Noto Sans KR', sans-serif;
      min-height: 100vh;
      padding: 28px 32px;
    }

    /* ── HEADER ── */
    .site-header {
      display: flex; align-items: center; gap: 14px;
      margin-bottom: 28px; padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }
    .logo { font-family: 'JetBrains Mono', monospace; font-size: 26px; font-weight: 700; letter-spacing: 3px; }
    .logo .dev  { color: #fff; }
    .logo .sep  { color: var(--bdr-lgt); margin: 0 4px; }
    .logo .surv { color: var(--gold); }
    .header-sub { font-size: 13px; color: var(--txt-sec); line-height: 1.5; margin-top: 4px; }
    .header-meta { margin-left: auto; display: flex; align-items: center; gap: 8px; }
    .badge {
      font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 600;
      letter-spacing: 1px; padding: 4px 10px; border-radius: 4px;
    }
    .badge.ver  { border: 1px solid var(--bdr-lgt); color: var(--txt-sec); }
    .badge.done { background: var(--done-bg); border: 1px solid var(--done-bdr); color: var(--done); }

    /* ── STATS ── */
    .stats-bar { display: grid; grid-template-columns: repeat(6,1fr); gap: 10px; margin-bottom: 28px; }
    .stat-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; text-align: center; }
    .stat-val { font-family: 'JetBrains Mono', monospace; font-size: 26px; font-weight: 700; color: var(--gold); line-height: 1; }
    .stat-lbl { font-size: 13px; color: var(--txt-sec); margin-top: 5px; }

    /* ── SECTION HEADER ── */
    .sec-hdr { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
    .sec-title { font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 600; letter-spacing: 2px; color: var(--txt-sec); white-space: nowrap; }
    .sec-line { flex: 1; height: 1px; background: var(--border); }
    .online-badge {
      font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 600;
      display: flex; align-items: center; gap: 12px;
    }
    .online-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 4px; }
    .online-dot.run  { background: var(--run);  box-shadow: 0 0 6px var(--run); }
    .online-dot.idle { background: var(--idle); }

    /* ── PHASES ── */
    .phases { margin-bottom: 28px; }
    .phases-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; }
    .phase-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 9px; padding: 16px; position: relative; transition: border-color .2s;
    }
    .phase-card.done { border-color: var(--done-bdr); }
    .phase-num { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--txt-mute); margin-bottom: 5px; letter-spacing: 1px; }
    .phase-name { font-size: 15px; font-weight: 700; margin-bottom: 6px; }
    .phase-desc { font-size: 13px; color: var(--txt-sec); line-height: 1.5; margin-bottom: 12px; }
    .phase-avatars { display: flex; gap: 4px; }
    .phase-icon {
      position: absolute; top: 14px; right: 14px;
      width: 18px; height: 18px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 700;
    }
    .phase-icon.done { background: var(--done-bg); border: 1px solid var(--done-bdr); color: var(--done); }

    /* ── PIPELINE ── */
    .pipeline { margin-bottom: 28px; }
    .pipeline-meta { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
    .wave-lbl { font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 600; color: var(--gold); }
    .prog-wrap { flex: 1; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
    .prog-fill { height: 100%; border-radius: 2px; background: linear-gradient(90deg, var(--done), #86efac); }
    .wave-row { display: flex; align-items: center; overflow-x: auto; padding-bottom: 6px; }
    .wave-card {
      flex: 0 0 176px; background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 9px; padding: 13px; transition: border-color .2s;
    }
    .wave-card.done { border-color: var(--done-bdr); }
    .wave-card.pend { opacity: .5; }
    .wave-arrow { flex: 0 0 28px; text-align: center; color: var(--bdr-lgt); font-size: 14px; }
    .wave-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .wave-id { font-family: 'JetBrains Mono', monospace; font-size: 12px; letter-spacing: 1px; color: var(--txt-mute); font-weight: 600; }
    .w-icon { width: 15px; height: 15px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 8px; font-weight: 700; }
    .w-icon.done { background: var(--done-bg); border: 1px solid var(--done-bdr); color: var(--done); }
    .w-icon.pend { border: 1px solid var(--bdr-lgt); color: var(--txt-mute); }
    .wave-title { font-size: 13px; font-weight: 600; color: var(--txt-pri); line-height: 1.35; margin-bottom: 9px; }
    .wave-avatars { display: flex; gap: 3px; }

    /* ── AVATARS ── */
    .av { border-radius: 50%; overflow: hidden; flex-shrink: 0; border: 2px solid var(--border); }
    .av-sm { width: 28px; height: 28px; }
    .av-lg { width: 62px; height: 62px; }
    .av svg { width: 100%; height: 100%; display: block; }

    /* ── AGENT CARDS ── */
    .agents-section { margin-bottom: 28px; }
    .agents-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; }
    .agent-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 10px; padding: 0; overflow: hidden;
      transition: border-color .2s, background .2s;
    }
    .agent-card:hover { filter: brightness(1.1); border-color: var(--bdr-lgt); }

    /* color top bar */
    .ag-topbar { height: 5px; width: 100%; }

    .ag-body { padding: 16px 18px 14px; }

    .ag-hdr { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 12px; }
    .ag-info { flex: 1; min-width: 0; }
    .ag-name { font-family: 'JetBrains Mono', monospace; font-size: 18px; font-weight: 700; }
    .ag-role { font-size: 13px; color: var(--txt-sec); margin-top: 3px; }
    .ag-model { font-family: 'JetBrains Mono', monospace; font-size: 11px; padding: 3px 7px; border-radius: 3px; border: 1px solid var(--bdr-lgt); color: var(--txt-mute); margin-top: 6px; display: inline-block; }

    /* status row */
    .ag-status-row {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 0 10px;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      margin-bottom: 12px;
    }
    .ag-status-badge {
      font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 700;
      letter-spacing: 1px; padding: 3px 8px; border-radius: 3px;
    }
    .ag-status-badge.done { background: var(--done-bg); border: 1px solid var(--done-bdr); color: var(--done); }
    .ag-status-badge.running { background: var(--run-bg); border: 1px solid var(--run-bdr); color: var(--run); }
    .ag-status-badge.idle { background: var(--idle-bg); border: 1px solid var(--idle-bdr); color: var(--idle); }
    .ag-wave-tag {
      font-family: 'JetBrains Mono', monospace; font-size: 11px;
      padding: 2px 7px; border-radius: 10px; background: var(--bg);
      border: 1px solid var(--bdr-lgt); color: var(--txt-sec);
    }
    .ag-elapsed { margin-left: auto; font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--txt-sec); }

    /* current task (running only) */
    .ag-current-task {
      background: #1a1200; border: 1px solid var(--run-bdr);
      border-radius: 6px; padding: 8px 10px; margin-bottom: 12px;
      font-size: 12px; color: var(--run); line-height: 1.4;
      display: flex; gap: 7px; align-items: flex-start;
    }
    .run-spin { animation: spin 1.5s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* tasks */
    .ag-tasks { list-style: none; display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
    .ag-task { display: flex; align-items: flex-start; gap: 8px; font-size: 13px; color: var(--txt-sec); line-height: 1.5; }
    .task-ck { color: var(--done); flex-shrink: 0; font-size: 12px; margin-top: 2px; }

    /* bottom row */
    .ag-footer { display: flex; align-items: center; gap: 6px; padding-top: 10px; border-top: 1px solid var(--border); flex-wrap: wrap; }
    .ph-tag { font-family: 'JetBrains Mono', monospace; font-size: 10px; padding: 2px 6px; border-radius: 3px; border: 1px solid var(--bdr-lgt); color: var(--txt-mute); }
    .ag-tokens { margin-left: auto; font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--txt-sec); }
    .ag-commits { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--txt-sec); display: flex; align-items: center; gap: 4px; }
    .ag-commits-icon { font-size: 10px; }

    /* ── HYPOTHESES ── */
    .hypo-section { margin-bottom: 32px; }
    .hypo-grid { display: grid; grid-template-columns: repeat(5,1fr); gap: 10px; }
    .hypo-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
    .hypo-id { font-family: 'JetBrains Mono', monospace; font-size: 15px; font-weight: 700; margin-bottom: 7px; }
    .hypo-text { font-size: 13px; font-weight: 600; margin-bottom: 10px; line-height: 1.5; }
    .hypo-badge { font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 3px; display: inline-block; margin-bottom: 9px; }
    .hypo-badge.verified { background: var(--done-bg); border: 1px solid var(--done-bdr); color: var(--done); }
    .hypo-badge.partial  { background: #1a1000; border: 1px solid #713f12; color: #fbbf24; }
    .hypo-badge.positive { background: #0d1a2e; border: 1px solid #1e3a5f; color: #60a5fa; }
    .hypo-badge.pending  { background: var(--idle-bg); border: 1px solid var(--idle-bdr); color: var(--idle); }
    .hypo-note { font-size: 12px; color: var(--txt-mute); line-height: 1.6; }

    /* ── FOOTER ── */
    footer { border-top: 1px solid var(--border); padding-top: 16px; display: flex; justify-content: space-between; align-items: center; }
    .foot-txt { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--txt-mute); }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--bdr-lgt); border-radius: 3px; }
  </style>
</head>

/* ============================================================  HELPERS  */
const agMap = {};
DATA.agents.forEach(a => agMap[a.id] = a);

const avSm = id => {
  const a = agMap[id];
  return `<div class="av av-sm" style="border-color:${a.color}55"><img src="assets/portrait/portrait_${id}.png" alt="${a.name}" style="width:100%;height:100%;object-fit:cover;object-position:center top;display:block;"></div>`;
};
const avLg = id => {
  const a = agMap[id];
  return `<div class="av av-lg" style="border-color:${a.color}88"><img src="assets/portrait/portrait_${id}.png" alt="${a.name}" style="width:100%;height:100%;object-fit:cover;object-position:center top;display:block;"></div>`;
};

const statusLabel = { running:"RUNNING", done:"DONE", idle:"IDLE", queued:"QUEUED" };

/* ============================================================  RENDER  */
function render() {
  const p = DATA.project;
  const now = new Date().toLocaleString('ko-KR');
  const doneMs  = DATA.milestones.filter(m => m.status === 'done').length;
  const totalMs = DATA.milestones.length;
  const pct = Math.round(doneMs / totalMs * 100);

  const onlineCount  = DATA.agents.filter(a => a.agentStatus === 'running').length;
  const idleCount    = DATA.agents.filter(a => a.agentStatus !== 'running').length;
  const totalCommits = DATA.agents.reduce((sum, a) => sum + (a.commits || 0), 0);

  document.getElementById('app').innerHTML = `

  <!-- HEADER -->
  <header class="site-header">
    <div>
      <div class="logo"><span class="dev">DEV</span><span class="sep">|</span><span class="surv">SURVIVOR</span></div>
      <div class="header-sub">${p.subtitle}</div>
    </div>
    <div class="header-meta">
      <span class="badge ver">${p.version}</span>
      <span class="badge ${p.status}">${p.statusText}</span>
    </div>
  </header>

  <!-- STATS -->
  <div class="stats-bar">
    ${DATA.stats.map(s=>`
      <div class="stat-card">
        <div class="stat-val">${s.val}</div>
        <div class="stat-lbl">${s.lbl}</div>
      </div>
    `).join('')}
    <div class="stat-card">
      <div class="stat-val" style="color:#4ade80">${totalCommits}</div>
      <div class="stat-lbl">총 커밋</div>
    </div>
  </div>

  <!-- PHASES -->
  <section class="phases">
    <div class="sec-hdr"><span class="sec-title">PHASES</span><div class="sec-line"></div></div>
    <div class="phases-grid">
      ${DATA.phases.map(ph=>`
        <div class="phase-card ${ph.status}">
          <div class="phase-icon ${ph.status}">✓</div>
          <div class="phase-num">PHASE ${ph.id}</div>
          <div class="phase-name" style="color:${ph.status==='done'?'#fff':'var(--txt-sec)'}">${ph.name}</div>
          <div class="phase-desc">${ph.desc}</div>
          <div class="phase-avatars">${ph.agents.map(avSm).join('')}</div>
        </div>
      `).join('')}
    </div>
  </section>

  <!-- PIPELINE -->
  <section class="pipeline">
    <div class="sec-hdr"><span class="sec-title">MILESTONE PIPELINE</span><div class="sec-line"></div></div>
    <div class="pipeline-meta">
      <span class="wave-lbl">${doneMs} / ${totalMs} — ${pct}%</span>
      <div class="prog-wrap"><div class="prog-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="wave-row">
      ${DATA.milestones.map((m,i)=>`
        ${i>0?`<div class="wave-arrow">→</div>`:''}
        <div class="wave-card ${m.status}">
          <div class="wave-top">
            <span class="wave-id">${m.id}</span>
            <span class="w-icon ${m.status}">${m.status==='done'?'✓':'○'}</span>
          </div>
          <div class="wave-title">${m.title}<br>
            <span style="font-weight:400;color:var(--txt-sec);font-size:11px">${m.desc}</span>
          </div>
          <div class="wave-avatars">${m.agents.map(avSm).join('')}</div>
        </div>
      `).join('')}
    </div>
  </section>

  <!-- AGENTS -->
  <section class="agents-section">
    <div class="sec-hdr">
      <span class="sec-title">AGENTS</span>
      <div class="sec-line"></div>
      <div class="online-badge">
        <span><span class="online-dot run"></span><span style="color:var(--run)">ONLINE ${onlineCount}</span></span>
        <span><span class="online-dot idle"></span><span style="color:var(--txt-sec)">IDLE ${idleCount}</span></span>
      </div>
    </div>
    <div class="agents-grid">
      ${DATA.agents.map(a=>`
        <div class="agent-card" style="border-color:${a.color}55; background:linear-gradient(175deg,${a.color}22 0%,${a.color}0d 55%,${a.color}06 100%)">
          <div class="ag-topbar" style="background:linear-gradient(90deg,${a.color},${a.color}99)"></div>
          <div class="ag-body">

            <div class="ag-hdr">
              ${avLg(a.id)}
              <div class="ag-info">
                <div class="ag-name" style="color:${a.color}">${a.name}</div>
                <div class="ag-role">${a.role}</div>
                <div class="ag-model" style="border-color:${a.color}40;color:${a.color}bb">${a.model}</div>
              </div>
            </div>

            <div class="ag-status-row" style="border-color:${a.color}28">
              <span class="ag-status-badge ${a.agentStatus}">${statusLabel[a.agentStatus]}</span>
              <span class="ag-wave-tag">${a.waveLabel}</span>
              <span class="ag-elapsed">${a.elapsed}</span>
            </div>

            ${a.currentTask ? `
              <div class="ag-current-task">
                <span class="run-spin">⟳</span>
                <span>${a.currentTask}</span>
              </div>
            ` : ''}

            <ul class="ag-tasks">
              ${a.tasks.map(t=>`
                <li class="ag-task"><span class="task-ck">✓</span><span>${t}</span></li>
              `).join('')}
            </ul>

            <div class="ag-footer" style="border-color:${a.color}28">
              ${a.phases.map(ph=>`<span class="ph-tag" style="border-color:${a.color}50;color:${a.color}cc">P${ph}</span>`).join('')}
              <span class="ag-commits"><span class="ag-commits-icon">⎇</span>${a.commits ?? 0} commits</span>
              <span class="ag-tokens">${a.tokens} tokens</span>
            </div>

          </div>
        </div>
      `).join('')}
    </div>
  </section>

  <!-- HYPOTHESES -->
  <section class="hypo-section">
    <div class="sec-hdr"><span class="sec-title">EXPERIMENT HYPOTHESES</span><div class="sec-line"></div></div>
    <div class="hypo-grid">
      ${DATA.hypotheses.map(h=>`
        <div class="hypo-card">
          <div class="hypo-id" style="color:var(--gold)">${h.id}</div>
          <div class="hypo-text">${h.text}</div>
          <div class="hypo-badge ${h.result}">${h.rtxt}</div>
          <div class="hypo-note">${h.note}</div>
        </div>
      `).join('')}
    </div>
  </section>

  <!-- FOOTER -->
  <footer>
    <span class="foot-txt">DEV SURVIVOR · AI Agent Collaboration Experiment</span>
    <span class="foot-txt">Generated: ${now}</span>
  </footer>
  `;
}

render();
</script>
</body>
</html>
