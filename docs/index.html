  <script>
// ui/joystick.js — 모바일 가상 조이스틱 (GDD Part 2.2)
// 터치 디바이스에서만 활성화

const JOYSTICK_RADIUS = 60
const KNOB_RADIUS = 24
const SKILL_BUTTONS = [
  { slot: 0, label: 'Q', x: 680, y: 460 },
  { slot: 1, label: 'W', x: 740, y: 420 },
  { slot: 2, label: 'E', x: 740, y: 490 },
  { slot: 3, label: 'R', x: 680, y: 530 },
]
const BTN_RADIUS = 28

class VirtualJoystick {
  constructor() {
    this.active = false
    this.baseX = 0
    this.baseY = 0
    this.knobX = 0
    this.knobY = 0
    this.touchId = null

    // 스킬 버튼 터치 ID 추적
    this.skillTouchIds = {}

    this._isTouchDevice = false
    this._bindEvents()
  }

  _bindEvents() {
    const canvas = document.getElementById('gameCanvas')
    if (!canvas) return

    canvas.addEventListener('touchstart', e => {
      e.preventDefault()
      this._isTouchDevice = true
      for (const t of e.changedTouches) {
        const { cx, cy } = this._toCanvas(t, canvas)
        // 스킬 버튼 체크 (오른쪽 영역)
        const btn = this._hitSkillButton(cx, cy)
        if (btn !== -1) {
          this.skillTouchIds[t.identifier] = btn
          if (GameState.screen === 'playing' && !GameState.isPaused) {
            Game.skillManager?.activateSkill(btn)
          }
          continue
        }
        // 조이스틱 (왼쪽 절반, 미사용 터치만)
        if (cx < 500 && this.touchId === null) {
          this.touchId = t.identifier
          this.active = true
          this.baseX = cx
          this.baseY = cy
          this.knobX = cx
          this.knobY = cy
        }
      }
    }, { passive: false })

    canvas.addEventListener('touchmove', e => {
      e.preventDefault()
      for (const t of e.changedTouches) {
        if (t.identifier !== this.touchId) continue
        const { cx, cy } = this._toCanvas(t, canvas)
        const dx = cx - this.baseX
        const dy = cy - this.baseY
        const dist = Math.sqrt(dx * dx + dy * dy)
        const clamped = Math.min(dist, JOYSTICK_RADIUS)
        const angle = Math.atan2(dy, dx)
        this.knobX = this.baseX + Math.cos(angle) * clamped
        this.knobY = this.baseY + Math.sin(angle) * clamped
        this._updateKeys(dx, dy, dist)
      }
    }, { passive: false })

    canvas.addEventListener('touchend', e => {
      e.preventDefault()
      for (const t of e.changedTouches) {
        if (t.identifier === this.touchId) {
          this.active = false
          this.touchId = null
          this._clearKeys()
        }
        if (t.identifier in this.skillTouchIds) {
          delete this.skillTouchIds[t.identifier]
        }
      }
    }, { passive: false })

    canvas.addEventListener('touchcancel', e => {
      this.active = false
      this.touchId = null
      this._clearKeys()
      this.skillTouchIds = {}
    }, { passive: false })
  }

  _toCanvas(touch, canvas) {
    const rect = canvas.getBoundingClientRect()
    const scaleX = 800 / rect.width
    const scaleY = 600 / rect.height
    return {
      cx: (touch.clientX - rect.left) * scaleX,
      cy: (touch.clientY - rect.top) * scaleY,
    }
  }

  _hitSkillButton(cx, cy) {
    for (const btn of SKILL_BUTTONS) {
      const dx = cx - btn.x
      const dy = cy - btn.y
      if (Math.sqrt(dx * dx + dy * dy) < BTN_RADIUS) return btn.slot
    }
    return -1
  }

  _updateKeys(dx, dy, dist) {
    if (!window.inputKeys) return
    const dead = 10
    inputKeys['KeyW'] = dy < -dead
    inputKeys['KeyS'] = dy > dead
    inputKeys['KeyA'] = dx < -dead
    inputKeys['KeyD'] = dx > dead
  }

  _clearKeys() {
    if (!window.inputKeys) return
    inputKeys['KeyW'] = false
    inputKeys['KeyS'] = false
    inputKeys['KeyA'] = false
    inputKeys['KeyD'] = false
  }

  render(ctx) {
    if (!this._isTouchDevice) return
    if (GameState.screen !== 'playing') return

    ctx.save()
    ctx.globalAlpha = 0.5

    // 조이스틱 베이스
    if (this.active) {
      ctx.beginPath()
      ctx.arc(this.baseX, this.baseY, JOYSTICK_RADIUS, 0, Math.PI * 2)
      ctx.strokeStyle = '#ffffff'
      ctx.lineWidth = 2
      ctx.stroke()
      ctx.fillStyle = 'rgba(255,255,255,0.1)'
      ctx.fill()

      // 조이스틱 노브
      ctx.beginPath()
      ctx.arc(this.knobX, this.knobY, KNOB_RADIUS, 0, Math.PI * 2)
      ctx.fillStyle = 'rgba(255,255,255,0.6)'
      ctx.fill()
    }

    // 스킬 버튼
    ctx.globalAlpha = 0.7
    for (const btn of SKILL_BUTTONS) {
      const skill = Game.skillManager?.slots?.[btn.slot]
      const cd = Game.skillManager?.cooldowns?.[btn.slot] ?? 0
      const maxCd = Game.skillManager?.maxCooldowns?.[btn.slot] ?? 1

      // 버튼 배경
      ctx.beginPath()
      ctx.arc(btn.x, btn.y, BTN_RADIUS, 0, Math.PI * 2)
      ctx.fillStyle = skill ? (cd > 0 ? '#334' : '#226') : '#222'
      ctx.fill()
      ctx.strokeStyle = skill ? '#4488ff' : '#445'
      ctx.lineWidth = 2
      ctx.stroke()

      // 쿨다운 호
      if (skill && cd > 0) {
        const ratio = cd / maxCd
        ctx.beginPath()
        ctx.moveTo(btn.x, btn.y)
        ctx.arc(btn.x, btn.y, BTN_RADIUS, -Math.PI / 2, -Math.PI / 2 + ratio * Math.PI * 2)
        ctx.closePath()
        ctx.fillStyle = 'rgba(0,0,0,0.5)'
        ctx.fill()
      }

      // 라벨
      ctx.fillStyle = skill ? '#ffffff' : '#555'
      ctx.font = `bold 14px monospace`
      ctx.textAlign = 'center'
      ctx.textBaseline = 'middle'
      ctx.fillText(btn.label, btn.x, btn.y)
    }

    ctx.textBaseline = 'alphabetic'
    ctx.restore()
  }
}

window._joystick = new VirtualJoystick()

  </script>

  <!-- game.js -->
  <script>
/**
 * game.js — Dev Survival 진입점 & 코어 게임 루프
 * Integration Lead (메인 에이전트) 통합 버전
 */


// ─────────────────────────────────────────
// 전역 상태
// ─────────────────────────────────────────
window.GameState = {
  screen: 'lobby',
  gameTime: 0,
  isRunning: false,
  isPaused: false,
  score: 0,
  releaseProgress: 0,
  killCount: 0,
  basicKills: 0,
  pcBotKills: 0,
  mirrorBotKills: 0,
  aiBotReached: false,
  aiBotKilled: false,
  enemies: [],
  projectiles: [],
  hazardZones: [],
  playerDanger: false,
  playerExpGained: 0,
  playerLevel: 1,
  playerExp: 0,
  _lastWin: false,
  aiBotIntro: false,
  aiBotIntroTimer: 0,
  // 메타 업그레이드 배율 (MetaManager.applyToPlayer 에서 설정)
  skillDamageMult: 1,
  expMultiplier:   1,
  healMultiplier:  1,
  lastEarnedPoints: 0,
}

// ─────────────────────────────────────────
// 키 입력
// ─────────────────────────────────────────
const inputKeys = {}
window.inputKeys = inputKeys

window.addEventListener('keydown', e => {
  inputKeys[e.code] = true
  if (
    ['KeyQ', 'KeyW', 'KeyE', 'KeyR'].includes(e.code) &&
    GameState.screen === 'playing' &&
    !GameState.isPaused
  ) {
    const slot = ['KeyQ', 'KeyW', 'KeyE', 'KeyR'].indexOf(e.code)
    Game.skillManager?.activateSkill(slot)
  }
})
window.addEventListener('keyup', e => { inputKeys[e.code] = false })

// ─────────────────────────────────────────
// 배경 렌더링
// ─────────────────────────────────────────
function drawBackground(ctx) {
  ctx.fillStyle = '#0d0d1a'
  ctx.fillRect(0, 0, 800, 600)
  ctx.strokeStyle = '#1a1a3e'
  ctx.lineWidth = 1
  for (let x = 0; x < 800; x += 40) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, 600); ctx.stroke()
  }
  for (let y = 0; y < 600; y += 40) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(800, y); ctx.stroke()
  }
}

// ─────────────────────────────────────────
// Game 인터페이스
// ─────────────────────────────────────────
window.Game = {
  canvas: null,
  ctx: null,
  player: null,
  enemySystem: null,
  skillManager: null,

  registerEnemySystem(spawner) { Game.enemySystem = spawner },
  registerSkillSystem(sm)      { Game.skillManager = sm },
  registerUI(ui)               { /* 통합 버전에서는 개별 모듈 직접 호출 */ },

  init() {
    Game.canvas = document.getElementById('gameCanvas')
    Game.ctx    = Game.canvas.getContext('2d')
    GameState.screen = 'lobby'
    _lastTime = performance.now()
    requestAnimationFrame(_loop)
  },

  start() {
    Object.assign(GameState, {
      screen: 'playing',
      gameTime: 0,
      isRunning: true,
      isPaused: false,
      score: 0,
      releaseProgress: 0,
      killCount: 0,
      basicKills: 0,
      pcBotKills: 0,
      mirrorBotKills: 0,
      aiBotReached: false,
      aiBotKilled: false,
      enemies: [],
      projectiles: [],
      hazardZones: [],
      playerDanger: false,
      playerExpGained: 0,
      playerLevel: 1,
      playerExp: 0,
      _lastWin: false,
      skillDamageMult: 1,
      expMultiplier:   1,
      healMultiplier:  1,
      lastEarnedPoints: 0,
      aiBotIntro: false,
      aiBotIntroTimer: 0,
    })

    // 플레이어 생성
    if (window.Player) {
      Game.player = new window.Player(400, 300)
      // skills.js가 playerCreated 이벤트를 듣고 SkillManager를 등록
      window.dispatchEvent(new CustomEvent('playerCreated', { detail: { player: Game.player } }))
      // 메타 업그레이드 효과 적용
      if (window.MetaManager) MetaManager.applyToPlayer(Game.player, Game.skillManager)
    }

    // Spawner 리셋
    if (Game.enemySystem) {
      Game.enemySystem.spawnTimer = 0
      Game.enemySystem.aiBotSpawned = false
    }

    // LevelUpManager 리셋
    if (window._levelUpManager) {
      window._levelUpManager.pendingLevelUp = false
      window._levelUpManager.choices = []
      window._levelUpManager.choiceRects = []
    }

    _lastTime = performance.now()
  },

  pause() {
    GameState.isPaused = true
    GameState.screen = 'paused'
  },

  resume() {
    GameState.isPaused = false
    GameState.screen = 'playing'
  },

  gameOver(win) {
    GameState.isRunning = false
    GameState.screen = 'result'
    GameState.isPaused = false
    GameState._lastWin = win
    // 최종 점수 확정
    if (window.ScoreSystem) {
      GameState.score = ScoreSystem.finalizeScore()
    }
    // 출시 포인트 적립
    if (window.MetaManager) {
      GameState.lastEarnedPoints = MetaManager.awardPoints()
    }
  },

  restart() {
    GameState.screen = 'lobby'
  },
}

// ─────────────────────────────────────────
// 게임 루프
// ─────────────────────────────────────────
let _lastTime = 0

function _loop(now) {
  let deltaTime = (now - _lastTime) / 1000
  _lastTime = now
  deltaTime = Math.min(deltaTime, 0.05)

  const gs = GameState
  const player = Game.player
  const ctx = Game.ctx

  // ── 로직 업데이트 (playing 상태일 때만) ──
  if (gs.screen === 'playing' && !gs.isPaused) {

    gs.gameTime += deltaTime

    if (player) {
      player.update(deltaTime, inputKeys)
      Game.enemySystem?.update(deltaTime)
      Game.skillManager?.update(deltaTime)

      // 출시 진행률 업데이트
      window.ScoreSystem?.updateReleaseProgress(deltaTime)

      // 충돌 감지
      for (const enemy of gs.enemies) {
        if (!enemy?.isAlive?.()) continue
        const dx = player.x - enemy.x
        const dy = player.y - enemy.y
        const dist = Math.sqrt(dx * dx + dy * dy)
        const hitR = (player.collisionRadius || 14) + (enemy.collisionRadius || 16)
        if (dist < hitR) {
          if (!(enemy._hitCooldown > 0)) {
            player.takeDamage(enemy.damage || 10)
            enemy._hitCooldown = 0.5
          }
        }
        if (enemy._hitCooldown > 0) enemy._hitCooldown -= deltaTime
      }

      gs.playerDanger = player.hp / player.maxHp < 0.3

      if (gs.aiBotIntro) {
        gs.aiBotIntroTimer += deltaTime
        if (gs.aiBotIntroTimer >= 0.5) gs.aiBotIntro = false
      }

      if (gs.gameTime >= 180)  Game.gameOver(true)
      else if (!player.isAlive) Game.gameOver(false)
    }
  }

  // LevelUpManager 업데이트 (playing 중에만)
  if (gs.screen === 'playing' && !gs.isPaused) {
    window._levelUpManager?.update()
  }

  // ── 렌더링 ──
  ctx.clearRect(0, 0, 800, 600)
  drawBackground(ctx)

  if (gs.screen === 'lobby') {
    window._lobby?.render(ctx)

  } else if (gs.screen === 'result') {
    window._result?.render(ctx)

  } else if (gs.screen === 'upgrade') {
    window.MetaManager?.render(ctx)

  } else {
    // playing or paused
    // 적
    for (const enemy of gs.enemies) enemy?.render?.(ctx)
    // 스킬 이펙트
    Game.skillManager?.renderEffects?.(ctx, deltaTime)
    // 플레이어
    player?.render?.(ctx)
    // HUD
    window._hud?.render(ctx, gs.gameTime)
    // 레벨업 오버레이 (paused 포함)
    window._levelUpManager?.render(ctx)
    // 모바일 조이스틱
    window._joystick?.render(ctx)
    // AIBot 등장 연출
    if (gs.aiBotIntro) {
      const alpha = 1 - gs.aiBotIntroTimer / 0.5
      ctx.fillStyle = `rgba(0,0,0,${alpha * 0.85})`
      ctx.fillRect(0, 0, 800, 600)
      ctx.save()
      ctx.globalAlpha = alpha
      ctx.fillStyle = '#ff2222'
      ctx.font = 'bold 36px monospace'
      ctx.textAlign = 'center'
      ctx.fillText('⚠ AI가 직접 나타났다', 400, 270)
      ctx.fillStyle = '#ffffff'
      ctx.font = '20px monospace'
      ctx.fillText('마지막 10초. 살아남아라.', 400, 315)
      ctx.restore()
    }
  }

  requestAnimationFrame(_loop)
}

// ─────────────────────────────────────────
// 부트스트랩
// ─────────────────────────────────────────

// 모든 모듈 이미 로드됨 — 동기 초기화
window.dispatchEvent(new Event('gameReady'))
Game.init()


  </script>
