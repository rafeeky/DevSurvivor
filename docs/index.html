  <!-- entities/player.js -->
  <script>
/**
 * entities/player.js — Player 클래스 (GDD Part 3.1)
 * window.Player 로 전역 노출
 */

class Player {
  constructor(x, y) {
    this.x = x
    this.y = y
    this.width = 24
    this.height = 36
    this.collisionRadius = 14

    // 스탯 (GDD Part 3.1)
    this.maxHp = 100
    this.hp = 100
    this.baseSpeed = 220
    this._speedMultiplier = 1
    this._damageMultiplier = 1  // 받는 피해 배율 (1 = 100%)

    // 무적
    this.invincibleTimer = 0
    this.invincibleDuration = 0.4

    // 보호막
    this.shields = 0

    // 버프 목록
    this.buffs = []  // { type, value, duration, remaining }
    this._baseSpeedMult = 1  // 패시브 스킬에 의한 영구 속도 배율
    this._baseDmgMult   = 1  // 메타 업그레이드에 의한 영구 피해 배율

    // 캐릭터 패시브 식별자 ('speed' | 'combat' | 'survivor')
    this._charPassive = null

    // 이동 방향 기억 (스킬용)
    this.lastDirX = 0
    this.lastDirY = 1

    // 깜빡임 (피격 시)
    this.flashTimer = 0

    // 스프라이트 애니메이션
    this._animTimer  = 0
    this._animFrame  = 0
    this._isMoving   = false
    this._facingLeft = false  // 좌향 미러링
    // hit/action 오버라이드 애니메이션
    this._hitAnimTimer   = 0
    this._actionAnimTimer = 0
  }

  // ── Computed properties ──

  get speed() {
    return this.baseSpeed * this._speedMultiplier
  }

  get isAlive() {
    return this.hp > 0
  }

  // ── 매 프레임 업데이트 ──

  update(deltaTime, keys) {
    // 버프 타이머 처리
    this.buffs = this.buffs.filter(b => {
      b.remaining -= deltaTime
      return b.remaining > 0
    })
    this._recalcBuffs()

    // 무적 타이머
    if (this.invincibleTimer > 0) this.invincibleTimer -= deltaTime

    // 깜빡임
    if (this.flashTimer > 0) this.flashTimer -= deltaTime

    // 이동
    let dx = 0, dy = 0
    if (keys['KeyW'] || keys['ArrowUp'])    dy -= 1
    if (keys['KeyS'] || keys['ArrowDown'])  dy += 1
    if (keys['KeyA'] || keys['ArrowLeft'])  dx -= 1
    if (keys['KeyD'] || keys['ArrowRight']) dx += 1

    if (dx !== 0 || dy !== 0) {
      const len = Math.sqrt(dx * dx + dy * dy)
      dx /= len; dy /= len
      this.lastDirX = dx
      this.lastDirY = dy
    }

    this._isMoving = (dx !== 0 || dy !== 0)
    if (dx < 0) this._facingLeft = true
    else if (dx > 0) this._facingLeft = false
    this.x += dx * this.speed * deltaTime
    this.y += dy * this.speed * deltaTime

    // hit/action 타이머
    if (this._hitAnimTimer   > 0) this._hitAnimTimer   -= deltaTime
    if (this._actionAnimTimer > 0) this._actionAnimTimer -= deltaTime

    // 스프라이트 애니메이션 프레임 업데이트
    const charKey = window.GameState?.selectedCharacter || 'adam'
    const charCfg = window.CHAR_CONFIGS?.[charKey]
    if (charCfg) {
      let anim
      if (this._hitAnimTimer   > 0 && charCfg.hit)    anim = charCfg.hit
      else if (this._actionAnimTimer > 0 && charCfg.action) anim = charCfg.action
      else anim = this._isMoving ? charCfg.walk : charCfg.idle
      this._animTimer += deltaTime
      const frameDur = 1 / anim.fps
      while (this._animTimer >= frameDur) {
        this._animTimer -= frameDur
        this._animFrame = (this._animFrame + 1) % anim.frames
      }
    }

    // 월드 경계 클램프
    const WW = window.WORLD_W || 800
    const WH = window.WORLD_H || 600
    this.x = Math.max(this.collisionRadius, Math.min(WW - this.collisionRadius, this.x))
    this.y = Math.max(this.collisionRadius, Math.min(WH - this.collisionRadius, this.y))

    // GameState 동기화
    if (window.GameState) {
      GameState.playerDanger = this.hp / this.maxHp < 0.3
    }
  }

  // ── 피해 처리 ──

  takeDamage(amount) {
    if (this.invincibleTimer > 0) return
    if (this.shields > 0) {
      this.shields--
      this.invincibleTimer = this.invincibleDuration
      return
    }
    let mult = this._damageMultiplier
    // 버티기형 패시브: 체력 30% 이하 시 피해 -20%
    if (this._charPassive === 'survivor' && this.hp / this.maxHp < 0.3) mult *= 0.8
    const actual = amount * mult
    this.hp = Math.max(0, this.hp - actual)
    this.invincibleTimer = this.invincibleDuration
    this.flashTimer = 0.15
    this._hitAnimTimer = 0.5  // hit 애니메이션 트리거
  }

  // 스킬 사용 시 action 애니메이션 트리거 (skills.js 등에서 호출)
  triggerAction() {
    this._actionAnimTimer = 0.6
  }

  // ── 회복 ──

  heal(amount) {
    this.hp = Math.min(this.maxHp, this.hp + amount)
  }

  // ── 보호막 추가 ──

  addShield(count) {
    this.shields += count
  }

  // ── 버프 적용 ──

  /**
   * @param {string} type      - 'speed' | 'damageReduction' | ...
   * @param {number} value     - 배율값 (speed: 1.3 = 30% 증가, damageReduction: 0.2 = 20% 감소)
   * @param {number} duration  - 지속 초. Infinity 또는 9999 초과 시 패시브로 처리
   */
  applyBuff(type, value, duration) {
    // 같은 타입 기존 버프 제거 후 재적용
    this.buffs = this.buffs.filter(b => b.type !== type)
    if (duration === Infinity || duration > 9999) {
      this._applyPassive(type, value)
      return
    }
    this.buffs.push({ type, value, duration, remaining: duration })
    this._recalcBuffs()
  }

  _applyPassive(type, value) {
    if (type === 'speed')           this._baseSpeedMult = value
    if (type === 'damageReduction') this._baseDmgMult   = 1 - value
  }

  _recalcBuffs() {
    let speedMult = this._baseSpeedMult
    let dmgMult   = this._baseDmgMult
    for (const b of this.buffs) {
      if (b.type === 'speed')           speedMult *= b.value
      if (b.type === 'damageReduction') dmgMult   *= (1 - b.value)
    }
    this._speedMultiplier  = speedMult
    this._damageMultiplier = dmgMult
  }

  // ── 넉백 ──

  knockback(fromX, fromY, distance) {
    const dx = this.x - fromX
    const dy = this.y - fromY
    const len = Math.sqrt(dx * dx + dy * dy) || 1
    this.x += (dx / len) * distance
    this.y += (dy / len) * distance
    const WW2 = window.WORLD_W || 800
    const WH2 = window.WORLD_H || 600
    this.x = Math.max(this.collisionRadius, Math.min(WW2 - this.collisionRadius, this.x))
    this.y = Math.max(this.collisionRadius, Math.min(WH2 - this.collisionRadius, this.y))
  }

  // ── 렌더링 ──

  render(ctx) {
    const x = this.x, y = this.y

    ctx.save()
    if (this.flashTimer > 0) ctx.globalAlpha = 0.35

    // 보호막 글로우
    if (this.shields > 0) {
      ctx.save()
      ctx.strokeStyle = '#44aaff'
      ctx.shadowColor = '#44aaff'
      ctx.shadowBlur  = 14
      ctx.lineWidth   = 2.5
      ctx.beginPath()
      ctx.arc(x, y - 4, this.collisionRadius + 10, 0, Math.PI * 2)
      ctx.stroke()
      ctx.restore()
    }

    // ── 스프라이트 렌더링 시도 ──
    const charKey = window.GameState?.selectedCharacter || 'adam'
    const cfg     = window.CHAR_CONFIGS?.[charKey]
    const spr     = window.CHAR_SPRITES?.[charKey]

    if (cfg && spr) {
      // 현재 재생할 애니메이션 & 이미지 결정
      let animKey = 'idle'
      if (this._hitAnimTimer   > 0 && cfg.hit)    animKey = 'hit'
      else if (this._actionAnimTimer > 0 && cfg.action) animKey = 'action'
      else if (this._isMoving) animKey = 'walk'

      const anim = cfg[animKey] || cfg.idle
      const img  = spr[animKey] || spr.idle
      if (img?.complete && img.naturalWidth > 0) {
        // renderW/renderH 우선, 없으면 scale
        const scale = cfg.scale || 1
        const dw = cfg.renderW || Math.round(anim.fw * scale)
        const dh = cfg.renderH || Math.round(anim.fh * scale)
        const anchor = cfg.yAnchor ?? 0.75
        let sx, sy
        if (anim.cols) {
          // Grid spritesheet
          const col = this._animFrame % anim.cols
          const row = Math.floor(this._animFrame / anim.cols)
          sx = col * anim.fw
          sy = row * anim.fh
        } else {
          // Horizontal strip (default)
          sx = this._animFrame * anim.fw
          sy = 0
        }
        const rx = Math.round(x - dw / 2)
        const ry = Math.round(y - dh * anchor)
        const smooth = cfg.renderW != null  // 고해상도 스프라이트는 스무딩 ON
        ctx.imageSmoothingEnabled = smooth
        ctx.imageSmoothingQuality = smooth ? 'high' : 'low'
        if (this._facingLeft) {
          ctx.save()
          ctx.translate(rx + dw, ry)
          ctx.scale(-1, 1)
          ctx.drawImage(img, sx, sy, anim.fw, anim.fh, 0, 0, dw, dh)
          ctx.restore()
        } else {
          ctx.drawImage(img, sx, sy, anim.fw, anim.fh, rx, ry, dw, dh)
        }
        ctx.imageSmoothingEnabled = false
        ctx.restore()
        this._drawHPBar(ctx, x, y)
        return
      }
    }

    // ── 폴백: 캔버스 직접 드로잉 ──
    this._drawCanvasPlayer(ctx, x, y)
    ctx.restore()
    this._drawHPBar(ctx, x, y)
  }

  _drawHPBar(ctx, x, y) {
    const barW = 38
    const barX = x - barW / 2
    const barY = y + 27
    ctx.fillStyle = '#222'
    ctx.fillRect(barX, barY, barW, 5)
    const hpRatio = this.hp / this.maxHp
    ctx.fillStyle = hpRatio > 0.5 ? '#44ff88' : hpRatio > 0.3 ? '#ffaa00' : '#ff3333'
    ctx.fillRect(barX, barY, barW * hpRatio, 5)
  }

  _drawCanvasPlayer(ctx, x, y) {
    // 다리
    ctx.fillStyle = '#2255cc'
    ctx.fillRect(x - 8, y + 10, 6, 14)
    ctx.fillRect(x + 2, y + 10, 6, 14)
    // 신발
    ctx.fillStyle = '#ffffff'
    ctx.fillRect(x - 9, y + 21, 8, 4)
    ctx.fillRect(x + 1, y + 21, 8, 4)
    // 몸통 (후디)
    ctx.fillStyle = '#4488ff'
    ctx.fillRect(x - 11, y - 13, 22, 24)
    // 후디 포켓
    ctx.fillStyle = '#3366cc'
    ctx.fillRect(x - 7, y + 4, 14, 7)
    // 팔
    ctx.fillStyle = '#4488ff'
    ctx.fillRect(x - 17, y - 10, 7, 18)
    ctx.fillRect(x + 10, y - 10, 7, 14)
    // 노트북
    ctx.fillStyle = '#888'
    ctx.fillRect(x - 19, y - 2, 13, 9)
    ctx.fillStyle = '#1a1a2e'
    ctx.fillRect(x - 18, y - 1, 11, 7)
    ctx.fillStyle = '#2244aa'
    ctx.fillRect(x - 17, y, 9, 5)
    ctx.fillStyle = '#44aaff'
    ctx.fillRect(x - 16, y + 1, 3, 1)
    // 머리
    ctx.fillStyle = '#66aaff'
    ctx.beginPath()
    ctx.arc(x, y - 21, 10, 0, Math.PI * 2)
    ctx.fill()
    ctx.fillStyle = 'rgba(200,230,255,0.4)'
    ctx.beginPath()
    ctx.arc(x - 3, y - 24, 5, 0, Math.PI * 2)
    ctx.fill()
    // 눈 (안경)
    ctx.strokeStyle = '#ffffff'
    ctx.lineWidth = 1.5
    ctx.strokeRect(x - 7, y - 24, 5, 4)
    ctx.strokeRect(x + 2, y - 24, 5, 4)
    ctx.fillStyle = '#aaddff'
    ctx.fillRect(x - 6, y - 23, 3, 2)
    ctx.fillRect(x + 3, y - 23, 3, 2)
  }
}

// ─────────────────────────────────────────
// 전역 노출
// ─────────────────────────────────────────
window.Player = Player

  </script>

  <!-- entities/enemies.js -->
  <script>
// ============================================================
// enemies.js — M3: CartBot, PCBot, MirrorBot, AIBot 추가
// GDD Part 4 기준
// ============================================================

// 공통 HP 바 헬퍼
function _drawHpBar(ctx, enemy, barW) {
  if (enemy.hp >= enemy.maxHp) return
  ctx.fillStyle = '#444'
  ctx.fillRect(enemy.x - barW / 2, enemy.y - 22, barW, 4)
  ctx.fillStyle = '#ff4444'
  ctx.fillRect(enemy.x - barW / 2, enemy.y - 22, barW * (enemy.hp / enemy.maxHp), 4)
}

// ============================================================
// Enemy 베이스 클래스
// ============================================================
class Enemy {
  constructor(x, y, config) {
    this.x = x
    this.y = y
    this.hp = config.hp
    this.maxHp = config.hp
    this.speed = config.speed
    this.damage = config.damage
    this.expReward = config.expReward
    this.scoreReward = config.scoreReward || config.expReward
    this.collisionRadius = config.collisionRadius || 16
    this.collisionCooldown = 0
    this.alive = true
    // 스프라이트 애니메이션 상태
    this._animTimer = 0
    this._animFrame = 0
    this._isMoving = false
    this._facingLeft = false
  }

  // 서브클래스 update() 후 호출 — 스프라이트 프레임 갱신
  _updateAnim(deltaTime, isMoving) {
    this._isMoving = isMoving
    const cfg = window.ENEMY_SPRITE_CONFIGS?.[this.constructor.name]
    if (!cfg) return
    const anim = isMoving ? cfg.walk : cfg.idle
    this._animTimer += deltaTime
    const frameDur = 1 / anim.fps
    if (this._animTimer >= frameDur) {
      this._animTimer -= frameDur
      this._animFrame = (this._animFrame + 1) % anim.frames
    }
  }

  // 스프라이트 렌더 시도 → 성공 시 true 반환
  _renderSprite(ctx) {
    const key = this.constructor.name
    const cfg = window.ENEMY_SPRITE_CONFIGS?.[key]
    const spr = window.ENEMY_SPRITES?.[key]
    if (!cfg || !spr) return false
    const anim = this._isMoving ? cfg.walk : cfg.idle
    const img  = this._isMoving ? spr.walk : spr.idle
    if (!img?.complete || img.naturalWidth === 0) return false

    const dw = Math.round(anim.fw * cfg.scale)
    const dh = Math.round(anim.fh * cfg.scale)
    const sx = this._animFrame * anim.fw
    const px = Math.round(this.x - dw / 2)
    const py = Math.round(this.y - dh * 0.75)

    ctx.save()
    if (this._facingLeft) {
      ctx.scale(-1, 1)
      ctx.translate(-2 * this.x, 0)
    }
    ctx.beginPath()
    ctx.rect(px, py, dw, dh)
    ctx.clip()
    const needsSmoothing = anim.fw > 64
    ctx.imageSmoothingEnabled = needsSmoothing
    if (needsSmoothing) ctx.imageSmoothingQuality = 'high'
    ctx.drawImage(img, sx, 0, anim.fw, anim.fh, px, py, dw, dh)
    ctx.restore()
    return true
  }

  isAlive() { return this.alive && this.hp > 0 }

  takeDamage(amount) {
    this.hp -= amount
    if (this.hp <= 0) {
      this.hp = 0
      this.alive = false
      this.onKilled()
    }
  }

  onKilled() {
    GameState.killCount++
    GameState.basicKills++
    GameState.score += this.scoreReward * 5
    GameState.playerExp += Math.floor(this.expReward * (GameState.expMultiplier || 1))
    if (window.dropManager) {
      const dropType = window.dropManager.getDropTypeForEnemy(this.constructor.name)
      window.dropManager.spawnDrop(this.x, this.y, dropType)
    }
  }

  update(deltaTime, player) { /* 서브클래스에서 구현 */ }
  render(ctx) { /* 서브클래스에서 구현 */ }
}

// ============================================================
// BoxBot — HP 30, 속도 80, 직진형
// ============================================================
class BoxBot extends Enemy {
  constructor(x, y) {
    super(x, y, {
      hp: 30, speed: 80, damage: 10,
      expReward: 5, scoreReward: 5,
      collisionRadius: 14,
    })
  }

  update(deltaTime, player) {
    if (!this.isAlive()) return
    const dx = player.x - this.x
    const dy = player.y - this.y
    const dist = Math.sqrt(dx * dx + dy * dy)
    if (dist > 0) {
      this.x += (dx / dist) * this.speed * deltaTime
      this.y += (dy / dist) * this.speed * deltaTime
      this._facingLeft = dx < 0
    }
    this._updateAnim(deltaTime, dist > 1)
  }

  render(ctx) {
    if (!this.isAlive()) return
    if (this._renderSprite(ctx)) { _drawHpBar(ctx, this, 28); return }
    const x = this.x, y = this.y
    // 박스 본체
    ctx.fillStyle = '#C8AA7A'
    ctx.fillRect(x - 13, y - 13, 26, 22)
    ctx.strokeStyle = '#8B6914'
    ctx.lineWidth = 1.5
    ctx.strokeRect(x - 13, y - 13, 26, 22)
    // 테이프 (수평/수직 크로스)
    ctx.strokeStyle = '#E8CC88'
    ctx.lineWidth = 2
    ctx.beginPath(); ctx.moveTo(x - 13, y - 2); ctx.lineTo(x + 13, y - 2); ctx.stroke()
    ctx.beginPath(); ctx.moveTo(x, y - 13); ctx.lineTo(x, y + 9); ctx.stroke()
    // 눈 (픽셀)
    const blink = Math.floor(Date.now() / 1200) % 8 !== 0
    ctx.fillStyle = '#1a1a1a'
    if (blink) {
      ctx.fillRect(x - 8, y - 10, 5, 4)
      ctx.fillRect(x + 3, y - 10, 5, 4)
    } else {
      ctx.fillRect(x - 8, y - 8, 5, 2)
      ctx.fillRect(x + 3, y - 8, 5, 2)
    }
    // 팔 (양 옆 작은 돌출)
    ctx.fillStyle = '#A88050'
    ctx.fillRect(x - 18, y - 5, 5, 8)
    ctx.fillRect(x + 13, y - 5, 5, 8)
    // 발
    ctx.fillRect(x - 10, y + 9, 7, 5)
    ctx.fillRect(x + 3, y + 9, 7, 5)
    _drawHpBar(ctx, this, 28)
  }
}

// ============================================================
// CartBot — 블루패치 HP 55, 속도 130, 갑작스런 빠른 돌진
// ============================================================
class CartBot extends Enemy {
  constructor(x, y) {
    super(x, y, {
      hp: 55, speed: 130, damage: 15,
      expReward: 10, scoreReward: 10,
      collisionRadius: 16,
    })
    this.dashTimer = 0
    this.dashCooldown = 2.5
    this.isDashing = false
    this.dashDuration = 0
    this.dashDx = 0
    this.dashDy = 0
    this._dashWarnTimer = 0
    this._dashWarning = false
  }

  update(deltaTime, player) {
    if (!this.isAlive()) return
    if (!deltaTime || isNaN(deltaTime) || deltaTime <= 0) return

    const dx = player.x - this.x
    const dy = player.y - this.y
    const dist = Math.sqrt(dx * dx + dy * dy)

    this.dashTimer += deltaTime

    // 돌진 0.3초 전 경고 깜빡임
    if (!this.isDashing && this.dashTimer >= this.dashCooldown - 0.3) {
      this._dashWarning = true
    }

    if (!this.isDashing && this.dashTimer >= this.dashCooldown) {
      this.isDashing = true
      this._dashWarning = false
      this.dashTimer = 0
      this.dashDuration = 0
      if (dist > 0) {
        this.dashDx = dx / dist
        this.dashDy = dy / dist
      } else {
        // dist=0: 임의 방향으로 돌진 (NaN 방지)
        const angle = Math.random() * Math.PI * 2
        this.dashDx = Math.cos(angle)
        this.dashDy = Math.sin(angle)
      }
    }

    if (this.isDashing) {
      this.dashDuration += deltaTime
      this.x += this.dashDx * this.speed * 2.8 * deltaTime
      this.y += this.dashDy * this.speed * 2.8 * deltaTime
      if (this.dashDuration >= 0.5) {
        this.isDashing = false
        this.dashDuration = 0
      }
    } else {
      if (dist > 0) {
        this.x += (dx / dist) * this.speed * deltaTime
        this.y += (dy / dist) * this.speed * deltaTime
        this._facingLeft = dx < 0
      }
    }
    // NaN 위치 전파 방지
    if (isNaN(this.x) || isNaN(this.y)) {
      this.x = player.x + 100
      this.y = player.y
    }
    this._updateAnim(deltaTime, true)
  }

  render(ctx) {
    if (!this.isAlive()) return
    if (this._renderSprite(ctx)) {
      // 돌진 경고 표시
      if (this._dashWarning && !this.isDashing) {
        const blink = Math.floor(Date.now() / 120) % 2 === 0
        if (blink) {
          ctx.save()
          ctx.strokeStyle = '#ff4400'
          ctx.lineWidth = 2
          ctx.shadowColor = '#ff4400'
          ctx.shadowBlur = 8
          ctx.beginPath()
          ctx.arc(this.x, this.y, 22, 0, Math.PI * 2)
          ctx.stroke()
          ctx.restore()
        }
      }
      _drawHpBar(ctx, this, 32); return
    }
    const x = this.x, y = this.y
    const dash = this.isDashing
    ctx.save()
    if (dash) {
      ctx.shadowColor = '#FF6600'
      ctx.shadowBlur = 16
    }
    // 카트 바구니 (와이어 느낌)
    ctx.strokeStyle = dash ? '#FFAA44' : '#E8833A'
    ctx.lineWidth = 2.5
    ctx.strokeRect(x - 14, y - 8, 28, 18)
    // 카트 안쪽 격자
    ctx.lineWidth = 1
    ctx.strokeStyle = dash ? '#FF8822' : '#C06020'
    ctx.beginPath(); ctx.moveTo(x - 7, y - 8); ctx.lineTo(x - 7, y + 10); ctx.stroke()
    ctx.beginPath(); ctx.moveTo(x + 7, y - 8); ctx.lineTo(x + 7, y + 10); ctx.stroke()
    ctx.beginPath(); ctx.moveTo(x - 14, y + 2); ctx.lineTo(x + 14, y + 2); ctx.stroke()
    // 손잡이
    ctx.lineWidth = 2.5
    ctx.strokeStyle = dash ? '#FFCC44' : '#CC7730'
    ctx.beginPath(); ctx.moveTo(x - 10, y - 8); ctx.lineTo(x - 10, y - 16); ctx.lineTo(x + 10, y - 16); ctx.lineTo(x + 10, y - 8); ctx.stroke()
    // 바퀴
    ctx.fillStyle = '#222'
    ctx.beginPath(); ctx.arc(x - 9, y + 13, 5, 0, Math.PI * 2); ctx.fill()
    ctx.beginPath(); ctx.arc(x + 9, y + 13, 5, 0, Math.PI * 2); ctx.fill()
    ctx.strokeStyle = '#555'
    ctx.lineWidth = 1.5
    ctx.beginPath(); ctx.arc(x - 9, y + 13, 5, 0, Math.PI * 2); ctx.stroke()
    ctx.beginPath(); ctx.arc(x + 9, y + 13, 5, 0, Math.PI * 2); ctx.stroke()
    ctx.restore()
    _drawHpBar(ctx, this, 32)
  }
}

// ============================================================
// PCBot — 모니터헤드 HP 80, 속도 70, 원거리, 스캔 빔, 방해 구역
// ============================================================
class PCBot extends Enemy {
  constructor(x, y) {
    super(x, y, {
      hp: 80, speed: 70, damage: 12,
      expReward: 15, scoreReward: 15,
      collisionRadius: 18,
    })
    this.shootTimer = 0
    this.shootInterval = 2.5
    this.hazardTimer = 0
    this.hazardInterval = 6.0
    this.preferredMin = 150
    this.preferredMax = 250
    // 스캔 빔
    this.scanTimer = 0
    this.scanInterval = 10.0
    this.scanBeam = null   // { tx, ty, life, maxLife }
  }

  onKilled() {
    GameState.killCount++
    GameState.pcBotKills = (GameState.pcBotKills || 0) + 1
    GameState.score += this.scoreReward * 5
    GameState.playerExp += Math.floor(this.expReward * (GameState.expMultiplier || 1))
    if (window.dropManager) {
      const dropType = window.dropManager.getDropTypeForEnemy(this.constructor.name)
      window.dropManager.spawnDrop(this.x, this.y, dropType)
    }
  }

  update(deltaTime, player) {
    if (!this.isAlive()) return
    if (!deltaTime || isNaN(deltaTime) || deltaTime <= 0) return
    deltaTime = Math.min(deltaTime, 0.1)

    const dx = player.x - this.x
    const dy = player.y - this.y
    const dist = Math.sqrt(dx * dx + dy * dy)

    // 거리 유지 이동
    if (dist > 0) {
      if (dist < this.preferredMin) {
        this.x -= (dx / dist) * this.speed * deltaTime
        this.y -= (dy / dist) * this.speed * deltaTime
      } else if (dist > this.preferredMax) {
        this.x += (dx / dist) * this.speed * deltaTime
        this.y += (dy / dist) * this.speed * deltaTime
      }
    }

    // 오류탄 발사 (투사체 30개 이하일 때만)
    this.shootTimer += deltaTime
    if (this.shootTimer >= this.shootInterval) {
      this.shootTimer = 0
      if ((GameState.projectiles?.length || 0) < 30) {
        GameState.projectiles.push(new ErrorBullet(this.x, this.y, player.x, player.y))
      }
    }

    // 스캔 빔 — 최대 사거리 220px
    const MAX_BEAM_RANGE = 220
    this.scanTimer += deltaTime
    if (this.scanTimer >= this.scanInterval) {
      this.scanTimer = 0
      if (dist > 0) {
        const beamLen = Math.min(dist, MAX_BEAM_RANGE)
        this.scanBeam = {
          tx: this.x + (dx / dist) * beamLen,
          ty: this.y + (dy / dist) * beamLen,
          life: 2.0, maxLife: 2.0,
        }
      }
    }
    if (this.scanBeam) {
      this.scanBeam.life -= deltaTime
      // 빔 지속 중 플레이어가 빔 선 위에 있으면 데미지
      if (this.scanBeam.life > 0) {
        const bx = this.scanBeam.tx - this.x
        const by = this.scanBeam.ty - this.y
        const bLen = Math.sqrt(bx * bx + by * by) || 1
        const px2 = player.x - this.x
        const py2 = player.y - this.y
        const proj = (px2 * bx + py2 * by) / (bLen * bLen)
        const clampedProj = Math.max(0, Math.min(1, proj))
        const closestX = this.x + clampedProj * bx
        const closestY = this.y + clampedProj * by
        const beamDist = Math.sqrt((player.x - closestX) ** 2 + (player.y - closestY) ** 2)
        if (beamDist < 14 && !(this._beamDamageCooldown > 0)) {
          player.takeDamage(8)
          this._beamDamageCooldown = 0.4
        }
      } else {
        this.scanBeam = null
      }
    }
    if (this._beamDamageCooldown > 0) this._beamDamageCooldown -= deltaTime

    // 방해 구역 생성
    this.hazardTimer += deltaTime
    if (this.hazardTimer >= this.hazardInterval) {
      this.hazardTimer = 0
      if (!GameState.hazardZones) GameState.hazardZones = []
      GameState.hazardZones.push(new HazardZone(this.x, this.y))
    }

    this._facingLeft = (player.x - this.x) < 0
    this._updateAnim(deltaTime, true)
  }

  render(ctx) {
    if (!this.isAlive()) return
    // 스캔 빔 렌더 (스프라이트 아래 레이어)
    if (this.scanBeam && this.scanBeam.life > 0) {
      const alpha = Math.min(1, this.scanBeam.life / 0.4) * 0.85
      ctx.save()
      ctx.globalAlpha = alpha
      ctx.strokeStyle = '#00ffcc'
      ctx.lineWidth = 3
      ctx.shadowColor = '#00ffcc'
      ctx.shadowBlur = 12
      ctx.beginPath()
      ctx.moveTo(this.x, this.y)
      ctx.lineTo(this.scanBeam.tx, this.scanBeam.ty)
      ctx.stroke()
      // 빔 끝 점
      ctx.fillStyle = '#00ffcc'
      ctx.beginPath()
      ctx.arc(this.scanBeam.tx, this.scanBeam.ty, 6, 0, Math.PI * 2)
      ctx.fill()
      ctx.restore()
    }
    if (this._renderSprite(ctx)) { _drawHpBar(ctx, this, 36); return }
    const x = this.x, y = this.y
    const t = Date.now()
    // 본체 (PC 타워)
    ctx.fillStyle = '#9A9A9A'
    ctx.fillRect(x - 10, y - 6, 20, 22)
    ctx.strokeStyle = '#666'
    ctx.lineWidth = 1
    ctx.strokeRect(x - 10, y - 6, 20, 22)
    // 드라이브 슬롯
    ctx.fillStyle = '#555'
    ctx.fillRect(x - 7, y, 14, 3)
    ctx.fillRect(x - 7, y + 5, 14, 3)
    // 전원 버튼 (깜빡임)
    ctx.fillStyle = Math.floor(t / 800) % 2 === 0 ? '#00FF44' : '#009922'
    ctx.beginPath(); ctx.arc(x + 5, y - 2, 2.5, 0, Math.PI * 2); ctx.fill()
    // CRT 모니터
    ctx.fillStyle = '#555'
    ctx.fillRect(x - 16, y - 32, 32, 24)
    ctx.fillStyle = '#111'
    ctx.fillRect(x - 14, y - 30, 28, 20)
    // 화면 (글리치 or 에러)
    const glitch = Math.floor(t / 200) % 10 === 0
    ctx.fillStyle = glitch ? '#FF2200' : '#003300'
    ctx.fillRect(x - 12, y - 28, 24, 16)
    // 코드 라인들
    ctx.fillStyle = glitch ? '#FF6644' : '#00CC44'
    ctx.fillRect(x - 10, y - 26, 14, 2)
    ctx.fillRect(x - 10, y - 22, 18, 2)
    ctx.fillRect(x - 10, y - 18, 10, 2)
    // 커서
    if (Math.floor(t / 500) % 2 === 0) {
      ctx.fillStyle = '#00FF88'
      ctx.fillRect(x - 2, y - 18, 3, 8)
    }
    // 모니터 받침
    ctx.fillStyle = '#666'
    ctx.fillRect(x - 4, y - 8, 8, 3)
    _drawHpBar(ctx, this, 36)
  }
}

// ============================================================
// MirrorBot — 제럴드 HP 150, 속도 160, 친근접근 후 연속 2회 베기
// ============================================================
class MirrorBot extends Enemy {
  constructor(x, y) {
    super(x, y, {
      hp: 150, speed: 160, damage: 20,
      expReward: 30, scoreReward: 30,
      collisionRadius: 15,
    })
    // 행동 상태: 'approach'(천천히 접근) | 'slash1' | 'pause' | 'slash2' | 'retreat'
    this.slashPhase = 'approach'
    this.slashTimer = 0
    this.slashCooldown = 3.5  // 다음 베기 사이클까지
    this.slashCycleTimer = 0
    this.slashDx = 0
    this.slashDy = 0
    this._slashEffect = null   // { life, maxLife, ex, ey }
  }

  update(deltaTime, player) {
    if (!this.isAlive()) return
    if (!deltaTime || isNaN(deltaTime) || deltaTime <= 0) return

    const dx = player.x - this.x
    const dy = player.y - this.y
    const dist = Math.sqrt(dx * dx + dy * dy)

    if (this.slashPhase === 'approach') {
      // 친근하게 천천히 접근 (느린 속도)
      if (dist > 0) {
        this.x += (dx / dist) * this.speed * 0.65 * deltaTime
        this.y += (dy / dist) * this.speed * 0.65 * deltaTime
      }
      this.slashCycleTimer += deltaTime
      // 근거리(60px)에 오거나 타이머 경과 시 베기 시작
      if (dist < 70 || this.slashCycleTimer >= this.slashCooldown) {
        this.slashCycleTimer = 0
        this.slashPhase = 'slash1'
        this.slashTimer = 0
        if (dist > 0) {
          this.slashDx = dx / dist
          this.slashDy = dy / dist
        } else {
          // dist=0: 임의 방향 (NaN 방지)
          const angle = Math.random() * Math.PI * 2
          this.slashDx = Math.cos(angle)
          this.slashDy = Math.sin(angle)
        }
      }

    } else if (this.slashPhase === 'slash1') {
      // 첫 번째 베기: 빠른 돌진
      this.x += this.slashDx * this.speed * 3.5 * deltaTime
      this.y += this.slashDy * this.speed * 3.5 * deltaTime
      this.slashTimer += deltaTime
      if (this.slashTimer >= 0.18) {
        this.slashPhase = 'pause'
        this.slashTimer = 0
        // 베기 이펙트
        this._slashEffect = { life: 0.25, maxLife: 0.25, ex: this.x + this.slashDx * 30, ey: this.y + this.slashDy * 30 }
      }

    } else if (this.slashPhase === 'pause') {
      // 잠깐 멈춤
      this.slashTimer += deltaTime
      if (this.slashTimer >= 0.22) {
        this.slashPhase = 'slash2'
        this.slashTimer = 0
        // 두 번째 베기 방향 갱신 (dist=0 || 1 로 NaN 방지)
        const dx2 = player.x - this.x, dy2 = player.y - this.y
        const d2 = Math.sqrt(dx2 * dx2 + dy2 * dy2) || 1
        this.slashDx = dx2 / d2
        this.slashDy = dy2 / d2
      }

    } else if (this.slashPhase === 'slash2') {
      // 두 번째 베기
      this.x += this.slashDx * this.speed * 3.5 * deltaTime
      this.y += this.slashDy * this.speed * 3.5 * deltaTime
      this.slashTimer += deltaTime
      if (this.slashTimer >= 0.18) {
        this.slashPhase = 'retreat'
        this.slashTimer = 0
        this._slashEffect = { life: 0.25, maxLife: 0.25, ex: this.x + this.slashDx * 30, ey: this.y + this.slashDy * 30 }
      }

    } else if (this.slashPhase === 'retreat') {
      // 살짝 물러남
      if (dist > 0) {
        this.x -= (dx / dist) * this.speed * 1.2 * deltaTime
        this.y -= (dy / dist) * this.speed * 1.2 * deltaTime
      }
      this.slashTimer += deltaTime
      if (this.slashTimer >= 0.5) {
        this.slashPhase = 'approach'
        this.slashTimer = 0
      }
    } else {
      // 알 수 없는 상태 복구
      this.slashPhase = 'approach'
      this.slashTimer = 0
    }

    if (this._slashEffect) {
      this._slashEffect.life -= deltaTime
      if (this._slashEffect.life <= 0) this._slashEffect = null
    }

    // NaN 위치 전파 방지
    if (isNaN(this.x) || isNaN(this.y)) {
      this.x = player.x + 80
      this.y = player.y
      this.slashPhase = 'approach'
    }

    this._facingLeft = (player.x - this.x) < 0
    this._updateAnim(deltaTime, this.slashPhase === 'slash1' || this.slashPhase === 'slash2' || this.slashPhase === 'approach')
  }

  onKilled() {
    GameState.killCount++
    GameState.mirrorBotKills = (GameState.mirrorBotKills || 0) + 1
    GameState.score += this.scoreReward * 5
    GameState.playerExp += this.expReward
    if (window.dropManager) {
      const dropType = window.dropManager.getDropTypeForEnemy(this.constructor.name)
      window.dropManager.spawnDrop(this.x, this.y, dropType)
    }
  }

  render(ctx) {
    if (!this.isAlive()) return
    // 베기 이펙트
    if (this._slashEffect && this._slashEffect.life > 0) {
      const a = this._slashEffect.life / this._slashEffect.maxLife
      ctx.save()
      ctx.globalAlpha = a
      ctx.strokeStyle = '#ffdd44'
      ctx.lineWidth = 4
      ctx.shadowColor = '#ffdd44'
      ctx.shadowBlur = 10
      for (let i = 0; i < 3; i++) {
        const angle = -0.4 + i * 0.4
        ctx.beginPath()
        ctx.moveTo(this.x, this.y)
        ctx.lineTo(
          this._slashEffect.ex + Math.cos(angle) * 24,
          this._slashEffect.ey + Math.sin(angle) * 24
        )
        ctx.stroke()
      }
      ctx.restore()
    }
    if (this._renderSprite(ctx)) { _drawHpBar(ctx, this, 32); return }
    const x = this.x, y = this.y
    const isDashing = this.slashPhase === 'slash1' || this.slashPhase === 'slash2'
    ctx.save()
    // 돌진 잔상
    if (isDashing) {
      ctx.globalAlpha = 0.25
      ctx.fillStyle = '#C0C0FF'
      ctx.fillRect(x - 10 - 12, y - 9, 20, 30)
      ctx.globalAlpha = 0.12
      ctx.fillRect(x - 10 - 22, y - 9, 20, 30)
      ctx.globalAlpha = 1
      ctx.shadowColor = '#8888FF'
      ctx.shadowBlur = 18
    }
    // 다리
    ctx.fillStyle = isDashing ? '#E0E0FF' : '#A8A8B8'
    ctx.fillRect(x - 9, y + 11, 7, 13)
    ctx.fillRect(x + 2, y + 11, 7, 13)
    // 발 (약간 넓게)
    ctx.fillRect(x - 11, y + 21, 9, 4)
    ctx.fillRect(x + 2, y + 21, 9, 4)
    // 몸통
    ctx.fillStyle = isDashing ? '#E8E8FF' : '#C0C0C8'
    ctx.fillRect(x - 11, y - 10, 22, 22)
    // 몸통 하이라이트 (반사)
    ctx.fillStyle = 'rgba(255,255,255,0.3)'
    ctx.fillRect(x - 9, y - 8, 6, 18)
    // 머리
    ctx.fillStyle = isDashing ? '#E8E8FF' : '#C8C8D8'
    ctx.beginPath()
    ctx.arc(x, y - 19, 10, 0, Math.PI * 2)
    ctx.fill()
    // 머리 하이라이트
    ctx.fillStyle = 'rgba(255,255,255,0.35)'
    ctx.beginPath()
    ctx.arc(x - 3, y - 22, 5, 0, Math.PI * 2)
    ctx.fill()
    // 눈
    ctx.fillStyle = isDashing ? '#FF3333' : '#6666FF'
    ctx.shadowColor = isDashing ? '#FF3333' : '#6666FF'
    ctx.shadowBlur = 8
    ctx.fillRect(x - 6, y - 23, 4, 4)
    ctx.fillRect(x + 2, y - 23, 4, 4)
    ctx.restore()
    _drawHpBar(ctx, this, 32)
  }
}

// ============================================================
// AIBot — 미러워커 HP 600, 속도 200, 보스, 충격파, 카트봇 소환
// ============================================================
class AIBot extends Enemy {
  constructor(x, y) {
    super(x, y, {
      hp: 600, speed: 200, damage: 35,
      expReward: 200, scoreReward: 200,
      collisionRadius: 25,
    })
    this.dashTimer = 0
    this.dashInterval = 5.0
    this.isDashing = false
    this.dashDuration = 0
    this.dashDx = 0
    this.dashDy = 0

    this.shockwaveTimer = 0
    this.shockwaveInterval = 8.0

    this.summonTimer = 0
    this.summonInterval = 20.0
    this.hasSummonedOnHalf = false

    // 등장 이벤트
    GameState.aiBotReached = true

    // 플레이어 클론 애니메이션 상태
    this._mirrorFrame = 0
    this._mirrorTimer = 0
  }

  update(deltaTime, player) {
    if (!this.isAlive()) return

    const dx = player.x - this.x
    const dy = player.y - this.y
    const dist = Math.sqrt(dx * dx + dy * dy)

    // 돌진
    this.dashTimer += deltaTime
    if (!this.isDashing && this.dashTimer >= this.dashInterval) {
      this.isDashing = true
      this.dashTimer = 0
      this.dashDuration = 0
      if (dist > 0) {
        this.dashDx = dx / dist
        this.dashDy = dy / dist
      }
    }

    if (this.isDashing) {
      this.dashDuration += deltaTime
      this.x += this.dashDx * this.speed * 3 * deltaTime
      this.y += this.dashDy * this.speed * 3 * deltaTime
      if (this.dashDuration >= 0.8) this.isDashing = false
    } else {
      if (dist > 0) {
        this.x += (dx / dist) * this.speed * deltaTime
        this.y += (dy / dist) * this.speed * deltaTime
      }
    }

    // 충격파 (8초마다, 200px 이내)
    this.shockwaveTimer += deltaTime
    if (this.shockwaveTimer >= this.shockwaveInterval) {
      this.shockwaveTimer = 0
      if (dist < 200) {
        player.takeDamage(40)
        // 넉백: 플레이어를 AIBot 반대 방향으로 120px
        if (dist > 0) {
          const nx = dx / dist
          const ny = dy / dist
          player.x = Math.max(20, Math.min(780, player.x + nx * 120))
          player.y = Math.max(20, Math.min(580, player.y + ny * 120))
        }
      }
    }

    // HP 50% 이하 — 카트봇 소환 (20초마다)
    if (this.hp <= this.maxHp * 0.5) {
      this.summonTimer += deltaTime
      if (this.summonTimer >= this.summonInterval) {
        this.summonTimer = 0
        const offsets = [
          { x: this.x + 120, y: this.y + 80 },
          { x: this.x - 120, y: this.y - 80 },
        ]
        for (const pos of offsets) {
          GameState.enemies.push(new CartBot(
            Math.max(20, Math.min(780, pos.x)),
            Math.max(20, Math.min(580, pos.y))
          ))
        }
      }
    }

    this._facingLeft = (player.x - this.x) < 0
    this._updateAnim(deltaTime, true)
  }

  onKilled() {
    GameState.killCount++
    GameState.aiBotKilled = true
    GameState.bossKilled = true
    GameState.score += this.scoreReward * 5
    GameState.playerExp += this.expReward
    // 보스 처치 연출: 화면 전체 폭발 이펙트 알림
    GameState.bossDeathAnnounce = { timer: 3.5, maxTimer: 3.5 }
    if (window.dropManager) {
      const dropType = window.dropManager.getDropTypeForEnemy(this.constructor.name)
      window.dropManager.spawnDrop(this.x, this.y, dropType)
    }
  }

  render(ctx) {
    if (!this.isAlive()) return

    const charKey = window.GameState?.selectedCharacter || 'adam'
    const spr = window.CHAR_SPRITES?.[charKey]
    const cfg = window.CHAR_CONFIGS?.[charKey]
    const moving = (this.vx !== 0 || this.vy !== 0)
    const animCfg = cfg ? (moving ? cfg.walk : cfg.idle) : null
    const img = spr ? (moving ? spr.walk : spr.idle) : null

    // advance animation
    if (animCfg) {
      this._mirrorTimer += 1/60
      const frameDur = 1 / (animCfg.fps || 8)
      while (this._mirrorTimer >= frameDur) {
        this._mirrorTimer -= frameDur
        this._mirrorFrame = (this._mirrorFrame + 1) % (animCfg.frames || 1)
      }
    }

    const scale = cfg?.scale || 3
    const fw = animCfg?.fw || 32
    const fh = animCfg?.fh || 32
    const dw = Math.round(fw * scale)
    const dh = Math.round(fh * scale)
    const rx = Math.round(this.x - dw / 2)
    const ry = Math.round(this.y - dh * (cfg?.yAnchor || 0.8))

    if (img?.complete && img.naturalWidth > 0) {
      // 1. Black aura (radial gradient behind sprite)
      ctx.save()
      const auraCX = this.x
      const auraCY = this.y - dh * 0.4
      const auraR = dw * 1.1
      const grd = ctx.createRadialGradient(auraCX, auraCY, 0, auraCX, auraCY, auraR)
      grd.addColorStop(0, 'rgba(0,0,0,0.55)')
      grd.addColorStop(0.5, 'rgba(0,0,0,0.25)')
      grd.addColorStop(1, 'rgba(0,0,0,0)')
      ctx.fillStyle = grd
      ctx.fillRect(auraCX - auraR, auraCY - auraR, auraR * 2, auraR * 2)
      ctx.restore()

      // 2. Sprite with red outline
      ctx.save()
      ctx.shadowColor = '#ff2222'
      ctx.shadowBlur = 16
      ctx.imageSmoothingEnabled = fw > 16
      const sx = this._mirrorFrame * fw
      // flip if moving left
      if (this.vx < 0) {
        ctx.translate(rx + dw, ry)
        ctx.scale(-1, 1)
        ctx.drawImage(img, sx, 0, fw, fh, 0, 0, dw, dh)
      } else {
        ctx.drawImage(img, sx, 0, fw, fh, rx, ry, dw, dh)
      }
      ctx.imageSmoothingEnabled = false
      ctx.restore()

      // HP bar
      _drawHpBar(ctx, this, dw)
      return
    }

    // fallback: red circle with outline
    ctx.save()
    ctx.shadowColor = '#ff2222'
    ctx.shadowBlur = 16
    ctx.fillStyle = '#cc0000'
    ctx.beginPath()
    ctx.arc(this.x, this.y, 22, 0, Math.PI * 2)
    ctx.fill()
    ctx.restore()
    _drawHpBar(ctx, this, 44)
  }
}

// ============================================================
// ErrorBullet — PCBot 오류탄
// ============================================================
class ErrorBullet {
  constructor(x, y, tx, ty) {
    this.x = x
    this.y = y
    const dx = tx - x
    const dy = ty - y
    const d = Math.sqrt(dx * dx + dy * dy) || 1
    this.vx = (dx / d) * 80
    this.vy = (dy / d) * 80
    this.alive = true
    this.radius = 6
  }

  update(deltaTime, player) {
    this.x += this.vx * deltaTime
    this.y += this.vy * deltaTime

    // 화면 밖 제거
    if (this.x < -60 || this.x > 860 || this.y < -60 || this.y > 660) {
      this.alive = false
      return
    }

    // 플레이어 충돌
    const dx = player.x - this.x
    const dy = player.y - this.y
    const pRadius = player.collisionRadius || 15
    if (Math.sqrt(dx * dx + dy * dy) < this.radius + pRadius) {
      this.alive = false
      player.takeDamage(12)
      if (player.applyBuff) player.applyBuff('speed', 0.7, 2)
    }
  }

  render(ctx) {
    ctx.save()
    ctx.fillStyle = '#FF4444'
    ctx.shadowColor = '#FF0000'
    ctx.shadowBlur = 8
    ctx.beginPath()
    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2)
    ctx.fill()
    ctx.restore()
  }
}

// ============================================================
// HazardZone — PCBot 방해 구역 (반경 80px, 4초 지속)
// ============================================================
class HazardZone {
  constructor(x, y) {
    this.x = x
    this.y = y
    this.radius = 80
    this.duration = 4.0
    this.elapsed = 0
    this.alive = true
    this.damageCooldown = 0
  }

  update(deltaTime, player) {
    this.elapsed += deltaTime
    this.damageCooldown -= deltaTime

    if (this.elapsed >= this.duration) {
      this.alive = false
      return
    }

    const dx = player.x - this.x
    const dy = player.y - this.y
    if (Math.sqrt(dx * dx + dy * dy) < this.radius && this.damageCooldown <= 0) {
      player.takeDamage(8)
      this.damageCooldown = 0.5
    }
  }

  render(ctx) {
    const fade = 1 - this.elapsed / this.duration
    ctx.save()
    ctx.globalAlpha = fade * 0.30
    ctx.fillStyle = '#FF3300'
    ctx.beginPath()
    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2)
    ctx.fill()
    ctx.globalAlpha = fade * 0.65
    ctx.strokeStyle = '#FF6600'
    ctx.lineWidth = 2
    ctx.stroke()
    ctx.restore()
  }
}

  <script>
// entities/skills.js — M4: 스킬 확장
// 액티브 7종 (Q/W/E/R 슬롯) + 패시브 2종

// ---------------------------------------------------------------------------
// 시각 이펙트 저장소
// ---------------------------------------------------------------------------

const _skillEffects = []

function addEffect(effect) {
  _skillEffects.push(effect)
}

// ---------------------------------------------------------------------------
// VFX 스프라이트시트 사전 로드 (Free Pixel Effects Pack, 100×100px/frame)
// ---------------------------------------------------------------------------
const _VFX = {}
;(function _loadVFX() {
  const DIR = 'assets/packs/Free Pixel Effects Pack'
  const MAP = {
    fire:       '11_fire_spritesheet.png',        // 긴급수정
    magickahit: '5_magickahit_spritesheet.png',   // 디버그
    vortex:     '13_vortex_spritesheet.png',      // 우선순위정리
    brightfire: '9_brightfire_spritesheet.png',   // 커피
    protection: '8_protectioncircle_spritesheet.png', // 피규어청소
    bluefire:   '3_bluefire_spritesheet.png',     // 강아지
    nebula:     '12_nebula_spritesheet.png',      // 낮잠
  }
  for (const [key, file] of Object.entries(MAP)) {
    const img = new Image()
    img.src = DIR + '/' + file
    _VFX[key] = img
  }
})()

function updateAndRenderEffects(ctx, deltaTime) {
  for (let i = _skillEffects.length - 1; i >= 0; i--) {
    const e = _skillEffects[i]
    e.life -= deltaTime
    if (e.life <= 0) { _skillEffects.splice(i, 1); continue }
    const alpha = e.life / e.maxLife
    ctx.save()
    ctx.globalAlpha = alpha
    if (e.type === 'circle') {
      ctx.beginPath()
      ctx.arc(e.x, e.y, e.radius, 0, Math.PI * 2)
      ctx.strokeStyle = e.color
      ctx.lineWidth = 3
      ctx.stroke()
    } else if (e.type === 'hit') {
      ctx.fillStyle = e.color
      ctx.beginPath()
      ctx.arc(e.x, e.y, e.radius * (1 - alpha * 0.5), 0, Math.PI * 2)
      ctx.fill()
    } else if (e.type === 'fan') {
      ctx.beginPath()
      ctx.moveTo(e.x, e.y)
      ctx.arc(e.x, e.y, e.radius, e.startAngle, e.endAngle)
      ctx.closePath()
      ctx.fillStyle = e.color
      ctx.fill()
    } else if (e.type === 'beam') {
      ctx.strokeStyle = e.color
      ctx.lineWidth = e.width || 3
      ctx.shadowColor = e.color
      ctx.shadowBlur = 10
      ctx.beginPath()
      ctx.moveTo(e.x, e.y)
      ctx.lineTo(e.x2, e.y2)
      ctx.stroke()
    } else if (e.type === 'burst') {
      const elapsed = 1 - alpha
      ctx.fillStyle = e.color
      ctx.shadowColor = e.color
      ctx.shadowBlur = 4
      for (let j = 0; j < e.count; j++) {
        const angle = (j / e.count) * Math.PI * 2
        const r = e.radius * elapsed
        const px = e.x + Math.cos(angle) * r
        const py = e.y + Math.sin(angle) * r
        ctx.beginPath()
        ctx.arc(px, py, 3, 0, Math.PI * 2)
        ctx.fill()
      }
    } else if (e.type === 'float') {
      const floatY = e.y - (1 - alpha) * 36
      ctx.fillStyle = e.color
      ctx.font = e.font || 'bold 10px "Press Start 2P", monospace'
      ctx.textAlign = 'center'
      ctx.shadowColor = e.color
      ctx.shadowBlur = 6
      ctx.fillText(e.text, e.x, floatY)
      ctx.textAlign = 'left'
    } else if (e.type === 'sprite') {
      // VFX 스프라이트시트 애니메이션
      if (e.img?.complete && e.img.naturalWidth > 0) {
        e.frameTimer = (e.frameTimer || 0) + deltaTime
        const frameDur = 1 / (e.fps || 24)
        if (e.frameTimer >= frameDur) {
          e.frameTimer -= frameDur
          e.frame = ((e.frame || 0) + 1) % (e.totalFrames || 1)
        }
        const fw = e.fw || 100
        const fh = e.fh || 100
        const cols = e.cols || Math.floor(e.img.naturalWidth / fw)
        const col = (e.frame || 0) % cols
        const row = Math.floor((e.frame || 0) / cols)
        const size = e.size || 128
        ctx.imageSmoothingEnabled = true
        ctx.drawImage(e.img, col * fw, row * fh, fw, fh, e.x - size / 2, e.y - size / 2, size, size)
        ctx.imageSmoothingEnabled = false
      }
    }
    ctx.restore()
  }
}

// ---------------------------------------------------------------------------
// SkillManager
// ---------------------------------------------------------------------------

class SkillManager {
  constructor(player) {
    this.player = player
    // 4개 슬롯 (Q/W/E/R) — 액티브 스킬 전용
    this.slots = [null, null, null, null]
    this.cooldowns = [0, 0, 0, 0]

    // 패시브 스킬 (슬롯 없음)
    this.passives = new Set()
    this.autoSaveTimer = 0   // 자동 저장 타이머
    this.napTimer = 0        // 낮잠자기 남은 시간 (>0 이면 진행 중)

    // 스킬 데이터 정의
    this.skillDefs = {
      // ── 기존 스킬 ──
      '긴급수정': {
        name: '긴급 패치',
        type: 'active',
        cooldown: 5,
        level: 1,
        activate: (sm) => sm._emergencyFix(),
      },
      '디버그': {
        name: '디버그',
        type: 'active',
        cooldown: 2.5,
        level: 1,
        activate: (sm) => sm._debug(),
      },
      // ── M4 액티브 스킬 ──
      '우선순위정리': {
        name: '고성방가',
        type: 'active',
        cooldown: 6,
        level: 1,
        activate: (sm) => sm._prioritySort(),
      },
      '커피': {
        name: '커피 한 잔',
        type: 'active',
        cooldown: 20,
        level: 1,
        activate: (sm) => sm._coffee(),
      },
      '피규어청소': {
        name: '멘탈관리',
        type: 'active',
        cooldown: 12,
        level: 1,
        activate: (sm) => sm._cleanFigure(),
      },
      '강아지': {
        name: '쓰다듬기',
        type: 'active',
        cooldown: 15,
        level: 1,
        activate: (sm) => sm._petDog(),
      },
      '낮잠': {
        name: '낮잠자기',
        type: 'active',
        cooldown: 30,
        level: 1,
        activate: (sm) => sm._nap(),
      },
      // ── M4 패시브 스킬 ──
      '자동저장': {
        name: '자동 저장',
        type: 'passive',
        level: 1,
      },
      '산책': {
        name: '산책하기',
        type: 'passive',
        level: 1,
      },
    }
  }

  update(deltaTime) {
    // 쿨다운 감소
    for (let i = 0; i < 4; i++) {
      if (this.cooldowns[i] > 0) this.cooldowns[i] = Math.max(0, this.cooldowns[i] - deltaTime)
    }

    // 자동 저장 패시브: 12초마다 보호막 1 충전
    if (this.passives.has('자동저장')) {
      this.autoSaveTimer += deltaTime
      if (this.autoSaveTimer >= 12) {
        this.autoSaveTimer = 0
        this.player.addShield(1)
        addEffect({ type: 'circle', x: this.player.x, y: this.player.y, radius: 32, color: '#44aaff', life: 0.5, maxLife: 0.5 })
      }
    }

    // 낮잠자기 타이머: 1.5초 경과 시 HP 50% 회복
    if (this.napTimer > 0) {
      this.napTimer -= deltaTime
      if (this.napTimer <= 0) {
        this.napTimer = 0
        const healAmt = Math.floor(this.player.maxHp * 0.5 * (GameState.healMultiplier || 1))
        this.player.heal(healAmt)
        addEffect({ type: 'circle', x: this.player.x, y: this.player.y, radius: 50, color: '#88ff88', life: 0.6, maxLife: 0.6 })
      }
    }
  }

  activateSkill(slot) {
    const skillId = this.slots[slot]
    if (!skillId) return
    if (this.cooldowns[slot] > 0) return
    const def = this.skillDefs[skillId]
    if (!def || def.type === 'passive') return
    def.activate(this)
    this.cooldowns[slot] = def.cooldown
  }

  assignSkill(slot, skillId) {
    this.slots[slot] = skillId
    this.cooldowns[slot] = 0
  }

  // 패시브 스킬 습득 (슬롯 불필요)
  assignPassive(skillId) {
    this.passives.add(skillId)
    if (skillId === '산책') {
      // 이동속도 +30% 영구 적용
      this.player.applyBuff('speed', 1.3, Infinity)
    }
    if (skillId === '자동저장') {
      this.autoSaveTimer = 0
    }
  }

  upgradeSkill(skillId) {
    const def = this.skillDefs[skillId]
    if (def) def.level = Math.min(4, (def.level || 1) + 1)
  }

  getSkillState(slot) {
    const skillId = this.slots[slot]
    if (!skillId) return { isEmpty: true }
    const def = this.skillDefs[skillId]
    if (!def) return { isEmpty: true }
    return {
      isEmpty: false,
      name: def.name,
      cooldownRemaining: this.cooldowns[slot],
      cooldownMax: def.cooldown,
      level: def.level || 1,
      isPassive: def.type === 'passive',
    }
  }

  renderEffects(ctx, deltaTime) {
    updateAndRenderEffects(ctx, deltaTime)
  }

  // ── 스킬 구현 ──────────────────────────────────────────────────────────────

  // 긴급 수정: 반경 120px 내 모든 적에게 피해 40
  _emergencyFix() {
    const p = this.player
    const def = this.skillDefs['긴급수정']
    let radius = 120
    let damage = 40
    if (def.level >= 2) damage += 20
    if (def.level >= 3) radius += 40
    if (def.level >= 4 && def.cooldown > 3) def.cooldown = 3
    damage = Math.floor(damage * (GameState.skillDamageMult || 1))

    for (const enemy of GameState.enemies) {
      if (!enemy.isAlive()) continue
      const dx = enemy.x - p.x
      const dy = enemy.y - p.y
      if (Math.sqrt(dx * dx + dy * dy) <= radius) {
        enemy.takeDamage(damage)
        addEffect({ type: 'hit', x: enemy.x, y: enemy.y, radius: 10, color: '#ffaa00', life: 0.3, maxLife: 0.3 })
      }
    }
    addEffect({ type: 'circle', x: p.x, y: p.y, radius, color: '#ffaa00', life: 0.4, maxLife: 0.4 })
    addEffect({ type: 'burst', x: p.x, y: p.y, count: 14, radius: radius * 0.7, color: '#ffcc44', life: 0.45, maxLife: 0.45 })
    addEffect({ type: 'float', x: p.x, y: p.y - 20, text: 'BUG FIX!', color: '#ffaa00', life: 0.6, maxLife: 0.6 })
    addEffect({ type: 'sprite', img: _VFX.fire, x: p.x, y: p.y, fw: 100, fh: 100, fps: 30, totalFrames: 24, size: 200, life: 0.8, maxLife: 0.8 })
  }

  // 디버그: 가장 가까운 적 1명(Lv3+: 2명)에게 피해 70
  _debug() {
    const p = this.player
    const def = this.skillDefs['디버그']
    let damage = 70
    let targetCount = 1
    if (def.level >= 2) damage += 30
    if (def.level >= 3) targetCount = 2
    if (def.level >= 4 && def.cooldown > 1.5) def.cooldown = 1.5
    damage = Math.floor(damage * (GameState.skillDamageMult || 1))

    const alive = GameState.enemies.filter(e => e.isAlive())
    alive.sort((a, b) => {
      const da = (a.x - p.x) ** 2 + (a.y - p.y) ** 2
      const db = (b.x - p.x) ** 2 + (b.y - p.y) ** 2
      return da - db
    })

    for (let i = 0; i < Math.min(targetCount, alive.length); i++) {
      alive[i].takeDamage(damage)
      addEffect({ type: 'hit', x: alive[i].x, y: alive[i].y, radius: 14, color: '#44ffaa', life: 0.4, maxLife: 0.4 })
      addEffect({ type: 'beam', x: p.x, y: p.y, x2: alive[i].x, y2: alive[i].y, color: '#44ffaa', width: 4, life: 0.2, maxLife: 0.2 })
      addEffect({ type: 'sprite', img: _VFX.magickahit, x: alive[i].x, y: alive[i].y, fw: 100, fh: 100, fps: 30, totalFrames: 20, size: 120, life: 0.67, maxLife: 0.67 })
    }
    addEffect({ type: 'float', x: p.x, y: p.y - 20, text: 'DEBUG', color: '#44ffaa', life: 0.5, maxLife: 0.5 })
  }

  // 우선순위 정리: 전방 부채꼴(120°) 160px, 피해 30, 넉백 100px, 쿨 7초
  _prioritySort() {
    const p = this.player
    const radius = 160
    const damage = Math.floor(30 * (GameState.skillDamageMult || 1))
    const knockbackDist = 100
    const halfAngle = Math.PI / 3   // ±60° = 총 120°

    const facingAngle = Math.atan2(p.lastDirY, p.lastDirX)

    for (const enemy of GameState.enemies) {
      if (!enemy.isAlive()) continue
      const dx = enemy.x - p.x
      const dy = enemy.y - p.y
      const dist = Math.sqrt(dx * dx + dy * dy)
      if (dist > radius) continue

      let diff = Math.atan2(dy, dx) - facingAngle
      while (diff >  Math.PI) diff -= 2 * Math.PI
      while (diff < -Math.PI) diff += 2 * Math.PI

      if (Math.abs(diff) <= halfAngle) {
        enemy.takeDamage(damage)
        if (dist > 0) {
          enemy.x = Math.max(20, Math.min(780, enemy.x + (dx / dist) * knockbackDist))
          enemy.y = Math.max(20, Math.min(580, enemy.y + (dy / dist) * knockbackDist))
        }
        addEffect({ type: 'hit', x: enemy.x, y: enemy.y, radius: 8, color: '#ff8844', life: 0.3, maxLife: 0.3 })
      }
    }
    addEffect({
      type: 'fan',
      x: p.x, y: p.y,
      radius,
      startAngle: facingAngle - halfAngle,
      endAngle: facingAngle + halfAngle,
      color: 'rgba(255,136,68,0.4)',
      life: 0.35, maxLife: 0.35,
    })
    addEffect({ type: 'sprite', img: _VFX.vortex, x: p.x, y: p.y, fw: 100, fh: 100, fps: 28, totalFrames: 22, size: 180, life: 0.8, maxLife: 0.8 })
  }

  // 커피 한 잔: 이동속도 +40% (5초), 현재 쿨다운 20% 단축, 쿨 20초
  _coffee() {
    const p = this.player
    p.applyBuff('speed', 1.4, 5)
    for (let i = 0; i < 4; i++) {
      if (this.cooldowns[i] > 0) this.cooldowns[i] *= 0.8
    }
    addEffect({ type: 'circle', x: p.x, y: p.y, radius: 40, color: '#ffdd44', life: 0.5, maxLife: 0.5 })
    addEffect({ type: 'burst', x: p.x, y: p.y, count: 10, radius: 55, color: '#ffdd44', life: 0.5, maxLife: 0.5 })
    addEffect({ type: 'float', x: p.x, y: p.y - 20, text: '+SPEED', color: '#ffdd44', life: 0.8, maxLife: 0.8, font: 'bold 10px "Press Start 2P", monospace' })
    addEffect({ type: 'sprite', img: _VFX.brightfire, x: p.x, y: p.y, fw: 100, fh: 100, fps: 24, totalFrames: 20, size: 110, life: 0.83, maxLife: 0.83 })
  }

  // 피규어 청소하기: 받는 피해 -40% (4초), 주변 150px 적 넉백 120px, 쿨 12초
  _cleanFigure() {
    const p = this.player
    p.applyBuff('damageReduction', 0.4, 4)

    for (const enemy of GameState.enemies) {
      if (!enemy.isAlive()) continue
      const dx = enemy.x - p.x
      const dy = enemy.y - p.y
      const dist = Math.sqrt(dx * dx + dy * dy)
      if (dist <= 150 && dist > 0) {
        enemy.x = Math.max(20, Math.min(780, enemy.x + (dx / dist) * 120))
        enemy.y = Math.max(20, Math.min(580, enemy.y + (dy / dist) * 120))
      }
    }
    addEffect({ type: 'circle', x: p.x, y: p.y, radius: 150, color: '#aaddff', life: 0.5, maxLife: 0.5 })
    addEffect({ type: 'burst', x: p.x, y: p.y, count: 12, radius: 140, color: '#aaddff', life: 0.5, maxLife: 0.5 })
    addEffect({ type: 'float', x: p.x, y: p.y - 20, text: 'GUARD', color: '#aaddff', life: 0.7, maxLife: 0.7 })
    addEffect({ type: 'sprite', img: _VFX.protection, x: p.x, y: p.y, fw: 100, fh: 100, fps: 24, totalFrames: 28, size: 190, life: 1.17, maxLife: 1.17 })
  }

  // 강아지 쓰다듬기: 최대 HP 25% 회복, 쿨 15초 (20→15 밸런스 조정)
  _petDog() {
    const p = this.player
    const healAmt = Math.floor(p.maxHp * 0.25 * (GameState.healMultiplier || 1))
    p.heal(healAmt)
    addEffect({ type: 'circle', x: p.x, y: p.y, radius: 28, color: '#ff88bb', life: 0.6, maxLife: 0.6 })
    addEffect({ type: 'burst', x: p.x, y: p.y, count: 8, radius: 48, color: '#ff88bb', life: 0.6, maxLife: 0.6 })
    addEffect({ type: 'float', x: p.x, y: p.y - 20, text: '+HP', color: '#ff88bb', life: 0.8, maxLife: 0.8, font: 'bold 12px "Press Start 2P", monospace' })
    addEffect({ type: 'sprite', img: _VFX.bluefire, x: p.x, y: p.y, fw: 100, fh: 100, fps: 24, totalFrames: 20, size: 100, life: 0.83, maxLife: 0.83 })
  }

  // 낮잠자기: 이동 1.5초 정지 후 HP 50% 회복, 쿨 30초
  _nap() {
    if (this.napTimer > 0) return
    this.player.applyBuff('speed', 0, 1.5)
    this.napTimer = 1.5
    addEffect({ type: 'circle', x: this.player.x, y: this.player.y, radius: 22, color: '#8888ff', life: 1.5, maxLife: 1.5 })
    addEffect({ type: 'float', x: this.player.x, y: this.player.y - 30, text: 'zzz', color: '#aaaaff', life: 1.5, maxLife: 1.5, font: 'bold 12px "Press Start 2P", monospace' })
    addEffect({ type: 'sprite', img: _VFX.nebula, x: this.player.x, y: this.player.y, fw: 100, fh: 100, fps: 18, totalFrames: 27, size: 90, life: 1.5, maxLife: 1.5 })
  }

/**
 * systems/tilemap.js — 스크롤 가능한 2400×1800 오피스 월드

 * 캔버스: 800×600 (뷰포트), 월드: 2400×1800

 */

window.WORLD_H = 1800

  const TILE  = 16
  const SCALE = 2
  const TSIZE = TILE * SCALE  // 32px

  const WORLD_COLS = window.WORLD_W / TSIZE  // 75
  const WORLD_ROWS = Math.floor(window.WORLD_H / TSIZE)  // 56

  // ─── 세계 타일맵 생성 ────────────────────────────────────
  // 여러 오피스 구역이 이어지는 대형 맵
  // F=기본바닥  A=변형바닥  D=어두운바닥  C=카펫  W=벽
  const F = 'F', A = 'A', D = 'D', C = 'C', W = 'W'

  // 75×56 맵을 구역별로 생성
  function _buildWorldMap() {
    const map = []
    for (let r = 0; r < WORLD_ROWS; r++) {
      map.push(new Array(WORLD_COLS).fill(F))
    }

    // 벽 경계 (맵 전체 테두리)
    for (let c = 0; c < WORLD_COLS; c++) {
      map[0][c] = W; map[WORLD_ROWS - 1][c] = W
    }
    for (let r = 0; r < WORLD_ROWS; r++) {
      map[r][0] = W; map[r][WORLD_COLS - 1] = W
    }

    // ── 구역 1: 개발팀 오피스 (좌상단) ────────────────
    // 책상 구역 (카펫 패턴)
    _fillRect(map, 2, 2, 20, 8, C)
    _fillRect(map, 3, 3, 4, 3, A)    // 책상 1
    _fillRect(map, 9, 3, 4, 3, A)    // 책상 2
    _fillRect(map, 15, 3, 4, 3, A)   // 책상 3

    // 구역 2: 회의실 (상단 중앙)
    _fillRect(map, 26, 2, 22, 12, D)
    _fillRect(map, 29, 4, 16, 7, C)  // 회의 테이블

    // 구역 3: 서버실 (상단 우측)
    _fillRect(map, 52, 2, 20, 10, D)
    _fillRect(map, 54, 4, 4, 6, A)
    _fillRect(map, 60, 4, 4, 6, A)
    _fillRect(map, 66, 4, 4, 6, A)

    // ── 구역 4: 메인 오픈플랜 오피스 (중앙) ──────────
    _fillRect(map, 2, 14, 70, 24, F)

      _fillRect(map, baseC+8, baseR, 5, 4, C)
      _fillRect(map, baseC,   baseR+7, 5, 4, C)

    _fillRect(map, 14, 42, 5, 5, D)  // 자판기 구역

    // ── 구역 6: 중간 복도 ─────────────────────────────
    _fillRect(map, 2, 12, 70, 2, D)   // 수평 복도

    _fillRect(map, 36, 2,  2, 52, D)  // 수직 복도

    // ── 구역 7: 기획팀 오피스 (중앙 우측) ────────────
    _fillRect(map, 40, 14, 30, 24, F)

    _fillRect(map, 58, 16, 10, 8, C)
    _fillRect(map, 42, 27, 12, 8, A)
    _fillRect(map, 58, 27, 10, 8, A)

    // ── 구역 8: 보스룸 (하단 우측) ───────────────────
    _fillRect(map, 52, 40, 20, 14, D)

    _fillRect(map, 36, 43, 8, 6, D)

    return map

      // ── 오피스 프랍 렌더 (타일 위, 적/플레이어 아래) ──
      for (const p of _props) {
        if (!p.img.complete || p.img.naturalWidth === 0) continue
        const sx = p.x - cx
        const sy = p.y - cy
        const dw = p.img.naturalWidth  * SCALE
        const dh = p.img.naturalHeight * SCALE
        // 뷰포트 밖이면 스킵 (컬링)
        if (sx + dw < 0 || sx > 800 || sy + dh < 0 || sy > 600) continue
        ctx.drawImage(p.img, sx, sy, dw, dh)
      }
    },
  }
})()

  <script>
// ============================================================
// spawner.js — M3: 스폰 타임라인 확장 (GDD Part 4.4)
// 신규 적 첫 등장 알림 포함
// CartBot / PCBot / MirrorBot / AIBot 스폰 추가
// ErrorBullet / HazardZone 업데이트 & 렌더링 처리
// ============================================================

const ENEMY_INTRO_DATA = {
  'BoxBot':    { name: '박스봇',    desc: '돌진형 • 판지 갑옷을 두른 기초 드론, 직선 돌진' },
  'CartBot':   { name: '블루패치',  desc: '신속형 • 이동 보정 AI 덧씌워진 패치봇, 갑자기 빠르게 돌진' },
  'PCBot':     { name: '모니터헤드', desc: '원거리형 • 스캔 빔으로 개발자를 조준, 오류탄 발사' },
  'MirrorBot': { name: '제럴드',    desc: '근접형 • 친근하게 접근 후 연속 2회 베기 시전' },
  'AIBot':     { name: '미러워커',  desc: '보스 • 개발자의 능력을 완전히 학습, 모든 패턴 재현' },
}

const SPAWN_TIMELINE = [
  { from: 0,   to: 30,  types: ['BoxBot'],                    interval: 0.6, maxEnemies: 12 },  // BoxBot 2×
  { from: 30,  to: 60,  types: ['BoxBot', 'CartBot'],         interval: 2.5, maxEnemies: 8  },  // CartBot 80%
  { from: 60,  to: 100, types: ['CartBot', 'PCBot'],          interval: 2.3, maxEnemies: 10 },  // CartBot 80%
  { from: 100, to: 130, types: ['CartBot', 'PCBot'],          interval: 1.9, maxEnemies: 12 },  // CartBot 80%
  { from: 130, to: 155, types: ['MirrorBot', 'CartBot'],      interval: 2.5, maxEnemies: 8  },  // CartBot 80%
  { from: 155, to: 170, types: ['MirrorBot', 'CartBot', 'PCBot'], interval: 2.5, maxEnemies: 10 },  // CartBot 80%
]

class Spawner {
  constructor() {
    this.spawnTimer = 0
    this.aiBotSpawned = false
    this._announcedTypes = new Set()
  }

  update(deltaTime) {
    if (!GameState.isRunning || GameState.isPaused) return

    const player = Game.player
    if (!player) return

    // hazardZones 배열 보장
    if (!GameState.hazardZones) GameState.hazardZones = []

    const t = GameState.gameTime
    const aliveCount = GameState.enemies.filter(e => e.isAlive()).length

    // ── 2:50 이후: AIBot 단독 등장 ──────────────────────────
    if (t >= 170) {
      if (!this.aiBotSpawned) {
        this.aiBotSpawned = true
        GameState.aiBotIntro = true
        GameState.aiBotIntroTimer = 0
        const pos = this._randomEdgePosition()
        GameState.enemies.push(new AIBot(pos.x, pos.y))
      }
    } else {
      // ── 일반 스폰 타임라인 ────────────────────────────────
      const phase = SPAWN_TIMELINE.find(p => t >= p.from && t < p.to)
      if (phase) {
        this.spawnTimer += deltaTime
        if (this.spawnTimer >= phase.interval && aliveCount < phase.maxEnemies) {
          this.spawnTimer = 0
          this._spawnEnemy(phase.types)
        }
      }
    }

    // ── 죽은 적 정리 & 업데이트 ──────────────────────────────
    GameState.enemies = GameState.enemies.filter(e => e.isAlive())
    for (const enemy of GameState.enemies) {
      enemy.update(deltaTime, player)
    }

    // ── 투사체 업데이트 & 정리 ───────────────────────────────
    GameState.projectiles = GameState.projectiles.filter(p => p.alive)
    for (const p of GameState.projectiles) {
      p.update(deltaTime, player)
    }

    // ── 방해 구역 업데이트 & 정리 ────────────────────────────
    GameState.hazardZones = GameState.hazardZones.filter(h => h.alive)
    for (const h of GameState.hazardZones) {
      h.update(deltaTime, player)
    }
  }

  _spawnEnemy(types) {
    const pos = this._randomEdgePosition()
    const type = types[Math.floor(Math.random() * types.length)]
    let enemy
    switch (type) {
      case 'BoxBot':    enemy = new BoxBot(pos.x, pos.y);    break
      case 'CartBot':   enemy = new CartBot(pos.x, pos.y);   break
      case 'PCBot':     enemy = new PCBot(pos.x, pos.y);     break
      case 'MirrorBot': enemy = new MirrorBot(pos.x, pos.y); break
      default:          enemy = new BoxBot(pos.x, pos.y)
    }
    GameState.enemies.push(enemy)

    // 신규 적 유형 첫 등장 알림
    if (!this._announcedTypes.has(type)) {
      this._announcedTypes.add(type)
      const info = ENEMY_INTRO_DATA[type]
      if (info) {
        GameState.enemyAnnouncement = { name: info.name, desc: info.desc, timer: 3.2, maxTimer: 3.2 }
      }
    }
  }

  _randomEdgePosition() {
    const margin = 40
    const camX = window.Camera?.x || 0
    const camY = window.Camera?.y || 0
    const WW = window.WORLD_W || 800
    const WH = window.WORLD_H || 600
    const side = Math.floor(Math.random() * 4)
    let x, y
    switch (side) {
      case 0: x = camX + Math.random() * 800; y = camY - margin; break          // 위
      case 1: x = camX + Math.random() * 800; y = camY + 600 + margin; break    // 아래
      case 2: x = camX - margin; y = camY + Math.random() * 600; break          // 왼쪽
      default: x = camX + 800 + margin; y = camY + Math.random() * 600; break   // 오른쪽
    }
    // 월드 경계 클램프
    x = Math.max(40, Math.min(WW - 40, x))
    y = Math.max(40, Math.min(WH - 40, y))
    return { x, y }
  }

  // game.js의 렌더 루프에서 호출
  renderEnemies(ctx) {
    // 방해 구역 (바닥 레이어)
    if (GameState.hazardZones) {
      for (const h of GameState.hazardZones) h.render(ctx)
    }
    // 적
    for (const enemy of GameState.enemies) {
      enemy.render(ctx)
    }
    // 투사체 (상단 레이어)
    for (const p of GameState.projectiles) {
      p.render(ctx)
    }
  }
}

// 자동 등록
window.Spawner = Spawner
const _spawnerInstance = new Spawner()
if (window.Game) {
  Game.registerEnemySystem(_spawnerInstance)
} else {
  window.addEventListener('gameReady', () => {
    Game.registerEnemySystem(_spawnerInstance)
  })
}

  </script>

// ============================================================
// drops.js — Gold Drop System (T033)
// Mason (systems agent)
// ============================================================

// Gold item render size
const GOLD_ICON_SIZE = 31  // 44 × 0.7

// Preload gold images (explicit paths so asset validator can resolve them)
const _goldImgs = {}
;(function () {
  const paths = {
    1: 'assets/icon/gold_1.png',
    2: 'assets/icon/gold_2.png',
    3: 'assets/icon/gold_3.png',
    4: 'assets/icon/gold_4.png',
  }
  for (const [k, src] of Object.entries(paths)) {
    const img = new Image()
    img.src = src
    _goldImgs[k] = img
  }
})()

class DropManager {
  constructor() {
    this.items = [] // { x, y, type, life, maxLife, pickupRadius }
  }

  spawnDrop(x, y, type) {
    this.items.push({ x, y, type, life: 8, maxLife: 8, pickupRadius: 28, bobTime: 0 })
  }

  getDropTypeForEnemy(enemyClass) {
    const t = window.GameState?.gameTime || 0
    // AIBot (Mirror Bot boss) always drops gold_4
    if (enemyClass === 'AIBot') return 4
    // MirrorBot (전사봇) drops gold_3
    if (enemyClass === 'MirrorBot') return 3
    // Time-based for others
    if (t < 60) return 1
    return 2
  }

  update(deltaTime, player) {
    if (!player) return
    for (let i = this.items.length - 1; i >= 0; i--) {
      const item = this.items[i]
      item.life -= deltaTime
      if (item.life <= 0) {
        this.items.splice(i, 1)
        continue
      }

      item.bobTime = (item.bobTime || 0) + deltaTime

      // Pickup collision check
      const dx = player.x - item.x
      const dy = player.y - item.y
      if (Math.sqrt(dx * dx + dy * dy) < item.pickupRadius) {
        this._pickup(item, i)
      }
    }
  }

  _pickup(item, idx) {
    const type = item.type
    if (!window.GameState.goldInventory) {
      window.GameState.goldInventory = { 1: 0, 2: 0, 3: 0, 4: 0 }
    }
    window.GameState.goldInventory[type] = (window.GameState.goldInventory[type] || 0) + 1

    // gold_4 는 영구 저장 (뱀파이어 해금 재화)
    if (type === 4) {
      const stored = parseInt(localStorage.getItem('devSurvivor_gold4') || '0')
      localStorage.setItem('devSurvivor_gold4', stored + 1)
    }

    // Floating pickup text
    if (window.Game?.addFloatingText) {
      window.Game.addFloatingText(item.x, item.y - 20, `+gold_${type}`, '#FFD700', 1.2)
    }

    // Flying gold animation toward HUD
    if (window._hud?.spawnFlyingGold) {
      window._hud.spawnFlyingGold(item.x, item.y, type)
    }

    // Pickup event for unlock system
    window.GameState.lastPickedGold = type

    this.items.splice(idx, 1)
  }

  render(ctx) {
    for (const item of this.items) {
      const img = _goldImgs[item.type]
      // Fade out in last 2 seconds
      const alpha = item.life < 2 ? item.life / 2 : 1
      const bob = Math.sin((item.bobTime || 0) * Math.PI * 2.5) * 4  // ±4px, 2.5 Hz
      const drawY = item.y - GOLD_ICON_SIZE / 2 + bob
      ctx.save()
      ctx.globalAlpha = alpha
      if (img?.complete && img.naturalWidth > 0) {
        ctx.shadowColor = '#FFD700'
        ctx.shadowBlur = 8
        ctx.drawImage(img, item.x - GOLD_ICON_SIZE / 2, drawY, GOLD_ICON_SIZE, GOLD_ICON_SIZE)
        ctx.shadowBlur = 0
      } else {
        ctx.shadowColor = '#FFD700'
        ctx.shadowBlur = 8
        ctx.fillStyle = '#FFD700'
        ctx.beginPath()
        ctx.arc(item.x, item.y + bob, 8, 0, Math.PI * 2)
        ctx.fill()
        ctx.shadowBlur = 0
      }
      ctx.restore()
    }
  }

  reset() {
    this.items = []
  }
}

window.DropManager = DropManager
const _dropManager = new DropManager()
window.dropManager = _dropManager

const _luIconCache = {}
function _getLUIcon(skillId) {
  if (!skillId) return null
  const src = _LU_ICON_BY_ID[skillId]
  if (!src) return null
  if (!_luIconCache[skillId]) {
    const img = new Image(); img.src = src
    _luIconCache[skillId] = img

}

// ---------------------------------------------------------------------------
// ctx.roundRect 폴리필 (구형 브라우저 대비)
// ---------------------------------------------------------------------------
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
    const radius = Math.min(r, w / 2, h / 2)
    this.moveTo(x + radius, y)
    this.lineTo(x + w - radius, y)
    this.arcTo(x + w, y, x + w, y + radius, radius)
    this.lineTo(x + w, y + h - radius)
    this.arcTo(x + w, y + h, x + w - radius, y + h, radius)
    this.lineTo(x + radius, y + h)
    this.arcTo(x, y + h, x, y + h - radius, radius)
    this.lineTo(x, y + radius)
    this.arcTo(x, y, x + radius, y, radius)
    this.closePath()
    return this
  }
}

    type: 'newSkill',
    skillId: '우선순위정리',

  '커피_신규': {
    label: '커피 한 잔',
    desc: '속도 +40% (5초), 쿨다운 -20%, 쿨 20초',
    type: 'newSkill',

// ---------------------------------------------------------------------------
// LevelUpManager
// ---------------------------------------------------------------------------
class LevelUpManager {
  constructor() {
    this.pendingLevelUp = false
    this.choices = []
    this.choiceRects = []    // 클릭 감지용 { x, y, w, h }
    this._checkLevel = 1
  }

  update() {
    if (this.pendingLevelUp) return
    const lvl = GameState.playerLevel
    if (lvl >= EXP_THRESHOLDS.length) return  // 최대 레벨
    const needed = EXP_THRESHOLDS[lvl]        // 다음 레벨 필요 누적 경험치
    if (GameState.playerExp >= needed) {
      GameState.playerLevel++
      this._triggerLevelUp()
    }
  }

  _triggerLevelUp() {
    this.pendingLevelUp = true
    this.flashStartTime = performance.now()
    this.choices = this._generateChoices()
    Game.pause()
  }

  _generateChoices() {
    const sm = Game.skillManager
    const ownedSlots = sm ? sm.slots.filter(Boolean) : []
    const activePassives = sm ? [...sm.passives] : []
    const hasEmptySlot = sm ? sm.slots.some(s => s === null) : false
    const choices = []

    // 미보유 액티브 스킬 신규 선택지 (빈 슬롯 있을 때만)
    if (hasEmptySlot) {
      if (!ownedSlots.includes('긴급수정'))    choices.push(LEVEL_UP_CHOICES['긴급수정_신규'])
      if (!ownedSlots.includes('디버그'))      choices.push(LEVEL_UP_CHOICES['디버그_신규'])
      if (!ownedSlots.includes('우선순위정리')) choices.push(LEVEL_UP_CHOICES['우선순위정리_신규'])
      if (!ownedSlots.includes('커피'))        choices.push(LEVEL_UP_CHOICES['커피_신규'])
      if (!ownedSlots.includes('피규어청소'))  choices.push(LEVEL_UP_CHOICES['피규어청소_신규'])
      if (!ownedSlots.includes('강아지'))      choices.push(LEVEL_UP_CHOICES['강아지_신규'])
      if (!ownedSlots.includes('낮잠'))        choices.push(LEVEL_UP_CHOICES['낮잠_신규'])
    }

    // 보유 스킬 강화 선택지
    if (ownedSlots.includes('긴급수정')) choices.push(LEVEL_UP_CHOICES['긴급수정_강화'])
    if (ownedSlots.includes('디버그'))   choices.push(LEVEL_UP_CHOICES['디버그_강화'])

    // 미보유 패시브 스킬
    if (!activePassives.includes('자동저장')) choices.push(LEVEL_UP_CHOICES['자동저장_신규'])
    if (!activePassives.includes('산책'))     choices.push(LEVEL_UP_CHOICES['산책_신규'])

    // 기본 능력 강화 (항상 풀에 포함)
    choices.push(LEVEL_UP_CHOICES['hp강화'])
    choices.push(LEVEL_UP_CHOICES['speed강화'])

    // 랜덤 3개 선택
    const shuffled = choices.sort(() => Math.random() - 0.5)
    return shuffled.slice(0, 3)
  }

  applyChoice(index) {
    if (index < 0 || index >= this.choices.length) return
    const choice = this.choices[index]
    const sm = Game.skillManager
    const player = Game.player

    if (choice.type === 'newSkill' && sm) {
      const emptySlot = sm.slots.findIndex(s => s === null)
      if (emptySlot !== -1) sm.assignSkill(emptySlot, choice.skillId)
    } else if (choice.type === 'upgradeSkill' && sm) {
      sm.upgradeSkill(choice.skillId)
    } else if (choice.type === 'passiveSkill' && sm) {
      sm.assignPassive(choice.skillId)
    } else if (choice.type === 'statBoost' && player) {
      choice.apply(player)
    }

    this.pendingLevelUp = false
    this.choices = []
    this.choiceRects = []
    Game.resume()
  }

  handleClick(x, y) {
    if (!this.pendingLevelUp) return
    for (let i = 0; i < this.choiceRects.length; i++) {
      const r = this.choiceRects[i]
      if (x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h) {
        this.applyChoice(i)
        return
      }
    }
  }

  render(ctx) {
    if (!this.pendingLevelUp) return

    // 황금빛 광원 플래시 (0.4초)
    const elapsed = (performance.now() - this.flashStartTime) / 1000
    if (elapsed < 0.4) {
      const flashAlpha = (1 - elapsed / 0.4) * 0.7
      const grad = ctx.createRadialGradient(400, 300, 0, 400, 300, 400)
      grad.addColorStop(0, `rgba(255, 215, 0, ${flashAlpha})`)
      grad.addColorStop(0.5, `rgba(255, 160, 0, ${flashAlpha * 0.4})`)
      grad.addColorStop(1, 'rgba(0,0,0,0)')
      ctx.fillStyle = grad
      ctx.fillRect(0, 0, 800, 600)
    }

    // 반투명 오버레이
    ctx.fillStyle = 'rgba(0,0,0,0.75)'
    ctx.fillRect(0, 0, 800, 600)

    // 제목
    ctx.fillStyle = '#FFD700'
    ctx.font = 'bold 36px "VT323", monospace'
    ctx.textAlign = 'center'
    ctx.fillText(`Level Up!  Lv ${GameState.playerLevel - 1} → ${GameState.playerLevel}`, 400, 160)

    ctx.font = '18px "VT323", monospace'
    ctx.fillStyle = '#aaaaaa'
    ctx.fillText('클릭하거나 1 / 2 / 3 키로 선택하세요', 400, 190)

    // 카드 3개
    this.choiceRects = []
    const cardW = 220, cardH = 270
    const startX = 400 - (cardW * 1.5 + 20)

    for (let i = 0; i < this.choices.length; i++) {
      const c = this.choices[i]
      const cx = startX + i * (cardW + 20)
      const cy = 200

      // 카드 배경 — ui-pack-4 다크 패널 (9-slice)
      if (window.drawUIPanel) {
        drawUIPanel(ctx, cx, cy, cardW, cardH)
      } else {
        ctx.fillStyle = '#1e2a4a'
        ctx.strokeStyle = '#4466aa'
        ctx.lineWidth = 2
        ctx.beginPath()
        ctx.roundRect(cx, cy, cardW, cardH, 8)
        ctx.fill()
        ctx.stroke()
      }

      // ── 상단 아이콘 박스 (카드 상단 중앙) ────────────────────────────
      const icon = _getLUIcon(c.skillId)
      const iconSize = 80
      const iconX = cx + (cardW - iconSize) / 2
      const iconY = cy + 22
      // 박스 배경
      ctx.fillStyle = 'rgba(10,20,55,0.9)'
      ctx.fillRect(iconX, iconY, iconSize, iconSize)
      ctx.strokeStyle = c.skillId ? '#4488cc' : '#2a3a55'
      ctx.lineWidth = 1.5
      ctx.strokeRect(iconX, iconY, iconSize, iconSize)
      if (icon?.complete && icon.naturalWidth > 0) {
        ctx.imageSmoothingEnabled = true
        ctx.drawImage(icon, 0, 0, icon.naturalWidth, icon.naturalHeight, iconX + 4, iconY + 4, iconSize - 8, iconSize - 8)
        ctx.imageSmoothingEnabled = false
      } else if (c.skillId) {
        // 로딩 중 플레이스홀더
        ctx.fillStyle = 'rgba(68,102,170,0.25)'
        ctx.fillRect(iconX + 4, iconY + 4, iconSize - 8, iconSize - 8)
      }

      // 키 레이블 (좌상단)
      const cardKeys = ['1', '2', '3']
      ctx.fillStyle = '#aaccff'
      ctx.font = 'bold 15px "VT323", monospace'
      ctx.textAlign = 'left'
      ctx.fillText(`[${cardKeys[i]}]`, cx + 8, cy + 18)

      // 스킬 이름 (아이콘 아래 중앙)
      ctx.fillStyle = '#ffffff'
      ctx.font = 'bold 18px "VT323", monospace'
      ctx.textAlign = 'center'
      ctx.fillText(c.label, cx + cardW / 2, cy + 118)

      // 구분선
      ctx.strokeStyle = 'rgba(80,120,200,0.4)'
      ctx.lineWidth = 1
      ctx.beginPath()
      ctx.moveTo(cx + 10, cy + 128)
      ctx.lineTo(cx + cardW - 10, cy + 128)
      ctx.stroke()

      // 설명 (슬래시·불릿 기준 줄바꿈 + 긴 줄 wrapText)
      ctx.fillStyle = '#aabbdd'
      ctx.font = '13px "VT323", monospace'
      ctx.textAlign = 'left'
      const _descMaxW = cardW - 24
      const descParts = c.desc.split(/\s*\/\s*|\s*•\s*/).filter(Boolean)
      let lineY = cy + 148
      for (const part of descParts) {
        if (lineY > cy + cardH - 12) break
        // 긴 줄 단어 단위 줄바꿈
        const words = part.trim().split(' ')
        let line = ''
        for (const word of words) {
          const test = line ? line + ' ' + word : word
          if (ctx.measureText(test).width > _descMaxW && line) {
            if (lineY <= cy + cardH - 12) ctx.fillText(line, cx + 12, lineY)
            lineY += 18
            line = word
          } else {
            line = test
          }
        }
        if (line && lineY <= cy + cardH - 12) ctx.fillText(line, cx + 12, lineY)
        lineY += 18
      }

      this.choiceRects.push({ x: cx, y: cy, w: cardW, h: cardH })

      // 카드 하단 화살표 버튼 힌트 (ui-pack-4 Arrows)
      if (window.drawUIArrow) {
        const arrowY = cy + cardH + 6
        const arrowSize = 20
        // 왼쪽 카드 → 왼쪽 화살표, 오른쪽 카드 → 오른쪽 화살표, 가운데는 양쪽
        if (i === 0) drawUIArrow(ctx, 'right', 'purple', cx + cardW - arrowSize - 4, arrowY, arrowSize)
        if (i === 1) {
          drawUIArrow(ctx, 'left',  'purple', cx + 4,             arrowY, arrowSize)
          drawUIArrow(ctx, 'right', 'purple', cx + cardW - arrowSize - 4, arrowY, arrowSize)
        }
        if (i === 2) drawUIArrow(ctx, 'left', 'purple', cx + 4, arrowY, arrowSize)
      }
    }

    ctx.textAlign = 'left'
  }

}

// ---------------------------------------------------------------------------
// 전역 노출 및 이벤트 등록
// ---------------------------------------------------------------------------

window.LevelUpManager = LevelUpManager

const _levelUpManager = new LevelUpManager()
window._levelUpManager = _levelUpManager

// 클릭 이벤트 등록
window.addEventListener('click', (e) => {
  const canvas = document.getElementById('gameCanvas')
  if (!canvas) return
  const rect = canvas.getBoundingClientRect()
  const scaleX = 800 / rect.width
  const scaleY = 600 / rect.height
  const x = (e.clientX - rect.left) * scaleX
  const y = (e.clientY - rect.top) * scaleY
  _levelUpManager.handleClick(x, y)
})

// 키보드 1/2/3 선택
window.addEventListener('keydown', (e) => {
  if (!_levelUpManager.pendingLevelUp) return
  if (e.code === 'Digit1') _levelUpManager.applyChoice(0)
  if (e.code === 'Digit2') _levelUpManager.applyChoice(1)
  if (e.code === 'Digit3') _levelUpManager.applyChoice(2)
})

  </script>

  <script>
// GDD Part 6.1 스코어 공식
function calculateFinalScore() {
  const s = GameState
  const survivalScore = Math.floor(s.gameTime) * 10
  const killScore = (s.basicKills || 0) * 5
               + (s.pcBotKills || 0) * 10
               + (s.mirrorBotKills || 0) * 30
  const aiBonus = (s.aiBotReached ? 500 : 0)
               + (s.aiBotKilled ? 1500 : 0)
  const hpBonus = Game.player ? Math.floor(Game.player.hp * 2) : 0
  const progressBonus = s.releaseProgress >= 100 ? 300 : 0
  return survivalScore + killScore + aiBonus + hpBonus + progressBonus
}

// 매 프레임 호출: 출시 진행률 업데이트 (시간 기반)
function updateReleaseProgress(deltaTime) {
  if (!GameState.isRunning || GameState.isPaused) return
  GameState.releaseProgress = Math.min(100, GameState.releaseProgress + deltaTime * 0.5)
}

// 게임 종료 시 최종 점수 확정 및 베스트 스코어 저장
function finalizeScore() {
  const final = calculateFinalScore()
  GameState.score = final
  const best = parseInt(localStorage.getItem('devsurvival_best') || '0')
  if (final > best) localStorage.setItem('devsurvival_best', String(final))
  return final
}

window.ScoreSystem = { calculateFinalScore, updateReleaseProgress, finalizeScore }

  </script>
