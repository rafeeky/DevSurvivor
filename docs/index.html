  <script>
// systems/meta.js — GDD Part 6.3 출시 포인트 & Part 6.4 메타 업그레이드
// Mason 담당 (M5)

// ── 업그레이드 정의 ────────────────────────────────────────────────────────
const META_UPGRADES = [
  { name: '조금 더 버티기',     desc: 'maxHP +15/단계',       costs: [15, 25, 40], maxLevel: 3 },
  { name: '더 빠르게 움직이기', desc: '이동속도 +15px/s',      costs: [10, 20, 35], maxLevel: 3 },
  { name: '정리 속도 높이기',   desc: '스킬 데미지 +8%',       costs: [15, 25, 40], maxLevel: 3 },
  { name: '빠른 판단',          desc: '경험치 획득 +15%',      costs: [20, 35, 50], maxLevel: 3 },
  { name: '회복 습관',          desc: '회복량 +10%',           costs: [15, 25, 40], maxLevel: 3 },
  { name: '실수 줄이기',        desc: '받는 피해 -5%',         costs: [20, 35, 50], maxLevel: 3 },
  { name: '준비된 하루',        desc: '시작 시 보호막 1 충전',  costs: [25],         maxLevel: 1 },
  { name: '손이 빨라짐',        desc: '모든 쿨다운 -0.3초',    costs: [20, 35, 55], maxLevel: 3 },
  { name: '인센티브',           desc: '출시 포인트 획득 +15%', costs: [25, 40],     maxLevel: 2 },
  { name: '시작부터 하나 더',   desc: '시작 시 기본 스킬 지급', costs: [30],         maxLevel: 1 },
]

// ── MetaManager ────────────────────────────────────────────────────────────
const MetaManager = {
  STORAGE_POINTS:   'devsurvival_points',
  STORAGE_UPGRADES: 'devsurvival_upgrades',

  loadPoints() {
    return parseInt(localStorage.getItem(this.STORAGE_POINTS) || '0')
  },
  savePoints(p) {
    localStorage.setItem(this.STORAGE_POINTS, String(Math.max(0, p)))
  },

  loadUpgrades() {
    try {
      const raw = JSON.parse(localStorage.getItem(this.STORAGE_UPGRADES) || '[]')
      const arr = Array(10).fill(0)
      raw.forEach((v, i) => { if (i < 10) arr[i] = v || 0 })
      return arr
    } catch { return Array(10).fill(0) }
  },
  saveUpgrades(levels) {
    localStorage.setItem(this.STORAGE_UPGRADES, JSON.stringify(levels))
  },

  // ── GDD 6.3: 출시 포인트 계산 ──────────────────────────────────────────
  calculateReleasePoints() {
    const s = GameState
    let pts = 5                              // 플레이 시작 무조건
    if (s.gameTime >= 60)           pts += 10  // 1분 생존
    if (s.gameTime >= 120)          pts += 15  // 2분 생존
    if (s._lastWin)                 pts += 20  // 3분 완주
    if (s.killCount >= 50)          pts += 10  // 적 50마리 처치
    pts += (s.mirrorBotKills || 0) * 8         // 미러봇 처치 × 8
    if (s.aiBotReached)             pts += 15  // AI봇 도달
    if (s.aiBotKilled)              pts += 30  // AI봇 처치
    if (s.releaseProgress >= 100)   pts += 10  // 출시 진행률 100%

    // 인센티브 메타 보너스
    const levels = this.loadUpgrades()
    if (levels[8] > 0) pts = Math.floor(pts * (1 + 0.15 * levels[8]))
    return pts
  },

  // 게임 종료 시 포인트 적립 (한 판당 1회)
  awardPoints() {
    const earned = this.calculateReleasePoints()
    this.savePoints(this.loadPoints() + earned)
    return earned
  },

  // ── GDD 6.4: 업그레이드 구매 ───────────────────────────────────────────
  purchase(index) {
    const levels = this.loadUpgrades()
    const upg    = META_UPGRADES[index]
    if (!upg || levels[index] >= upg.maxLevel) return false
    const cost = upg.costs[levels[index]]
    const pts  = this.loadPoints()
    if (pts < cost) return false
    this.savePoints(pts - cost)
    levels[index]++
    this.saveUpgrades(levels)
    return true
  },

  // ── GDD 6.4: 메타 효과 적용 ────────────────────────────────────────────
  applyToPlayer(player, skillManager) {
    const lv = this.loadUpgrades()

    // 0. 조금 더 버티기: maxHP +15/lv
    if (lv[0] > 0) { player.maxHp += 15 * lv[0]; player.hp = player.maxHp }

    // 1. 더 빠르게 움직이기: speed +15px/s/lv
    if (lv[1] > 0) player.baseSpeed += 15 * lv[1]

    // 2. 정리 속도 높이기: 스킬 데미지 배율 (skills.js에서 참조)
    GameState.skillDamageMult = 1 + 0.08 * (lv[2] || 0)

    // 3. 빠른 판단: 경험치 배율 (enemies.js에서 참조)
    GameState.expMultiplier = 1 + 0.15 * (lv[3] || 0)

    // 4. 회복 습관: 회복량 배율 (skills.js에서 참조)
    GameState.healMultiplier = 1 + 0.10 * (lv[4] || 0)

    // 5. 실수 줄이기: 받는 피해 감소 -5%/lv (영구 패시브)
    if (lv[5] > 0) player.applyBuff('damageReduction', 0.05 * lv[5], Infinity)

    // 6. 준비된 하루: 시작 시 보호막 1
    if (lv[6] > 0) player.addShield(1)

    // 7. 손이 빨라짐: 모든 액티브 스킬 쿨다운 -0.3초/lv
    if (lv[7] > 0 && skillManager) {
      const red = 0.3 * lv[7]
      for (const def of Object.values(skillManager.skillDefs)) {
        if (def.type === 'active') def.cooldown = Math.max(0.5, def.cooldown - red)
      }
    }

    // 8. 인센티브: calculateReleasePoints()에서 처리

    // 9. 시작부터 하나 더: 랜덤 기본 스킬 1개 지급
    if (lv[9] > 0 && skillManager) {
      const basics = ['긴급수정', '디버그']
      const pick = basics[Math.floor(Math.random() * basics.length)]
      const emptySlot = skillManager.slots.findIndex(s => s === null)
      if (emptySlot !== -1) skillManager.assignSkill(emptySlot, pick)
    }
  },

  // ── 캐릭터 해금 ────────────────────────────────────────────────────────
  isUnlocked(charKey) {
    if (charKey !== 'vampir') return true  // adam and amelia always unlocked
    return localStorage.getItem('devSurvivor_unlock_vampir') === '1'
  },

  unlockChar(charKey) {
    localStorage.setItem(`devSurvivor_unlock_vampir`, '1')
    GameState.unlockedChars = GameState.unlockedChars || {}
    GameState.unlockedChars[charKey] = true
  },

  initUnlockedChars() {
    GameState.unlockedChars = { adam: true, amelia: true, vampir: this.isUnlocked('vampir') }
  },

  // ── 메타 업그레이드 아이콘 매핑 ───────────────────────────────────────
  _iconMap: {
    '조금 더 버티기':     'assets/custom/icons/skill_emergency_fix.png',
    '더 빠르게 움직이기': 'assets/custom/icons/skill_coffee.png',
    '정리 속도 높이기':   'assets/custom/icons/skill_debug.png',
    '빠른 판단':          'assets/custom/icons/skill_priority_sort.png',
    '회복 습관':          'assets/custom/icons/skill_pet_dog.png',
    '실수 줄이기':        'assets/custom/icons/skill_figure_clean.png',
    '준비된 하루':        'assets/custom/icons/skill_autosave.png',
    '손이 빨라짐':        'assets/custom/icons/skill_emergency_fix.png',
    '인센티브':       'assets/custom/icons/skill_priority_sort.png',
    '시작부터 하나 더':   'assets/custom/icons/skill_nap.png',
  },
  _iconCache: {},
  _getIcon(name) {
    const src = this._iconMap[name]
    if (!src) return null
    if (!this._iconCache[name]) {
      const img = new Image(); img.src = src
      this._iconCache[name] = img
    }
    return this._iconCache[name]
  },

  // ── 업그레이드 화면 렌더링 ─────────────────────────────────────────────
  _buyRects: [],
  _page: 0,
  _prevRect: null,
  _nextRect: null,

  render(ctx) {
    if (GameState.screen !== 'upgrade') return

    const levels = this.loadUpgrades()
    const pts    = this.loadPoints()

    // 배경
    ctx.fillStyle = '#0d0d1a'
    ctx.fillRect(0, 0, 800, 600)
    ctx.strokeStyle = '#1a1a3e'
    ctx.lineWidth = 1
    for (let x = 0; x < 800; x += 40) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,600); ctx.stroke() }
    for (let y = 0; y < 600; y += 40) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(800,y); ctx.stroke() }

    // 헤더
    ctx.textAlign = 'center'
    ctx.fillStyle = '#4488ff'
    ctx.font = 'bold 26px "VT323", monospace'
    ctx.fillText('업그레이드', 400, 34)
    ctx.fillStyle = '#FFD700'
    ctx.font = '15px "VT323", monospace'
    ctx.fillText(`보유 출시 포인트: ${pts}`, 400, 56)

    // 페이지 표시
    const totalPages = Math.ceil(META_UPGRADES.length / 6)
    ctx.fillStyle = '#778899'
    ctx.font = '12px "VT323", monospace'
    ctx.fillText(`${this._page + 1} / ${totalPages} 페이지`, 400, 72)

    // 아이템 그리드 (2열 × 3행, 페이지당 6개)
    this._buyRects = []
    const colW = 388, rowH = 120
    const colX = [4, 408]
    const startY = 78
    const pageStart = this._page * 6

    for (let pageIdx = 0; pageIdx < 6; pageIdx++) {
      const i = pageStart + pageIdx
      if (i >= META_UPGRADES.length) { this._buyRects.push(null); continue }

      const col  = pageIdx % 2
      const row  = Math.floor(pageIdx / 2)
      const bx   = colX[col]
      const by   = startY + row * rowH
      const upg  = META_UPGRADES[i]
      const lv   = levels[i]
      const maxed  = lv >= upg.maxLevel
      const cost   = maxed ? 0 : upg.costs[lv]
      const canBuy = !maxed && pts >= cost

      // 카드 배경
      ctx.fillStyle = '#111827'
      ctx.strokeStyle = maxed ? '#44aa44' : canBuy ? '#4466aa' : '#2a2a4a'
      ctx.lineWidth = 1.5
      ctx.fillRect(bx, by, colW, rowH - 6)
      ctx.strokeRect(bx, by, colW, rowH - 6)

      // 아이콘 (좌측 — 56×56 박스로 확대)
      const icon = this._getIcon(upg.name)
      const iconBoxSize = 56
      const iconBoxX = bx + 4
      const iconBoxY = by + ((rowH - 6) - iconBoxSize) / 2  // 카드 높이 중앙 정렬
      // 아이콘 배경
      ctx.save()
      ctx.fillStyle = 'rgba(15,25,60,0.9)'
      ctx.strokeStyle = '#2a4a88'
      ctx.lineWidth = 1.5
      ctx.fillRect(iconBoxX, iconBoxY, iconBoxSize, iconBoxSize)
      ctx.strokeRect(iconBoxX, iconBoxY, iconBoxSize, iconBoxSize)
      if (icon?.complete && icon.naturalWidth > 0) {
        ctx.imageSmoothingEnabled = true
        ctx.globalAlpha = 1.0
        ctx.drawImage(icon, 0, 0, icon.naturalWidth, icon.naturalHeight, iconBoxX + 2, iconBoxY + 2, iconBoxSize - 4, iconBoxSize - 4)
      }
      ctx.restore()

      const textX = bx + 4 + iconBoxSize + 8

      // 이름
      ctx.fillStyle = '#ddeeff'
      ctx.font = 'bold 14px "VT323", monospace'
      ctx.textAlign = 'left'
      ctx.fillText(upg.name, textX, by + 24)

      // 레벨 별
      let stars = ''
      for (let s = 0; s < upg.maxLevel; s++) stars += s < lv ? '★' : '☆'
      ctx.fillStyle = '#FFD700'
      ctx.font = '14px "VT323", monospace'
      ctx.textAlign = 'right'
      ctx.fillText(stars, bx + colW - 8, by + 24)

      // 효과 설명
      ctx.fillStyle = '#aabbcc'
      ctx.font = '13px "VT323", monospace'
      ctx.textAlign = 'left'
      ctx.fillText(lv > 0 ? `${upg.desc} (${lv}단계)` : upg.desc, textX, by + 50)

      // 구매 버튼 또는 MAX
      if (maxed) {
        ctx.fillStyle = '#44aa44'
        ctx.font = 'bold 14px "VT323", monospace'
        ctx.textAlign = 'right'
        ctx.fillText('MAX', bx + colW - 8, by + 90)
        this._buyRects.push(null)
      } else {
        const btnX = bx + colW - 116
        const btnY = by + 68
        const btnW = 108, btnH = 32
        ctx.fillStyle = canBuy ? '#1e3a6e' : '#1a1a2a'
        ctx.strokeStyle = canBuy ? '#4488ff' : '#444466'
        ctx.lineWidth = 1
        ctx.fillRect(btnX, btnY, btnW, btnH)
        ctx.strokeRect(btnX, btnY, btnW, btnH)
        ctx.font = '13px "VT323", monospace'
        ctx.textAlign = 'center'
        if (canBuy) {
          ctx.fillStyle = '#ffffff'
          ctx.fillText(`구매 ${cost}pt`, btnX + btnW / 2, btnY + 21)
        } else {
          ctx.fillStyle = '#ff6666'
          ctx.fillText(`부족 (${cost}pt)`, btnX + btnW / 2, btnY + 21)
        }
        this._buyRects.push({ x: btnX, y: btnY, w: btnW, h: btnH, index: i })
      }
    }

    // 페이지 네비게이션 버튼
    const navY = startY + 3 * rowH + 6  // 78 + 360 + 6 = 444

    this._prevRect = null
    this._nextRect = null

    if (this._page > 0) {
      ctx.fillStyle = '#1a2a4a'
      ctx.strokeStyle = '#4466aa'
      ctx.lineWidth = 1.5
      ctx.fillRect(190, navY, 140, 36)
      ctx.strokeRect(190, navY, 140, 36)
      ctx.fillStyle = '#88aaff'
      ctx.font = '13px "VT323", monospace'
      ctx.textAlign = 'center'
      ctx.fillText('◀ 이전', 260, navY + 23)
      this._prevRect = { x: 190, y: navY, w: 140, h: 36 }
    }

    if (this._page < totalPages - 1) {
      ctx.fillStyle = '#1a2a4a'
      ctx.strokeStyle = '#4466aa'
      ctx.lineWidth = 1.5
      ctx.fillRect(470, navY, 140, 36)
      ctx.strokeRect(470, navY, 140, 36)
      ctx.fillStyle = '#88aaff'
      ctx.font = '13px "VT323", monospace'
      ctx.textAlign = 'center'
      ctx.fillText('다음 ▶', 540, navY + 23)
      this._nextRect = { x: 470, y: navY, w: 140, h: 36 }
    }

    // 돌아가기 버튼
    ctx.fillStyle = '#0d1a0d'
    ctx.strokeStyle = '#44aa44'
    ctx.lineWidth = 2
    ctx.fillRect(300, 492, 200, 44)
    ctx.strokeRect(300, 492, 200, 44)
    ctx.fillStyle = '#88ff88'
    ctx.font = 'bold 16px "VT323", monospace'
    ctx.textAlign = 'center'
    ctx.fillText('[ 돌아가기 ]', 400, 520)
    ctx.textAlign = 'left'
  },

  handleClick(x, y) {
    if (GameState.screen !== 'upgrade') return
    for (const rect of this._buyRects) {
      if (!rect) continue
      if (x >= rect.x && x <= rect.x + rect.w && y >= rect.y && y <= rect.y + rect.h) {
        this.purchase(rect.index)
        return
      }
    }
    if (this._prevRect && x >= this._prevRect.x && x <= this._prevRect.x + this._prevRect.w &&
        y >= this._prevRect.y && y <= this._prevRect.y + this._prevRect.h) {
      this._page = Math.max(0, this._page - 1)
      return
    }
    if (this._nextRect && x >= this._nextRect.x && x <= this._nextRect.x + this._nextRect.w &&
        y >= this._nextRect.y && y <= this._nextRect.y + this._nextRect.h) {
      this._page = Math.min(Math.ceil(META_UPGRADES.length / 6) - 1, this._page + 1)
      return
    }
    if (x >= 300 && x <= 500 && y >= 492 && y <= 536) {
      this._page = 0
      GameState.screen = 'lobby'
    }
  },
}

window.MetaManager = MetaManager

// 초기화는 game.js에서 GameState 정의 후 호출

window.addEventListener('click', (e) => {
  const canvas = document.getElementById('gameCanvas')
  if (!canvas) return
  const rect = canvas.getBoundingClientRect()
  MetaManager.handleClick(
    (e.clientX - rect.left) * (800 / rect.width),
    (e.clientY - rect.top)  * (600 / rect.height)
  )
})

  </script>

  <script>
/**
 * ui/uiassets.js — UI 에셋 로더 & 공통 드로우 헬퍼
 *
 * 채택 에셋 (assets/ui/):
 *   panel.png       252×155  — 다크 패널 프레임 (9-slice)
 *   monitor.png     312×255  — CRT 모니터 데코 (그대로 사용)
 *   arrows.png      128×96   — 방향키 버튼 (32×32 × 4col × 3row)
 *   loadingbar.png  8×12     — HP바 배경 세그먼트 (타일링)
 *   bulb.png        32×8     — 상태 인디케이터 도트 (8×8 × 4col)
 *   granteddenied.png 7200×145 — ACCESS 애니메이션 스트립
 */

;(function () {
  const _srcs = {
    panel:        'assets/ui/panel.png',
    monitor:      'assets/ui/monitor.png',
    arrows:       'assets/ui/arrows.png',
    loadingbar:   'assets/ui/loadingbar.png',
    bulb:         'assets/ui/bulb.png',
    granteddenied:'assets/ui/granteddenied.png',
  }

  const _imgs = {}
  for (const [key, src] of Object.entries(_srcs)) {
    const img = new Image()
    img.src = src
    _imgs[key] = img
  }

  // ─────────────────────────────────────────────────────────────
  // drawUIPanel(ctx, x, y, w, h)
  //   panel.png (252×155) 9-slice 패널 렌더
  //   corner = 14px — 픽셀아트 모서리 크기
  // ─────────────────────────────────────────────────────────────
  const _PW = 252, _PH = 155, _PC = 14   // panel natural size & corner

  window.drawUIPanel = function (ctx, x, y, w, h) {
    const img = _imgs.panel
    if (!img?.complete || img.naturalWidth === 0) {
      // 이미지 미로드 시 폴백
      ctx.fillStyle = 'rgba(5,5,20,0.9)'
      ctx.fillRect(x, y, w, h)
      ctx.strokeStyle = '#443366'
      ctx.lineWidth = 1.5
      ctx.strokeRect(x, y, w, h)
      return
    }

    const c  = _PC
    const mw = _PW - 2 * c   // source middle width
    const mh = _PH - 2 * c   // source middle height
    const dw = w - 2 * c     // dest middle width
    const dh = h - 2 * c     // dest middle height

    ctx.imageSmoothingEnabled = false

    // 모서리 4개
    ctx.drawImage(img,      0,       0, c,  c,  x,         y,         c, c)
    ctx.drawImage(img, _PW - c,      0, c,  c,  x + w - c, y,         c, c)
    ctx.drawImage(img,      0, _PH - c, c,  c,  x,         y + h - c, c, c)
    ctx.drawImage(img, _PW - c, _PH - c, c, c,  x + w - c, y + h - c, c, c)

    // 상/하 엣지
    if (dw > 0) {
      ctx.drawImage(img,      c,       0, mw, c,  x + c, y,         dw, c)
      ctx.drawImage(img,      c, _PH - c, mw, c,  x + c, y + h - c, dw, c)
    }
    // 좌/우 엣지
    if (dh > 0) {
      ctx.drawImage(img,      0,       c, c,  mh, x,         y + c, c, dh)
      ctx.drawImage(img, _PW - c,      c, c,  mh, x + w - c, y + c, c, dh)
    }
    // 중앙
    if (dw > 0 && dh > 0) {
      ctx.drawImage(img, c, c, mw, mh, x + c, y + c, dw, dh)
    }
  }

  // ─────────────────────────────────────────────────────────────
  // drawUIArrow(ctx, dir, style, x, y, size)
  //   arrows.png: 4col × 3row, 각 32×32
  //   dir:   'right'|'down'|'left'|'up'
  //   style: 'teal'|'green'|'purple'
  // ─────────────────────────────────────────────────────────────
  const _ARROW_COL = { right: 0, down: 1, left: 2, up: 3 }
  const _ARROW_ROW = { teal: 0, green: 1, purple: 2 }

  window.drawUIArrow = function (ctx, dir, style, x, y, size) {
    const img = _imgs.arrows
    if (!img?.complete || img.naturalWidth === 0) return
    const col = _ARROW_COL[dir]  ?? 0
    const row = _ARROW_ROW[style] ?? 2
    ctx.imageSmoothingEnabled = false
    ctx.drawImage(img, col * 32, row * 32, 32, 32, x, y, size, size)
  }

  // ─────────────────────────────────────────────────────────────
  // drawUILoadingBar(ctx, x, y, w, h)
  //   loadingbar.png (8×12) 을 타일링해 HP바 배경으로 사용
  // ─────────────────────────────────────────────────────────────
  window.drawUILoadingBar = function (ctx, x, y, w, h) {
    const img = _imgs.loadingbar
    if (!img?.complete || img.naturalWidth === 0) return
    ctx.imageSmoothingEnabled = false
    const segW = 8
    for (let ox = 0; ox < w; ox += segW) {
      const sw = Math.min(segW, w - ox)
      ctx.drawImage(img, 0, 0, sw, 12, x + ox, y, sw, h)
    }
  }

  // ─────────────────────────────────────────────────────────────
  // drawUIMonitor(ctx, x, y, w, h)
  //   monitor.png (312×255) CRT 모니터 데코
  // ─────────────────────────────────────────────────────────────
  window.drawUIMonitor = function (ctx, x, y, w, h) {
    const img = _imgs.monitor
    if (!img?.complete || img.naturalWidth === 0) return
    ctx.imageSmoothingEnabled = true
    ctx.imageSmoothingQuality = 'high'
    ctx.drawImage(img, 0, 0, 312, 255, x, y, w, h)
    ctx.imageSmoothingEnabled = false
  }

  // ─────────────────────────────────────────────────────────────
  // drawUIBulb(ctx, index, x, y, size)
  //   bulb.png (32×8): 8×8 × 4개 도트
  //   index: 0~3
  // ─────────────────────────────────────────────────────────────
  window.drawUIBulb = function (ctx, index, x, y, size) {
    const img = _imgs.bulb
    if (!img?.complete || img.naturalWidth === 0) return
    const i = Math.max(0, Math.min(3, index))
    ctx.imageSmoothingEnabled = false
    ctx.drawImage(img, i * 8, 0, 8, 8, x, y, size, size)
  }

  // 외부 참조용 이미지 맵 노출
  window._UIImgs = _imgs
})()

  </script>

  <script>
// 스킬 이름 → 타입 뱃지 매핑
const _SKILL_TYPE_BADGE = {
  '긴급 패치':  { label: '공격', color: '#ff6644' },
  '디버그':     { label: '공격', color: '#ff6644' },
  '고성방가':   { label: '공격', color: '#ff6644' },
  '커피 한 잔': { label: '이속↑', color: '#ffdd44' },
  '멘탈관리':   { label: '방어', color: '#44aaff' },
  '쓰다듬기':   { label: '회복', color: '#ff88bb' },
  '낮잠자기':   { label: '회복', color: '#ff88bb' },
  '자동 저장':  { label: '패시브', color: '#aa88ff' },
  '산책하기':   { label: '패시브', color: '#aa88ff' },
}

// 스킬 이름 → 아이콘 파일 매핑
const _SKILL_ICON_MAP = {
  '긴급 패치':  'assets/custom/icons/skill_emergency_fix.png',
  '디버그':     'assets/custom/icons/skill_debug.png',
  '고성방가':   'assets/custom/icons/skill_priority_sort.png',
  '커피 한 잔': 'assets/custom/icons/skill_coffee.png',
  '멘탈관리':   'assets/custom/icons/skill_figure_clean.png',
  '쓰다듬기':   'assets/custom/icons/skill_pet_dog.png',
  '낮잠자기':   'assets/custom/icons/skill_nap.png',
  '자동 저장':  'assets/custom/icons/skill_autosave.png',
}
// 지연 로드 캐시
const _skillIconCache = {}
function _getSkillIcon(name) {
  const src = _SKILL_ICON_MAP[name]
  if (!src) return null
  if (!_skillIconCache[name]) {
    const img = new Image()
    img.src = src
    _skillIconCache[name] = img
  }
  return _skillIconCache[name]
}
// 전역 노출 — levelup.js 등 다른 모듈에서 사용
window.getSkillIcon = _getSkillIcon

class HUD {
  constructor() {
    this._flyingGolds = []  // { x, y, targetX, targetY, type, t, duration, size }
  }

  render(ctx, gameTime) {
    if (GameState.screen !== 'playing' && GameState.screen !== 'paused') return
    const player = Game.player
    if (!player) return
    this._drawTopBar(ctx, player, gameTime)
    this._drawBottomBar(ctx)
    this._drawDangerOverlay(ctx, gameTime)
    this._drawSpeechBubble(ctx)
    this._drawUnlockNotification(ctx)
    this._drawGoldHUD(ctx)
    this._updateFlyingGolds(ctx, 1/60)
  }

  _drawTopBar(ctx, player, gameTime) {
    // 상단 반투명 바 배경
    ctx.fillStyle = 'rgba(0,0,0,0.6)'
    ctx.fillRect(0, 0, 800, 48)

    // HP 바 (개선: 두껍고 선명하게, 틱 마크)
    const hpRatio = player.hp / player.maxHp
    const hpColor = hpRatio < 0.3 ? '#ff3333' : hpRatio < 0.6 ? '#ffaa00' : '#33cc66'
    // 바 외곽 테두리
    ctx.fillStyle = '#111'
    ctx.fillRect(10, 10, 184, 22)
    // 바 배경 — loadingbar 타일
    if (window.drawUILoadingBar) {
      drawUILoadingBar(ctx, 12, 12, 180, 18)
    } else {
      ctx.fillStyle = '#222'
      ctx.fillRect(12, 12, 180, 18)
    }
    // HP 채움 (글로우)
    ctx.save()
    ctx.shadowColor = hpColor
    ctx.shadowBlur = hpRatio < 0.3 ? 8 : 4
    ctx.fillStyle = hpColor
    ctx.fillRect(12, 12, 180 * hpRatio, 18)
    ctx.restore()
    // 10% 틱 마크
    ctx.strokeStyle = 'rgba(0,0,0,0.5)'
    ctx.lineWidth = 1
    for (let t = 1; t < 10; t++) {
      ctx.beginPath(); ctx.moveTo(12 + 18 * t, 12); ctx.lineTo(12 + 18 * t, 30); ctx.stroke()
    }
    // 테두리
    ctx.strokeStyle = '#444'
    ctx.lineWidth = 1
    ctx.strokeRect(12, 12, 180, 18)
    ctx.fillStyle = '#fff'
    ctx.font = '11px "VT323", monospace'
    ctx.fillText(`HP ${Math.ceil(player.hp)}/${player.maxHp}`, 14, 26)

    // 보호막 아이콘
    if (player.shields > 0) {
      ctx.fillStyle = '#44aaff'
      ctx.font = '12px "VT323", monospace'
      ctx.fillText(`🛡 ${player.shields}`, 200, 24)
    }

    // 타이머 (남은 시간)
    const remaining = Math.max(0, 180 - gameTime)
    const mins = Math.floor(remaining / 60)
    const secs = Math.floor(remaining % 60)
    const timeStr = `${mins}:${secs.toString().padStart(2,'0')}`
    ctx.fillStyle = remaining <= 30 ? '#ff4444' : '#ffffff'
    ctx.font = 'bold 22px "VT323", monospace'
    ctx.textAlign = 'center'
    ctx.fillText(timeStr, 400, 30)
    ctx.textAlign = 'left'

    // 출시 진행률
    ctx.fillStyle = '#333'
    ctx.fillRect(510, 12, 150, 10)
    ctx.fillStyle = '#44ffaa'
    ctx.fillRect(510, 12, 150 * (GameState.releaseProgress / 100), 10)
    ctx.fillStyle = '#ff4444'
    ctx.font = 'bold 16px "VT323", monospace'
    ctx.fillText(`출시 ${Math.floor(GameState.releaseProgress)}%`, 512, 36)

    // 점수
    ctx.fillStyle = '#FFD700'
    ctx.font = '13px "VT323", monospace'
    ctx.textAlign = 'right'
    ctx.fillText(`${GameState.score.toLocaleString()}`, 788, 24)
    ctx.textAlign = 'left'
  }

  _drawBottomBar(ctx) {
    // 하단 반투명 바 배경
    ctx.fillStyle = 'rgba(0,0,0,0.6)'
    ctx.fillRect(0, 548, 800, 52)

    // 스킬 슬롯 4개 (Q/W/E/R)
    const keys = ['Q','W','E','R']
    for (let i = 0; i < 4; i++) {
      const sx = 12 + i * 112
      const sy = 553
      const state = Game.skillManager?.getSkillState(i) || { isEmpty: true }

      if (state.isEmpty) {
        ctx.fillStyle = '#1a1a2e'
        ctx.strokeStyle = '#333'
      } else if (state.cooldownRemaining > 0) {
        ctx.fillStyle = '#111'
        ctx.strokeStyle = '#444'
      } else {
        ctx.fillStyle = '#1e2a4a'
        ctx.strokeStyle = '#4488ff'
      }
      ctx.lineWidth = 1.5
      ctx.fillRect(sx, sy, 100, 40)
      ctx.strokeRect(sx, sy, 100, 40)

      if (!state.isEmpty) {
        // 스킬 아이콘 (있으면) — 키 레이블보다 먼저 그려서 레이블이 위에 오도록
        const icon = _getSkillIcon(state.name)
        if (icon?.complete && icon.naturalWidth > 0) {
          ctx.save()
          ctx.globalAlpha = state.cooldownRemaining > 0 ? 0.3 : 1.0
          ctx.imageSmoothingEnabled = true
          // 아이콘을 슬롯 왼쪽에 꽉 채워 넣기 (36×36)
          ctx.drawImage(icon, 0, 0, icon.naturalWidth, icon.naturalHeight, sx + 2, sy + 2, 36, 36)
          ctx.globalAlpha = 1
          ctx.imageSmoothingEnabled = false
          ctx.restore()
        }

        // 스킬 타입 뱃지
        const badge = _SKILL_TYPE_BADGE[state.name]
        if (badge) {
          ctx.fillStyle = badge.color + '33'
          ctx.fillRect(sx + 38, sy + 2, 58, 11)
          ctx.fillStyle = badge.color
          ctx.font = 'bold 9px "VT323", monospace'
          ctx.fillText(badge.label, sx + 40, sy + 11)
        }
        // 스킬 이름
        ctx.fillStyle = state.cooldownRemaining > 0 ? '#556' : '#aaccff'
        ctx.font = '11px "VT323", monospace'
        ctx.fillText(state.name.substring(0, 7), sx + 38, sy + 25)

        // 쿨다운 숫자
        if (state.cooldownRemaining > 0) {
          ctx.fillStyle = '#ff8844'
          ctx.font = 'bold 13px "VT323", monospace'
          ctx.textAlign = 'center'
          ctx.fillText(state.cooldownRemaining.toFixed(1), sx + 68, sy + 36)
          ctx.textAlign = 'left'

          // 쿨다운 진행 바
          ctx.fillStyle = '#224'
          ctx.fillRect(sx, sy + 38, 100, 3)
          const ratio = 1 - state.cooldownRemaining / state.cooldownMax
          ctx.fillStyle = '#4488ff'
          ctx.fillRect(sx, sy + 38, 100 * ratio, 3)
        } else {
          ctx.fillStyle = '#44ff88'
          ctx.font = '10px "VT323", monospace'
          ctx.fillText('READY', sx + 52, sy + 36)
        }
      }

      // 키 레이블 — 항상 마지막에 그려 아이콘 위에 표시 (작은 배경 포함)
      ctx.fillStyle = 'rgba(0,0,0,0.65)'
      ctx.fillRect(sx + 2, sy + 2, 14, 13)
      ctx.fillStyle = state.isEmpty ? '#666' : '#ffffff'
      ctx.font = 'bold 10px "VT323", monospace'
      ctx.fillText(keys[i], sx + 4, sy + 13)
    }

    // 빈 슬롯 힌트 (초반 안내)
    const allEmpty = !Game.skillManager?.slots?.some(Boolean)
    if (allEmpty) {
      ctx.fillStyle = '#556688'
      ctx.font = '11px "VT323", monospace'
      ctx.textAlign = 'center'
      ctx.fillText('적을 처치해 경험치를 모으면 레벨업 시 스킬을 획득합니다', 250, 571)
      ctx.textAlign = 'left'
    }

    // 레벨 & 경험치 바
    const RANKS = ['인턴', '주니어 개발자', '시니어 개발자', '팀장', '디렉터', '본부장', '임원', '대표']
    const rankName = RANKS[Math.min(GameState.playerLevel - 1, RANKS.length - 1)]
    ctx.fillStyle = '#ccaaff'
    ctx.font = 'bold 12px "VT323", monospace'
    ctx.fillText(`${rankName}  Lv.${GameState.playerLevel}`, 462, 568)

    const EXP_THRESHOLDS = [0, 30, 80, 160, 280, 450, 650, 900, 1200]
    const lvl = GameState.playerLevel
    const expNeeded = lvl < EXP_THRESHOLDS.length ? EXP_THRESHOLDS[lvl] : EXP_THRESHOLDS[EXP_THRESHOLDS.length - 1]
    const expCurrent = GameState.playerExp
    const expRatio = expNeeded > 0 ? Math.min(1, expCurrent / expNeeded) : 1

    ctx.fillStyle = '#333'
    ctx.fillRect(460, 576, 200, 8)
    ctx.fillStyle = '#aa66ff'
    ctx.fillRect(460, 576, 200 * expRatio, 8)
    ctx.strokeStyle = '#555'
    ctx.lineWidth = 1
    ctx.strokeRect(460, 576, 200, 8)

    // 처치 수
    ctx.fillStyle = '#aaa'
    ctx.font = '11px "VT323", monospace'
    ctx.fillText(`처치: ${GameState.killCount}`, 670, 568)
  }

  _drawSpeechBubble(ctx) {
    const bubble = GameState.speechBubble
    if (!bubble || bubble.timer <= 0) return
    bubble.timer -= 1 / 60
    const player = Game.player
    if (!player) return

    const alpha = bubble.timer < 1.0 ? bubble.timer : 1.0
    ctx.save()
    ctx.globalAlpha = alpha

    // Measure text
    ctx.font = '15px "VT323", monospace'
    const tw = ctx.measureText(bubble.text).width
    const bw = tw + 20
    const bh = 28
    // Screen-space position: convert world coords via Camera offset
    const sx = player.x - (window.Camera?.x || 0)
    const sy = player.y - (window.Camera?.y || 0)
    const bx = sx - bw / 2
    const by = sy - 80

    // Bubble background (rounded rect + tail)
    ctx.fillStyle = 'rgba(255,255,255,0.92)'
    ctx.strokeStyle = '#334466'
    ctx.lineWidth = 1.5
    const r = 6
    ctx.beginPath()
    ctx.moveTo(bx + r, by)
    ctx.lineTo(bx + bw - r, by)
    ctx.quadraticCurveTo(bx + bw, by, bx + bw, by + r)
    ctx.lineTo(bx + bw, by + bh - r)
    ctx.quadraticCurveTo(bx + bw, by + bh, bx + bw - r, by + bh)
    ctx.lineTo(bx + bw / 2 + 8, by + bh)
    ctx.lineTo(bx + bw / 2, by + bh + 8)
    ctx.lineTo(bx + bw / 2 - 8, by + bh)
    ctx.lineTo(bx + r, by + bh)
    ctx.quadraticCurveTo(bx, by + bh, bx, by + bh - r)
    ctx.lineTo(bx, by + r)
    ctx.quadraticCurveTo(bx, by, bx + r, by)
    ctx.closePath()
    ctx.fill()
    ctx.stroke()

    // Text
    ctx.fillStyle = '#112244'
    ctx.font = '15px "VT323", monospace'
    ctx.textAlign = 'center'
    ctx.fillText(bubble.text, bx + bw / 2, by + bh - 8)

    ctx.textAlign = 'left'
    ctx.globalAlpha = 1
    ctx.restore()
  }

  _drawUnlockNotification(ctx) {
    const notif = GameState.unlockNotification
    if (!notif || notif.timer <= 0) return
    notif.timer -= 1/60
    const alpha = Math.min(1, notif.timer)
    ctx.save()
    ctx.globalAlpha = alpha
    ctx.fillStyle = 'rgba(60,0,100,0.85)'
    ctx.fillRect(200, 240, 400, 60)
    ctx.strokeStyle = '#aa44ff'
    ctx.lineWidth = 2
    ctx.strokeRect(200, 240, 400, 60)
    ctx.fillStyle = '#dd88ff'
    ctx.font = 'bold 22px "VT323", monospace'
    ctx.textAlign = 'center'
    ctx.fillText('🔓 ' + notif.msg, 400, 278)
    ctx.textAlign = 'left'
    ctx.globalAlpha = 1
    ctx.restore()
  }

  _drawDangerOverlay(ctx, gameTime) {
    if (!GameState.playerDanger) return
    const alpha = 0.25 + 0.2 * Math.abs(Math.sin(gameTime * Math.PI * 2))
    ctx.strokeStyle = `rgba(255,50,50,${alpha})`
    ctx.lineWidth = 14
    ctx.strokeRect(7, 7, 786, 586)
  }

  _drawGoldHUD(ctx) {
    const inv = window.GameState?.goldInventory
    if (!inv) return

    // Preload gold images once using explicit paths (validator-friendly)
    if (!this._goldImgs) {
      this._goldImgs = {}
      const _goldPaths = {
        1: 'assets/icon/gold_1.png',
        2: 'assets/icon/gold_2.png',
        3: 'assets/icon/gold_3.png',
        4: 'assets/icon/gold_4.png',
      }
      for (const [k, src] of Object.entries(_goldPaths)) {
        const img = new Image()
        img.src = src
        this._goldImgs[k] = img
      }
    }

    // Only show types with count > 0
    const types = [1, 2, 3, 4].filter(t => (inv[t] || 0) > 0)
    if (types.length === 0) return

    const iconSize = 20
    const spacing = 52  // icon(20) + text space
    const totalW = types.length * spacing
    let startX = 790 - totalW
    const y = 4

    for (const type of types) {
      const img = this._goldImgs[type]
      const count = inv[type] || 0

      // Small shadow bg
      ctx.fillStyle = 'rgba(0,0,0,0.5)'
      ctx.fillRect(startX - 2, y - 2, spacing, iconSize + 4)

      if (img?.complete && img.naturalWidth > 0) {
        ctx.drawImage(img, startX, y, iconSize, iconSize)
      }
      ctx.fillStyle = '#FFD700'
      ctx.font = 'bold 14px "VT323", monospace'
      ctx.textAlign = 'left'
      ctx.fillText(`\xd7${count}`, startX + iconSize + 2, y + 14)

      startX += spacing
    }
  }

  spawnFlyingGold(worldX, worldY, type) {
    // Ensure gold images are preloaded using explicit paths (validator-friendly)
    if (!this._goldImgs) {
      this._goldImgs = {}
      const _goldPaths = {
        1: 'assets/icon/gold_1.png',
        2: 'assets/icon/gold_2.png',
        3: 'assets/icon/gold_3.png',
        4: 'assets/icon/gold_4.png',
      }
      for (const [k, src] of Object.entries(_goldPaths)) {
        const img = new Image()
        img.src = src
        this._goldImgs[k] = img
      }
    }

    // Convert world coords to screen coords using camera
    // Camera.x/y represent the top-left world position visible on screen
    const camX = window.Camera?.x || 0
    const camY = window.Camera?.y || 0
    const screenX = worldX - camX
    const screenY = worldY - camY

    // Target: approximate center of where the gold type icon appears in HUD
    // Gold HUD stacks from right; target center of the HUD area at top-right
    const targetX = 770
    const targetY = 14

    this._flyingGolds.push({
      x: screenX,
      y: screenY,
      targetX,
      targetY,
      type,
      t: 0,
      duration: 0.6,
      size: 16,
    })
  }

  _updateFlyingGolds(ctx, deltaTime) {
    if (!this._flyingGolds.length) return
    for (let i = this._flyingGolds.length - 1; i >= 0; i--) {
      const f = this._flyingGolds[i]
      f.t += (deltaTime || 1/60)
      const progress = Math.min(1, f.t / f.duration)
      const ease = 1 - Math.pow(1 - progress, 3)  // ease-out cubic

      const x = f.x + (f.targetX - f.x) * ease
      const y = f.y + (f.targetY - f.y) * ease

      const alpha = progress > 0.8 ? (1 - progress) * 5 : 1

      ctx.save()
      ctx.globalAlpha = alpha
      const img = this._goldImgs?.[f.type]
      if (img?.complete && img.naturalWidth > 0) {
        ctx.drawImage(img, x - f.size / 2, y - f.size / 2, f.size, f.size)
      } else {
        // Fallback circle
        ctx.fillStyle = '#FFD700'
        ctx.beginPath()
        ctx.arc(x, y, f.size / 2, 0, Math.PI * 2)
        ctx.fill()
      }
      ctx.globalAlpha = 1
      ctx.restore()

      if (progress >= 1) this._flyingGolds.splice(i, 1)
    }
  }
}

  <script>
// 로비 배경 이미지 (bg_title.png)
const _lobbyBgImg = new Image()
_lobbyBgImg.src = 'assets/backgrounds/bg_title.png'

class Lobby {
  constructor() {
    let saved = localStorage.getItem('devSurvivor_char') || 'adam'
    if (saved === 'alex') saved = 'adam'  // alex removed
    this._selected = saved
    // 카드 레이아웃: 3장 × 170px, gap 20px, 800px 중앙 정렬 → left=125
    // 카드 높이 168px: 포트레이트 108 + 이름 16 + 역할배지 16 + 패시브 설명 16 + 여백 12
    this._cards = [
      { key: 'adam',   x: 125, y: 180, w: 170, h: 168 },
      { key: 'amelia', x: 315, y: 180, w: 170, h: 168 },
      { key: 'vampir', x: 505, y: 180, w: 170, h: 168 },
    ]
    this.startBtnRect   = { x: 210, y: 362, w: 380, h: 60 }
    this.upgradeBtnRect = { x: 290, y: 436, w: 220, h: 34 }
    this._bindClick()
  }

  _select(key) {
    this._selected = key
    localStorage.setItem('devSurvivor_char', key)
    if (window.GameState) GameState.selectedCharacter = key
  }

  _bindClick() {
    window.addEventListener('click', (e) => {
      if (GameState.screen !== 'lobby') return
      const canvas = document.getElementById('gameCanvas')
      if (!canvas) return
      const rect = canvas.getBoundingClientRect()
      const x = (e.clientX - rect.left) * (800 / rect.width)
      const y = (e.clientY - rect.top)  * (600 / rect.height)

      for (const card of this._cards) {
        if (x >= card.x && x <= card.x + card.w && y >= card.y && y <= card.y + card.h) {
          if (!window.MetaManager?.isUnlocked(card.key)) return
          this._select(card.key)
          return
        }
      }

      const s = this.startBtnRect
      if (x >= s.x && x <= s.x + s.w && y >= s.y && y <= s.y + s.h) {
        Game.start(); return
      }
      const u = this.upgradeBtnRect
      if (x >= u.x && x <= u.x + u.w && y >= u.y && y <= u.y + u.h) {
        GameState.screen = 'upgrade'
      }
    })
  }

  render(ctx) {
    if (GameState.screen !== 'lobby') return

    // GameState 동기화
    GameState.selectedCharacter = this._selected

    // 배경 (bg_office.png 또는 폴백 그리드)
    if (_lobbyBgImg.complete && _lobbyBgImg.naturalWidth > 0) {
      ctx.drawImage(_lobbyBgImg, 0, 0, _lobbyBgImg.naturalWidth, _lobbyBgImg.naturalHeight, 0, 0, 800, 600)
      ctx.fillStyle = 'rgba(0,0,10,0.22)'
      ctx.fillRect(0, 0, 800, 600)
    } else {
      ctx.fillStyle = '#0d0d1a'
      ctx.fillRect(0, 0, 800, 600)
      ctx.strokeStyle = '#1a1a3e'
      ctx.lineWidth = 1
      for (let x = 0; x < 800; x += 40) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,600); ctx.stroke() }
      for (let y = 0; y < 600; y += 40) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(800,y); ctx.stroke() }
    }

    // CRT 모니터 데코 (좌/우 배치, 타이틀 높이에 맞춤)
    if (window.drawUIMonitor) {
      const mw = 104, mh = 85
      drawUIMonitor(ctx, 14,  20, mw, mh)   // 좌측
      drawUIMonitor(ctx, 682, 20, mw, mh)   // 우측
    }

    // 타이틀
    ctx.textAlign = 'center'
    ctx.fillStyle = '#4488ff'
    ctx.font = 'bold 48px "Press Start 2P", monospace'
    ctx.fillText('DEV', 400, 62)
    ctx.fillStyle = '#ffffff'
    ctx.fillText('SURVIVOR', 400, 116)

    // 부제
    ctx.fillStyle = '#ffcc55'
    ctx.font = '22px "VT323", monospace'
    ctx.fillText('AI가 발전하는 세상에서, 오늘도 버텨야 한다', 400, 140)

    // 점수 / 포인트 (한 줄)
    const best = parseInt(localStorage.getItem('devsurvival_best') || '0')
    const pts  = window.MetaManager ? MetaManager.loadPoints() : 0
    ctx.fillStyle = '#FFD700'
    ctx.font = '15px "VT323", monospace'
    ctx.fillText(`최고 기록: ${best.toLocaleString()}점`, 230, 161)
    ctx.fillStyle = '#ff4444'
    ctx.font = 'bold 16px "VT323", monospace'
    ctx.fillText(`출시 포인트: ${pts}`, 510, 161)

    // gold_4 보유량 표시 (뱀파이어 해금 재화)
    const g4 = parseInt(localStorage.getItem('devSurvivor_gold4') || '0')
    if (g4 > 0 || window.MetaManager?.isUnlocked('vampir')) {
      ctx.fillStyle = '#aa44ff'
      ctx.font = '12px "VT323", monospace'
      ctx.textAlign = 'center'
      ctx.fillText(`gold_4 × ${g4}  (뱀파이어 해금: gold_4 1개)`, 400, 175)
    }

    // 캐릭터 선택 헤더
    ctx.fillStyle = '#556677'
    ctx.font = '12px "VT323", monospace'
    ctx.fillText('── 캐릭터 선택 ──', 400, 181)

    // 캐릭터 카드
    this._drawCharCards(ctx)

    // 시작 버튼 (메인 CTA — gradient rect)
    const s = this.startBtnRect
    ctx.save()
    ctx.shadowColor = '#4488ff'
    ctx.shadowBlur = 14
    const sGrad = ctx.createLinearGradient(s.x, s.y, s.x, s.y + s.h)
    sGrad.addColorStop(0, '#1e4a90')
    sGrad.addColorStop(1, '#0d2450')
    ctx.fillStyle = sGrad
    ctx.strokeStyle = '#66aaff'
    ctx.lineWidth = 2
    ctx.fillRect(s.x, s.y, s.w, s.h)
    ctx.strokeRect(s.x, s.y, s.w, s.h)
    ctx.restore()
    ctx.fillStyle = '#ffffff'
    ctx.font = 'bold 36px "VT323", monospace'
    ctx.textAlign = 'center'
    ctx.fillText('[ 시작하기 ]', s.x + s.w / 2, s.y + s.h / 2 + 8)

    // 업그레이드 버튼 (보조 — gradient rect)
    const u = this.upgradeBtnRect
    const uGrad = ctx.createLinearGradient(u.x, u.y, u.x, u.y + u.h)
    uGrad.addColorStop(0, '#1a3a1a')
    uGrad.addColorStop(1, '#0a1e0a')
    ctx.fillStyle = uGrad
    ctx.strokeStyle = '#55aa55'
    ctx.lineWidth = 1.5
    ctx.fillRect(u.x, u.y, u.w, u.h)
    ctx.strokeRect(u.x, u.y, u.w, u.h)
    ctx.fillStyle = '#77cc77'
    ctx.font = '18px "VT323", monospace'
    ctx.textAlign = 'center'
    ctx.fillText('업그레이드', u.x + u.w / 2, u.y + u.h / 2 + 6)

    // 조작 안내 (1줄로 축소)
    ctx.fillStyle = 'rgba(0,0,0,0.55)'
    ctx.fillRect(0, 488, 800, 32)
    ctx.fillStyle = '#7799bb'
    ctx.font = '16px "VT323", monospace'
    ctx.textAlign = 'center'
    ctx.fillText('이동: 방향키  /  스킬: Q/W/E/R  /  레벨업 시 스킬 선택', 400, 508)
    ctx.textAlign = 'left'
  }

  _drawCharCards(ctx) {
    const configs = window.CHAR_CONFIGS || {}
    const sprites = window.CHAR_SPRITES || {}

    for (const card of this._cards) {
      const cfg = configs[card.key]
      const spr = sprites[card.key]
      const sel = this._selected === card.key
      const cx  = card.x + card.w / 2

      // 카드 배경 (선택된 카드 글로우 강조)
      if (sel) {
        ctx.save()
        ctx.shadowColor = '#4488ff'
        ctx.shadowBlur = 14
        ctx.fillStyle = 'rgba(68,136,255,0.28)'
        ctx.strokeStyle = '#66aaff'
        ctx.lineWidth = 2.5
        ctx.fillRect(card.x, card.y, card.w, card.h)
        ctx.strokeRect(card.x, card.y, card.w, card.h)
        ctx.restore()
      } else {
        ctx.fillStyle = 'rgba(0,0,20,0.72)'
        ctx.strokeStyle = '#2a3a55'
        ctx.lineWidth = 1
        ctx.fillRect(card.x, card.y, card.w, card.h)
        ctx.strokeRect(card.x, card.y, card.w, card.h)
      }

      // 선택 표시 (우상단 ▶)
      if (sel) {
        ctx.fillStyle = '#4488ff'
        ctx.font = '9px "VT323", monospace'
        ctx.textAlign = 'right'
        ctx.fillText('▶', card.x + card.w - 5, card.y + 12)
      }

      ctx.textAlign = 'center'

      // 캐릭터 프리뷰 — idle 스프라이트 frame0, portrait 효과
      const portraitH = card.h - 56  // 이름16 + 역할배지18 + 패시브설명16 + 여백6 = 56px 확보
      const portraitY = card.y + 2
      const idleImg = spr?.idle

      // 캐릭터별 배경색
      const charBg = { adam: '#0e1f3a', amelia: '#1a1230', vampir: '#1a0a2e' }
      ctx.fillStyle = charBg[card.key] || '#111827'
      ctx.fillRect(card.x + 2, portraitY, card.w - 4, portraitH)

      if (idleImg?.complete && idleImg.naturalWidth > 0 && cfg?.idle) {
        const fw = cfg.idle.fw
        const fh = cfg.idle.fh
        let dispW, dispH, drawX, drawY
        if (fw <= 16) {
          // 소형 픽셀 아트 스프라이트: 높이 기준 스케일, 중앙 정렬, 픽셀 완벽 렌더링
          const scale = (portraitH - 4) / fh
          dispH = portraitH - 4
          dispW = fw * scale
          drawX = card.x + (card.w - dispW) / 2
          drawY = portraitY + 2
        } else {
          // 대형 스프라이트: 높이에 맞춰 스케일 → 수평 중앙 정렬
          const scaleToH = (portraitH - 4) / fh
          dispH = portraitH - 4
          dispW = fw * scaleToH
          drawX = card.x + (card.w - dispW) / 2
          drawY = portraitY + 2
        }
        ctx.save()
        ctx.beginPath()
        ctx.rect(card.x, card.y, card.w, portraitH)
        ctx.clip()
        if (fw <= 16) {
          // 소형 스프라이트 후광 (16x16 픽셀아트 캐릭터 가시성 향상)
          const glowCX = drawX + dispW / 2
          const glowCY = drawY + dispH / 2
          const glowR  = dispW * 0.6
          const grd = ctx.createRadialGradient(glowCX, glowCY, 0, glowCX, glowCY, glowR)
          grd.addColorStop(0,   'rgba(180,210,255,0.18)')
          grd.addColorStop(0.5, 'rgba(120,170,255,0.08)')
          grd.addColorStop(1,   'rgba(0,0,0,0)')
          ctx.fillStyle = grd
          ctx.fillRect(drawX, drawY, dispW, dispH)
        }
        ctx.imageSmoothingEnabled = fw > 16
        ctx.imageSmoothingQuality = fw > 16 ? 'high' : 'low'
        ctx.drawImage(idleImg, 0, 0, fw, fh, drawX, drawY, dispW, dispH)
        ctx.imageSmoothingEnabled = false
        ctx.restore()
      } else {
        // 로딩 전 플레이스홀더
        ctx.fillStyle = '#334466'
        ctx.font = '28px "VT323", monospace'
        ctx.textAlign = 'center'
        ctx.fillText('?', cx, portraitY + portraitH / 2 + 10)
      }

      // 이름
      ctx.fillStyle = sel ? '#ffffff' : '#aabbcc'
      ctx.font = 'bold 15px "VT323", monospace'
      ctx.fillText(cfg?.label || card.key, cx, card.y + card.h - 42)

      // 역할 타입 배지
      const roleType  = cfg?.roleType || ''
      const roleColor = cfg?.roleColor || '#888888'
      if (roleType) {
        const badgeW = 72, badgeH = 16
        const badgeX = cx - badgeW / 2
        const badgeY = card.y + card.h - 36
        ctx.fillStyle = roleColor + '33'
        ctx.strokeStyle = roleColor
        ctx.lineWidth = 1
        ctx.fillRect(badgeX, badgeY, badgeW, badgeH)
        ctx.strokeRect(badgeX, badgeY, badgeW, badgeH)
        ctx.fillStyle = roleColor
        ctx.font = 'bold 12px "VT323", monospace'
        ctx.fillText(roleType, cx, badgeY + 12)
      }

      // 패시브명
      ctx.fillStyle = sel ? '#ccbbff' : '#7788aa'
      ctx.font = '12px "VT323", monospace'
      ctx.fillText(cfg?.sublabel || '', cx, card.y + card.h - 4)

      // 잠금 오버레이
      if (!window.MetaManager?.isUnlocked(card.key)) {
        ctx.save()
        ctx.fillStyle = 'rgba(0,0,0,0.82)'
        ctx.fillRect(card.x, card.y, card.w, card.h)
        ctx.textAlign = 'center'
        // 캐릭터 이름 (상단 강조)
        ctx.fillStyle = '#ee88ff'
        ctx.font = 'bold 20px "VT323", monospace'
        ctx.fillText(cfg?.label || card.key, cx, card.y + 24)
        // 구분선
        ctx.strokeStyle = '#663388'
        ctx.lineWidth = 1
        ctx.beginPath()
        ctx.moveTo(card.x + 10, card.y + 30)
        ctx.lineTo(card.x + card.w - 10, card.y + 30)
        ctx.stroke()
        // 잠금 아이콘
        ctx.font = '30px "VT323", monospace'
        ctx.fillText('🔒', cx, card.y + 64)
        // 해금 안내
        ctx.fillStyle = '#cc88ff'
        ctx.font = 'bold 13px "VT323", monospace'
        ctx.fillText('보스 처치 후', cx, card.y + 90)
        ctx.fillStyle = '#FFD700'
        ctx.font = 'bold 12px "VT323", monospace'
        ctx.fillText('골드 다이아 × 1 획득', cx, card.y + 108)
        ctx.fillStyle = '#aa88ff'
        ctx.font = '11px "VT323", monospace'
        ctx.fillText('→ 자동 해금됩니다', cx, card.y + 124)
        ctx.restore()
      }
    }

    ctx.textAlign = 'left'
  }
}

  <script>
class Result {
  constructor() {
    this._winRestartRect  = { x: 200, y: 478, w: 170, h: 44 }
    this._winUpgradeRect  = { x: 430, y: 478, w: 170, h: 44 }
    this._loseRestartRect = { x: 200, y: 382, w: 170, h: 44 }
    this._loseUpgradeRect = { x: 430, y: 382, w: 170, h: 44 }
    this._resultStartTime = null
    this._rateSaved = false
    this._bindClick()
  }

  _bindClick() {
    window.addEventListener('click', (e) => {
      if (GameState.screen !== 'result') return
      const canvas = document.getElementById('gameCanvas')
      if (!canvas) return
      const rect = canvas.getBoundingClientRect()
      const x = (e.clientX - rect.left) * (800 / rect.width)
      const y = (e.clientY - rect.top)  * (600 / rect.height)

      const elapsed = this._resultStartTime
        ? (performance.now() - this._resultStartTime) / 1000 : 0

      const win = GameState._lastWin
      if (win  && elapsed < 1.2) return  // 승리 연출 중 버튼 무효
      if (!win && elapsed < 1.2) return  // 패배 연출 중 버튼 무효

      const r = win ? this._winRestartRect  : this._loseRestartRect
      const u = win ? this._winUpgradeRect  : this._loseUpgradeRect

      if (x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h) {
        Game.restart(); return
      }
      if (x >= u.x && x <= u.x + u.w && y >= u.y && y <= u.y + u.h) {
        GameState.screen = 'upgrade'
      }
    })
  }

  render(ctx) {
    if (GameState.screen !== 'result') {
      this._resultStartTime = null
      this._rateSaved = false
      return
    }
    if (!this._resultStartTime) this._resultStartTime = performance.now()
    const elapsed = (performance.now() - this._resultStartTime) / 1000

    if (GameState._lastWin) this._renderWin(ctx, elapsed)
    else this._renderLose(ctx, elapsed)
  }

  // ── Dev Win ─────────────────────────────────────────────────────────────

  _renderWin(ctx, elapsed) {
    ctx.save()

    // 배경
    ctx.fillStyle = '#030d03'
    ctx.fillRect(0, 0, 800, 600)

    const glow = ctx.createRadialGradient(400, 300, 0, 400, 300, 380)
    glow.addColorStop(0, 'rgba(255,215,0,0.13)')
    glow.addColorStop(1, 'rgba(0,0,0,0)')
    ctx.fillStyle = glow
    ctx.fillRect(0, 0, 800, 600)

    // ① 제목 페이드인 (0 ~ 0.6s)
    const titleAlpha = Math.min(1, elapsed / 0.6)
    ctx.save()
    ctx.globalAlpha = titleAlpha
    ctx.textAlign = 'center'
    ctx.fillStyle = '#FFD700'
    ctx.font = 'bold 24px "Press Start 2P", monospace'
    ctx.shadowColor = '#FFD700'
    ctx.shadowBlur = 24
    ctx.fillText('배포 성공!', 400, 94)
    ctx.shadowBlur = 0

  _renderLose(ctx, elapsed) {
    // 1. 암전 배경
    ctx.fillStyle = '#050508'
    ctx.fillRect(0, 0, 800, 600)

    // 2. 스포트라이트 콘
    const spotAlpha = Math.min(1, elapsed / 0.7)
    ctx.save()
    ctx.globalAlpha = spotAlpha
    ctx.beginPath()
    ctx.moveTo(400, 10)
    ctx.lineTo(90, 600)
    ctx.lineTo(710, 600)
    ctx.closePath()
    ctx.clip()
    const sg = ctx.createLinearGradient(400, 10, 400, 600)
    sg.addColorStop(0,   'rgba(255,240,160,0.0)')
    sg.addColorStop(0.2, 'rgba(255,230,140,0.38)')
    sg.addColorStop(1,   'rgba(255,210,100,0.72)')
    ctx.fillStyle = sg
    ctx.fillRect(0, 0, 800, 600)

    // 4. 쓰러진 캐릭터
    const charAlpha = Math.min(1, Math.max(0, (elapsed - 0.4) / 0.5))
    this._drawCollapsedPlayer(ctx, 400, 440, charAlpha)

    // 5. 결과 패널 (1.2초 이후 페이드인)
    const panelAlpha = Math.min(1, Math.max(0, (elapsed - 1.2) / 0.5))
    if (panelAlpha > 0) this._drawLosePanel(ctx, panelAlpha)
  }

  _drawCollapsedPlayer(ctx, cx, cy, alpha) {
    if (alpha <= 0) return
    ctx.save()
    ctx.globalAlpha = alpha

    // 선택된 캐릭터 스프라이트로 쓰러진 모습 표현
    const charKey = window.GameState?.selectedCharacter || 'adam'
    const cfg = window.CHAR_CONFIGS?.[charKey]
    const spr = window.CHAR_SPRITES?.[charKey]
    const anim = cfg?.hit || cfg?.idle
    const img  = spr?.hit || spr?.idle

    if (img?.complete && img.naturalWidth > 0 && anim) {
      const scale = (cfg.scale || 1) * 2.0  // 패배 화면에서 2배 크게
      const dw = cfg.renderW ? cfg.renderW * 2 : Math.round(anim.fw * scale)
      const dh = cfg.renderH ? cfg.renderH * 2 : Math.round(anim.fh * scale)
      ctx.imageSmoothingEnabled = false
      // 90도 회전해서 쓰러진 모습
      ctx.translate(cx, cy)
      ctx.rotate(Math.PI / 2)
      ctx.drawImage(img, 0, 0, anim.fw, anim.fh, -dw / 2, -dh / 2, dw, dh)
      ctx.rotate(-Math.PI / 2)
      ctx.translate(-cx, -cy)
    } else {
      // 폴백: 기존 캔버스 드로잉
      ctx.fillStyle = '#2255cc'
      ctx.fillRect(cx, cy - 5, 34, 10)
      ctx.fillStyle = '#ffffff'
      ctx.fillRect(cx + 32, cy - 6, 10, 6)
      ctx.fillRect(cx + 32, cy + 3, 10, 6)
      ctx.fillStyle = '#4488ff'
      ctx.fillRect(cx - 24, cy - 9, 27, 18)
      ctx.fillRect(cx - 32, cy + 3, 12, 7)
      ctx.fillStyle = '#66aaff'
      ctx.beginPath()
      ctx.arc(cx - 30, cy - 2, 12, 0, Math.PI * 2)
      ctx.fill()
    }

    // 눈물 파티클
    ctx.fillStyle = '#88ccff'
    ctx.globalAlpha = alpha * 0.8
    ctx.beginPath(); ctx.arc(cx - 20, cy + 30, 4, 0, Math.PI * 2); ctx.fill()
    ctx.beginPath(); ctx.arc(cx - 8, cy + 36, 3, 0, Math.PI * 2); ctx.fill()
    // 느낌표
    ctx.globalAlpha = alpha
    ctx.fillStyle = '#ffdd44'
    ctx.font = 'bold 18px "VT323", monospace'
    ctx.textAlign = 'center'
    ctx.fillText('!', cx + 30, cy - 20)
    ctx.fillText('!', cx + 46, cy - 36)

    ctx.restore()
  }

  _drawLosePanel(ctx, alpha) {
    const causes = [
      'BoxBot의 공격을 막지 못했습니다.',
      '야근 누적으로 체력이 바닥났습니다.',
      '스프린트 마감 압박을 버티지 못했습니다.',
      '버그보다 수정이 느렸습니다.',
      '기술 부채가 한꺼번에 터졌습니다.',
    ]
    const comments = [
      '"다음엔 더 잘할 수 있을 거야... 아마도."',
      '"야근 수당은 없습니다. 물론이죠."',
      '"AI는 쉬지 않는다. 당신도 쉬지 마."',
      '"포기하지 마세요. 다만 기대치를 낮추세요."',
      '"이 경험도 경력이 됩니다. 아마도."',
    ]
    const cause   = causes[GameState.killCount   % causes.length]
    const comment = comments[GameState.killCount % comments.length]

    const RANKS = ['인턴', '주니어 개발자', '개발자', '주임 개발자', '시니어 개발자']
    const rankName = RANKS[Math.min(GameState.playerLevel - 1, RANKS.length - 1)]
    const t = GameState.gameTime
    const mins = Math.floor(t / 60)
    const secs = Math.floor(t % 60)
    const earned = GameState.lastEarnedPoints || 0

    const prevRate = parseInt(localStorage.getItem('devSurvivor_survivalRate') || '30')
    const gain = Math.max(1, Math.floor(t / 60))
    const newRate = Math.min(95, prevRate + gain)
    if (!this._rateSaved) {
      localStorage.setItem('devSurvivor_survivalRate', String(newRate))
      this._rateSaved = true
    }
    const total = window.MetaManager ? MetaManager.loadPoints() : 0

    ctx.save()
    ctx.globalAlpha = alpha

    // 반투명 오버레이
    ctx.fillStyle = 'rgba(0,0,0,0.62)'
    ctx.fillRect(0, 0, 800, 600)

    // 카드
    const px = 104, py = 88, pw = 592, ph = 268
    ctx.fillStyle = '#f0ece0'
    ctx.fillRect(px, py, pw, ph)
    ctx.strokeStyle = '#881111'
    ctx.lineWidth = 3
    ctx.strokeRect(px, py, pw, ph)

    // 헤더
    ctx.fillStyle = '#881111'
    ctx.fillRect(px, py, pw, 40)
    ctx.fillStyle = '#ffffff'
    ctx.font = 'bold 19px "VT323", monospace'
    ctx.textAlign = 'center'
    ctx.fillText('프로젝트 취소 — AI 승리', 400, py + 26)

    // 원인
    ctx.fillStyle = '#444'
    ctx.font = '13px "VT323", monospace'
    ctx.fillText(cause, 400, py + 62)

    // 구분선 1
    ctx.strokeStyle = '#ccc'; ctx.lineWidth = 1
    ctx.beginPath(); ctx.moveTo(px+24, py+74); ctx.lineTo(px+pw-24, py+74); ctx.stroke()

    // 스탯 (2열)
    const statRows = [
      ['최종 직급', rankName],
      ['생존 시간', `${mins}:${secs.toString().padStart(2,'0')}`],
      ['처치 수',   `${GameState.killCount}마리`],
    ]
    const statRows2 = [
      ['출시 포인트', `+${earned} 🪙`],
      ['생존 확률', `${prevRate}% → ${newRate}%`],
    ]
    const c1l = px + 28, c1r = px + 278
    const c2l = px + 318, c2r = px + pw - 20
    statRows.forEach(([lbl, val], i) => {
      const ry = py + 100 + i * 26
      ctx.fillStyle = '#666'; ctx.font = '12px "VT323", monospace'; ctx.textAlign = 'left'
      ctx.fillText(lbl, c1l, ry)
      ctx.fillStyle = '#111'; ctx.font = 'bold 12px "VT323", monospace'; ctx.textAlign = 'right'
      ctx.fillText(val, c1r, ry)
    })
    statRows2.forEach(([lbl, val], i) => {
      const ry = py + 100 + i * 26
      ctx.fillStyle = '#666'; ctx.font = '12px "VT323", monospace'; ctx.textAlign = 'left'
      ctx.fillText(lbl, c2l, ry)
      ctx.fillStyle = i === 1 ? '#1a44cc' : '#111'
      ctx.font = 'bold 12px "VT323", monospace'; ctx.textAlign = 'right'
      ctx.fillText(val, c2r, ry)
    })

    // 구분선 2
    ctx.strokeStyle = '#ccc'; ctx.lineWidth = 1
    ctx.beginPath(); ctx.moveTo(px+24, py+178); ctx.lineTo(px+pw-24, py+178); ctx.stroke()

    // 포인트 요약
    ctx.fillStyle = '#333'; ctx.font = '12px "VT323", monospace'; ctx.textAlign = 'center'
    ctx.fillText(`출시 포인트 +${earned} 획득  (누적: ${total}pt)`, 400, py + 200)

    // 블랙코미디 멘트
    ctx.fillStyle = '#888'; ctx.font = '11px "VT323", monospace'
    ctx.fillText(comment, 400, py + 222)

    // 구분선 3
    ctx.strokeStyle = '#ccc'; ctx.lineWidth = 1
    ctx.beginPath(); ctx.moveTo(px+24, py+234); ctx.lineTo(px+pw-24, py+234); ctx.stroke()

    // 버튼
    const r = this._loseRestartRect, u = this._loseUpgradeRect
    if (window.drawUIPanel) {
      drawUIPanel(ctx, r.x, r.y, r.w, r.h)
      drawUIPanel(ctx, u.x, u.y, u.w, u.h)
    } else {
      ctx.fillStyle = '#1e3a88'; ctx.strokeStyle = '#4466cc'; ctx.lineWidth = 2
      ctx.fillRect(r.x, r.y, r.w, r.h); ctx.strokeRect(r.x, r.y, r.w, r.h)
      ctx.fillStyle = '#1a4a1a'; ctx.strokeStyle = '#2d8840'; ctx.lineWidth = 2
      ctx.fillRect(u.x, u.y, u.w, u.h); ctx.strokeRect(u.x, u.y, u.w, u.h)
    }
    ctx.fillStyle = '#ffffff'; ctx.font = 'bold 18px "VT323", monospace'; ctx.textAlign = 'center'
    ctx.fillText('[ 재도전 ]', r.x + r.w / 2, r.y + 28)
    ctx.fillStyle = '#88ff88'
    ctx.fillText('[ 업그레이드 ]', u.x + u.w / 2, u.y + 28)

    ctx.restore()
  }

  <script>
// ui/joystick.js — 모바일 가상 조이스틱 (GDD Part 2.2)
// 터치 디바이스에서만 활성화

const JOYSTICK_RADIUS = 60
const KNOB_RADIUS = 24
// 다이아몬드 배치: 엄지 자연스러운 위치 (중심 710,480, 간격 64px)
const SKILL_BUTTONS = [
  { slot: 0, label: 'Q', x: 648, y: 480 },  // 왼쪽
  { slot: 1, label: 'W', x: 710, y: 416 },  // 위
  { slot: 2, label: 'E', x: 772, y: 480 },  // 오른쪽
  { slot: 3, label: 'R', x: 710, y: 544 },  // 아래
]
const BTN_RADIUS = 28

class VirtualJoystick {
  constructor() {
    this.active = false
    this.baseX = 0
    this.baseY = 0
    this.knobX = 0
    this.knobY = 0
    this.touchId = null

    // 스킬 버튼 터치 ID 추적
    this.skillTouchIds = {}

    this._isTouchDevice = false
    this._bindEvents()
  }

  _bindEvents() {
    const canvas = document.getElementById('gameCanvas')
    if (!canvas) return

    canvas.addEventListener('touchstart', e => {
      e.preventDefault()
      this._isTouchDevice = true
      for (const t of e.changedTouches) {
        const { cx, cy } = this._toCanvas(t, canvas)
        // 스킬 버튼 체크 (오른쪽 영역)
        const btn = this._hitSkillButton(cx, cy)
        if (btn !== -1) {
          this.skillTouchIds[t.identifier] = btn
          if (GameState.screen === 'playing' && !GameState.isPaused) {
            Game.skillManager?.activateSkill(btn)
          }
          continue
        }
        // 조이스틱 (왼쪽 절반, 미사용 터치만)
        if (cx < 500 && this.touchId === null) {
          this.touchId = t.identifier
          this.active = true
          this.baseX = cx
          this.baseY = cy
          this.knobX = cx
          this.knobY = cy
        }
      }
    }, { passive: false })

    canvas.addEventListener('touchmove', e => {
      e.preventDefault()
      for (const t of e.changedTouches) {
        if (t.identifier !== this.touchId) continue
        const { cx, cy } = this._toCanvas(t, canvas)
        const dx = cx - this.baseX
        const dy = cy - this.baseY
        const dist = Math.sqrt(dx * dx + dy * dy)
        const clamped = Math.min(dist, JOYSTICK_RADIUS)
        const angle = Math.atan2(dy, dx)
        this.knobX = this.baseX + Math.cos(angle) * clamped
        this.knobY = this.baseY + Math.sin(angle) * clamped
        this._updateKeys(dx, dy)
      }
    }, { passive: false })

    canvas.addEventListener('touchend', e => {
      e.preventDefault()
      for (const t of e.changedTouches) {
        if (t.identifier === this.touchId) {
          this.active = false
          this.touchId = null
          this._clearKeys()
        }
        if (t.identifier in this.skillTouchIds) {
          delete this.skillTouchIds[t.identifier]
        }
      }
    }, { passive: false })

    canvas.addEventListener('touchcancel', e => {
      this.active = false
      this.touchId = null
      this._clearKeys()
      this.skillTouchIds = {}
    }, { passive: false })
  }

  _toCanvas(touch, canvas) {
    const rect = canvas.getBoundingClientRect()
    const scaleX = 800 / rect.width
    const scaleY = 600 / rect.height
    return {
      cx: (touch.clientX - rect.left) * scaleX,
      cy: (touch.clientY - rect.top) * scaleY,
    }
  }

  _hitSkillButton(cx, cy) {
    for (const btn of SKILL_BUTTONS) {
      const dx = cx - btn.x
      const dy = cy - btn.y
      if (Math.sqrt(dx * dx + dy * dy) < BTN_RADIUS) return btn.slot
    }
    return -1
  }

  _updateKeys(dx, dy) {
    if (!window.inputKeys) return
    const dead = 12
    inputKeys['KeyW'] = dy < -dead
    inputKeys['KeyS'] = dy > dead
    inputKeys['KeyA'] = dx < -dead
    inputKeys['KeyD'] = dx > dead
  }

  _clearKeys() {
    if (!window.inputKeys) return
    inputKeys['KeyW'] = false
    inputKeys['KeyS'] = false
    inputKeys['KeyA'] = false
    inputKeys['KeyD'] = false
  }

  render(ctx) {
    if (!this._isTouchDevice) return
    if (GameState.screen !== 'playing') return

    ctx.save()
    ctx.globalAlpha = 0.5

    // 조이스틱 베이스
    if (this.active) {
      ctx.beginPath()
      ctx.arc(this.baseX, this.baseY, JOYSTICK_RADIUS, 0, Math.PI * 2)
      ctx.strokeStyle = '#ffffff'
      ctx.lineWidth = 2
      ctx.stroke()
      ctx.fillStyle = 'rgba(255,255,255,0.1)'
      ctx.fill()

      // 조이스틱 노브
      ctx.beginPath()
      ctx.arc(this.knobX, this.knobY, KNOB_RADIUS, 0, Math.PI * 2)
      ctx.fillStyle = 'rgba(255,255,255,0.6)'
      ctx.fill()
    }

    // 스킬 버튼
    ctx.globalAlpha = 0.7
    for (const btn of SKILL_BUTTONS) {
      const skill = Game.skillManager?.slots?.[btn.slot]
      const cd = Game.skillManager?.cooldowns?.[btn.slot] ?? 0
      const maxCd = Game.skillManager?.maxCooldowns?.[btn.slot] ?? 1

      // 버튼 배경
      ctx.beginPath()
      ctx.arc(btn.x, btn.y, BTN_RADIUS, 0, Math.PI * 2)
      ctx.fillStyle = skill ? (cd > 0 ? '#334' : '#226') : '#222'
      ctx.fill()
      ctx.strokeStyle = skill ? '#4488ff' : '#445'
      ctx.lineWidth = 2
      ctx.stroke()

      // 쿨다운 호
      if (skill && cd > 0) {
        const ratio = cd / maxCd
        ctx.beginPath()
        ctx.moveTo(btn.x, btn.y)
        ctx.arc(btn.x, btn.y, BTN_RADIUS, -Math.PI / 2, -Math.PI / 2 + ratio * Math.PI * 2)
        ctx.closePath()
        ctx.fillStyle = 'rgba(0,0,0,0.5)'
        ctx.fill()
      }

      // 라벨: 스킬 없으면 Q/W/E/R, 있으면 키 + 스킬 이름 약칭
      ctx.textAlign = 'center'
      ctx.textBaseline = 'middle'
      if (skill) {
        // 키 레이블 (위쪽 작게)
        ctx.fillStyle = '#aaccff'
        ctx.font = 'bold 8px "Press Start 2P", monospace'
        ctx.fillText(btn.label, btn.x, btn.y - 9)
        // 스킬 이름 앞 3자 (아래쪽)
        ctx.fillStyle = cd > 0 ? '#778899' : '#ffffff'
        ctx.font = 'bold 8px "Press Start 2P", monospace'
        ctx.fillText(skill.slice(0, 3), btn.x, btn.y + 7)
      } else {
        ctx.fillStyle = '#555'
        ctx.font = 'bold 10px "Press Start 2P", monospace'
        ctx.fillText(btn.label, btn.x, btn.y)
      }
    }

    ctx.textBaseline = 'alphabetic'
    ctx.restore()
  }
}

window._joystick = new VirtualJoystick()

  </script>

  isPaused: false,
  score: 0,
  releaseProgress: 0,
  killCount: 0,
  basicKills: 0,
  pcBotKills: 0,
  mirrorBotKills: 0,
  aiBotReached: false,
  aiBotKilled: false,
  bossKilled: false,        // 보스(미러워커) 처치 여부
  bossGoldHint: false,      // "퇴근하세요!" 힌트 표시 여부
  enemies: [],
  projectiles: [],
  hazardZones: [],
  playerDanger: false,
  playerExpGained: 0,
  playerLevel: 1,
  playerExp: 0,
  _lastWin: false,
  aiBotIntro: false,
  aiBotIntroTimer: 0,
  enemyAnnouncement: null,
  // 메타 업그레이드 배율 (MetaManager.applyToPlayer 에서 설정)
  skillDamageMult: 1,
  expMultiplier:   1,
  healMultiplier:  1,
  lastEarnedPoints: 0,
  // 캐릭터 선택 (lobby에서 설정, 게임 재시작 시 유지)
  selectedCharacter: localStorage.getItem('devSurvivor_char') || 'adam',
}

// 메타 매니저 초기화 (GameState 정의 직후)
if (window.MetaManager) MetaManager.initUnlockedChars()

// ─────────────────────────────────────────
// 키 입력
// ─────────────────────────────────────────
const inputKeys = {}
window.inputKeys = inputKeys

window.addEventListener('keydown', e => {
  inputKeys[e.code] = true
  if (
    ['KeyQ', 'KeyW', 'KeyE', 'KeyR'].includes(e.code) &&
    GameState.screen === 'playing' &&
    !GameState.isPaused &&
    !window._levelUpManager?.pendingLevelUp
  ) {
    const slot = ['KeyQ', 'KeyW', 'KeyE', 'KeyR'].indexOf(e.code)
    Game.skillManager?.activateSkill(slot)
  }
})
window.addEventListener('keyup', e => { inputKeys[e.code] = false })

// ─────────────────────────────────────────
// 카메라 시스템
// ─────────────────────────────────────────
window.Camera = { x: 0, y: 0 }

function updateCamera(player) {
  if (!player) return
  const WW = window.WORLD_W || 800
  const WH = window.WORLD_H || 600
  Camera.x = Math.max(0, Math.min(WW - 800, player.x - 400))
  Camera.y = Math.max(0, Math.min(WH - 600, player.y - 300))
}

// ─────────────────────────────────────────
// 적 등장 알림 렌더링
// ─────────────────────────────────────────
function _drawEnemyAnnouncement(ctx, ann) {
  const elapsed = ann.maxTimer - ann.timer
  let alpha
  if (elapsed < 0.3) alpha = elapsed / 0.3
  else if (ann.timer < 0.6) alpha = ann.timer / 0.6
  else alpha = 1

  ctx.save()
  ctx.globalAlpha = alpha

  // 배너 배경
  ctx.fillStyle = 'rgba(12, 4, 28, 0.9)'
  ctx.fillRect(20, 72, 760, 100)
  ctx.strokeStyle = '#cc2222'
  ctx.lineWidth = 2
  ctx.strokeRect(20, 72, 760, 100)

  // 레이블
  ctx.fillStyle = '#ff6644'
  ctx.font = '22px "VT323", cursive'
  ctx.textAlign = 'center'
  ctx.fillText('⚠  신규 적 등장  ⚠', 400, 94)

  // 적 이름
  ctx.fillStyle = '#ff3333'
  ctx.font = 'bold 38px "VT323", cursive'
  ctx.fillText(ann.name, 400, 130)

  // 설명
  ctx.fillStyle = '#ddbbaa'
  ctx.font = '20px "VT323", cursive'
  ctx.fillText(ann.desc, 400, 158)

  ctx.restore()
}

// ─────────────────────────────────────────
// 캐릭터 패시브 적용
// ─────────────────────────────────────────
function _applyCharacterPassive(player, skillManager) {
  const charKey = GameState.selectedCharacter || 'adam'
  if (charKey === 'adam') {
    // 속도형 / 빠른 적응: 경험치 +20%, 이동속도 +20
    player._charPassive = 'speed'
    GameState.expMultiplier = (GameState.expMultiplier || 1) + 0.2
    player.baseSpeed += 20
  } else if (charKey === 'alex') {
    // 처리형 / 숙련된 디버깅: 스킬 데미지 +20%, 디버그 쿨다운 -0.5초
    player._charPassive = 'combat'
    GameState.skillDamageMult = (GameState.skillDamageMult || 1) + 0.2
    if (skillManager?.skillDefs?.['디버그']) {
      skillManager.skillDefs['디버그'].cooldown = Math.max(0.5, skillManager.skillDefs['디버그'].cooldown - 0.5)
    }
  } else if (charKey === 'amelia') {
    // 버티기형 / 끝까지 버티기: 회복량 +25%, 보호막 +1, 저체력 피해 -20%(takeDamage에서 처리)
    player._charPassive = 'survivor'
    GameState.healMultiplier = (GameState.healMultiplier || 1) + 0.25
    player.addShield(1)
  }
}

// ─────────────────────────────────────────
// 배경 렌더링
// ─────────────────────────────────────────
function drawBackground(ctx) {
  if (window.TilemapSystem) {
    window.TilemapSystem.render(ctx, Camera.x, Camera.y)
  } else {
    ctx.fillStyle = '#0d0d1a'
    ctx.fillRect(0, 0, 800, 600)
  }
}

// ─────────────────────────────────────────
// Game 인터페이스
// ─────────────────────────────────────────
window.Game = {
  canvas: null,
  ctx: null,
  player: null,
  enemySystem: null,
  skillManager: null,

  registerEnemySystem(spawner) { Game.enemySystem = spawner },
  registerSkillSystem(sm)      { Game.skillManager = sm },
  registerUI(ui)               { /* 통합 버전에서는 개별 모듈 직접 호출 */ },

  init() {
    Game.canvas = document.getElementById('gameCanvas')
    Game.ctx    = Game.canvas.getContext('2d')
    GameState.screen = 'lobby'
    _lastTime = performance.now()
    requestAnimationFrame(_loop)
  },

  start() {
    Object.assign(GameState, {
      screen: 'playing',
      gameTime: 0,
      isRunning: true,
      isPaused: false,
      score: 0,
      releaseProgress: 0,
      killCount: 0,
      basicKills: 0,
      pcBotKills: 0,
      mirrorBotKills: 0,
      aiBotReached: false,
      aiBotKilled: false,
      bossKilled: false,
      bossGoldHint: false,
      bossDeathAnnounce: null,
      enemies: [],
      projectiles: [],
      hazardZones: [],
      playerDanger: false,
      playerExpGained: 0,
      playerLevel: 1,
      playerExp: 0,
      _lastWin: false,
      skillDamageMult: 1,
      expMultiplier:   1,
      healMultiplier:  1,
      lastEarnedPoints: 0,
      aiBotIntro: false,
      aiBotIntroTimer: 0,
      enemyAnnouncement: null,
    })

    // 카메라 초기화
    if (window.Camera) { Camera.x = 0; Camera.y = 0 }

    // 플레이어 생성 (월드 중앙 근처)
    if (window.Player) {
      Game.player = new window.Player(1200, 900)
      // skills.js가 playerCreated 이벤트를 듣고 SkillManager를 등록
      window.dispatchEvent(new CustomEvent('playerCreated', { detail: { player: Game.player } }))
      // 메타 업그레이드 효과 적용
      if (window.MetaManager) MetaManager.applyToPlayer(Game.player, Game.skillManager)
      // 캐릭터 고유 패시브 적용 (메타 이후에 적용해 수치 누적)
      _applyCharacterPassive(Game.player, Game.skillManager)
      // 시작 스킬 없으면 디버그 무료 지급
      if (Game.skillManager && !Game.skillManager.slots.some(Boolean)) {
        Game.skillManager.assignSkill(0, '디버그')
      }
    }

    // 시작 말풍선
    const _BUBBLE_LINES = [
      { text: '열심히 해서 정규직이 될 거야!',   w: 1.3 },
      { text: '오늘도 화이팅!',                   w: 1.0 },
      { text: 'AI가 무섭게 발전하고 있어...',     w: 1.3 },
      { text: '출근 완료. 오늘은 별 일 없겠지?', w: 1.0 },
      { text: '일이 너무 많아서 큰일이야.',       w: 1.0 },
      { text: '하이하이~ ^_^',                    w: 1.0 },
      { text: '커피 수혈이 필요해...',            w: 1.0 },
      { text: '어제 야근했더니 피곤하네.',        w: 1.3 },
      { text: '오늘은 정시 퇴근할 수 있겠지?',   w: 1.3 },
      { text: '멋진 개발자가 될 거야!',           w: 1.0 },
    ]
    {
      const total = _BUBBLE_LINES.reduce((s, l) => s + l.w, 0)
      let r = Math.random() * total
      const picked = _BUBBLE_LINES.find(l => { r -= l.w; return r <= 0 }) || _BUBBLE_LINES[0]
      GameState.speechBubble = { text: picked.text, timer: 4.0, maxTimer: 4.0 }
    }

    // 골드 드롭 리셋
    window.dropManager?.reset()
    GameState.goldInventory = { 1: 0, 2: 0, 3: 0, 4: 0 }

    // Spawner 리셋
    if (Game.enemySystem) {
      Game.enemySystem.spawnTimer = 0
      Game.enemySystem.aiBotSpawned = false
      Game.enemySystem._announcedTypes = new Set()
    }

    // LevelUpManager 리셋
    if (window._levelUpManager) {
      window._levelUpManager.pendingLevelUp = false
      window._levelUpManager.choices = []
      window._levelUpManager.choiceRects = []
    }

    _lastTime = performance.now()
  },

  pause() {
    GameState.isPaused = true
    GameState.screen = 'paused'
  },

  resume() {
    GameState.isPaused = false
    GameState.screen = 'playing'
  },

  gameOver(win) {
    GameState.isRunning = false
    GameState.screen = 'result'
    GameState.isPaused = false
    GameState._lastWin = win
    // 최종 점수 확정
    if (window.ScoreSystem) {
      GameState.score = ScoreSystem.finalizeScore()
    }
    // 출시 포인트 적립
    if (window.MetaManager) {
      GameState.lastEarnedPoints = MetaManager.awardPoints()
    }
  },

  restart() {
    GameState.screen = 'lobby'
  },
}

// ─────────────────────────────────────────
// 게임 루프
// ─────────────────────────────────────────
let _lastTime = 0

function _loop(now) {
  let deltaTime = (now - _lastTime) / 1000
  _lastTime = now
  deltaTime = Math.min(deltaTime, 0.05)

  const gs = GameState
  const player = Game.player
  const ctx = Game.ctx

  // ── 로직 업데이트 (playing 상태일 때만) ──
  if (gs.screen === 'playing' && !gs.isPaused) {

    gs.gameTime += deltaTime

    if (player) {
      player.update(deltaTime, inputKeys)
      updateCamera(player)
      Game.enemySystem?.update(deltaTime)
      Game.skillManager?.update(deltaTime)
      window.dropManager?.update(deltaTime, player)

      // gold_4 픽업 → 보스 처치 후 퇴근 조건 + 뱀파이어 해금
      if (gs.lastPickedGold === 4) {
        gs.lastPickedGold = null
        if (window.MetaManager && !MetaManager.isUnlocked('vampir')) {
          MetaManager.unlockChar('vampir')
          gs.unlockedChars = gs.unlockedChars || {}
          gs.unlockedChars.vampir = true
          gs.unlockNotification = { msg: '뱀파이어 개발자 해금!', timer: 3.0 }
        }
        // 보스 처치 후 골드 다이아 획득 → 퇴근 성공!
        if (gs.bossKilled) {
          Game.gameOver(true)
        }
      }

      // 출시 진행률 업데이트
      window.ScoreSystem?.updateReleaseProgress(deltaTime)

      // 충돌 감지
      for (const enemy of gs.enemies) {
        if (!enemy?.isAlive?.()) continue
        const dx = player.x - enemy.x
        const dy = player.y - enemy.y
        const dist = Math.sqrt(dx * dx + dy * dy)
        const hitR = (player.collisionRadius || 14) + (enemy.collisionRadius || 16)
        if (dist < hitR) {
          if (!(enemy._hitCooldown > 0)) {
            player.takeDamage(enemy.damage || 10)
            enemy._hitCooldown = 0.5
          }
        }
        if (enemy._hitCooldown > 0) enemy._hitCooldown -= deltaTime
      }

      gs.playerDanger = player.hp / player.maxHp < 0.3

      if (gs.aiBotIntro) {
        gs.aiBotIntroTimer += deltaTime
        if (gs.aiBotIntroTimer >= 0.5) gs.aiBotIntro = false
      }

      if (gs.enemyAnnouncement?.timer > 0) {
        gs.enemyAnnouncement.timer -= deltaTime
      }

      // 보스 처치 후 "퇴근하세요!" 힌트 표시
      if (gs.bossKilled && !gs.bossGoldHint) {
        gs.bossGoldHint = true
        gs.speechBubble = { text: '골드 다이아를 먹고 퇴근하세요!', timer: 999, maxTimer: 999 }
      }
      // 사망 체크 — return 금지: rAF(_loop) 도달 전에 탈출하면 루프 정지
      if (!player.isAlive) {
        Game.gameOver(false)
      }
    }
  }

  // LevelUpManager 업데이트 (playing 중에만)
  if (gs.screen === 'playing' && !gs.isPaused) {
    window._levelUpManager?.update()
  }

  // ── 렌더링 ──
  ctx.clearRect(0, 0, 800, 600)

  if (gs.screen === 'lobby') {
    drawBackground(ctx)
    window._lobby?.render(ctx)

  } else if (gs.screen === 'result') {
    window._result?.render(ctx)

  } else if (gs.screen === 'upgrade') {
    window.MetaManager?.render(ctx)

  } else {
    // playing or paused — 월드 공간은 카메라 오프셋 적용
    drawBackground(ctx)

    // 월드 공간 렌더: ctx를 카메라만큼 이동
    ctx.save()
    ctx.translate(-Camera.x, -Camera.y)

    // 적 + 투사체 + 방해 구역
    Game.enemySystem?.renderEnemies?.(ctx)
    // 골드 드롭 아이템 (플레이어 아래 레이어)
    window.dropManager?.render(ctx)
    // 스킬 이펙트
    Game.skillManager?.renderEffects?.(ctx, deltaTime)
    // 플레이어
    player?.render?.(ctx)

    ctx.restore()

    // 스크린 공간 렌더 (HUD 등 카메라 영향 없음)
    window._hud?.render(ctx, gs.gameTime)
    // 레벨업 오버레이 (paused 포함)
    window._levelUpManager?.render(ctx)
    // 모바일 조이스틱
    window._joystick?.render(ctx)
    // 신규 적 등장 알림
    if (gs.enemyAnnouncement?.timer > 0) {
      _drawEnemyAnnouncement(ctx, gs.enemyAnnouncement)
    }

    // 보스 처치 연출
    if (gs.bossDeathAnnounce && gs.bossDeathAnnounce.timer > 0) {
      gs.bossDeathAnnounce.timer -= deltaTime
      const ann = gs.bossDeathAnnounce
      const elapsed = ann.maxTimer - ann.timer
      let alpha = elapsed < 0.3 ? elapsed / 0.3 : ann.timer < 0.8 ? ann.timer / 0.8 : 1
      ctx.save()
      ctx.globalAlpha = alpha
      // 황금빛 배너
      ctx.fillStyle = 'rgba(10,6,0,0.88)'
      ctx.fillRect(100, 200, 600, 110)
      ctx.strokeStyle = '#FFD700'
      ctx.lineWidth = 2.5
      ctx.strokeRect(100, 200, 600, 110)
      ctx.fillStyle = '#FFD700'
      ctx.font = 'bold 44px "VT323", monospace'
      ctx.textAlign = 'center'
      ctx.shadowColor = '#FFD700'
      ctx.shadowBlur = 18
      ctx.fillText('🏆 미러워커 처치!', 400, 248)
      ctx.shadowBlur = 0
      ctx.fillStyle = '#88ffcc'
      ctx.font = '22px "VT323", monospace'
      ctx.fillText('골드 다이아를 먹고 퇴근하세요!', 400, 286)
      ctx.textAlign = 'left'
      ctx.restore()
    }

    // AIBot 등장 연출
    if (gs.aiBotIntro) {
      const alpha = 1 - gs.aiBotIntroTimer / 0.5
      ctx.fillStyle = `rgba(0,0,0,${alpha * 0.85})`
      ctx.fillRect(0, 0, 800, 600)
      ctx.save()
      ctx.globalAlpha = alpha
      ctx.fillStyle = '#ff2222'
      ctx.font = 'bold 48px "VT323", cursive'
      ctx.textAlign = 'center'
      ctx.fillText('⚠ AI가 직접 나타났다', 400, 270)
      ctx.fillStyle = '#ffffff'
      ctx.font = '28px "VT323", cursive'
      ctx.fillText('마지막 10초. 살아남아라.', 400, 315)
      ctx.restore()
    }
  }

  requestAnimationFrame(_loop)
}

// ─────────────────────────────────────────
// 부트스트랩
// ─────────────────────────────────────────

// 모든 모듈 이미 로드됨 — 동기 초기화
window.dispatchEvent(new Event('gameReady'))
Game.init()


  </script>

</body>
